<script>
var View = {
  chartRegistry: {},

  cacheDom: function() {
    if (!Model.dom) Model.dom = {};
    Model.dom.pageStatusBanner = document.getElementById("pageStatusBanner");
    Model.dom.reportBatchLoadingState = document.getElementById("reportBatchLoadingState");
    Model.dom.reportBatchLoadingText = document.getElementById("reportBatchLoadingText");
    Model.dom.reportShell = document.querySelector(".report-shell");
    Model.dom.reportLoadingState = document.getElementById("reportLoadingState");
    Model.dom.reportLoadingText = document.getElementById("reportLoadingText");
    Model.dom.reportDatasetHint = document.getElementById("reportDatasetHint");
    Model.dom.reportDataSourceHint = document.getElementById("reportDataSourceHint");
    Model.dom.summaryTrendChart = document.getElementById("summaryTrendChart");
    Model.dom.workloadOwnerChart = document.getElementById("workloadOwnerChart");
    Model.dom.topProgramsBars = document.getElementById("topProgramsBars");
    Model.dom.overallStatusBars = document.getElementById("overallStatusBars");
    Model.dom.statusProgressionBars = document.getElementById("statusProgressionBars");
    Model.dom.turnaroundSummary = document.getElementById("turnaroundSummary");
    Model.dom.turnaroundGroups = document.getElementById("turnaroundGroups");
    Model.dom.es2TableBody = document.getElementById("es2TableBody");
    Model.dom.stageBacklogBars = document.getElementById("stageBacklogBars");
    Model.dom.locationLoadBars = document.getElementById("locationLoadBars");
    Model.dom.monthlyVolumeBars = document.getElementById("monthlyVolumeBars");
    Model.dom.monthlyYearSelect = document.getElementById("monthlyYearSelect");
    Model.dom.slaExposureBars = document.getElementById("slaExposureBars");
    Model.dom.productivityChart = document.getElementById("productivityChart");
    Model.dom.productivityTableBody = document.getElementById("productivityTableBody");
    Model.dom.refreshButton = document.getElementById("refreshButton");
    Model.dom.applyFiltersButton = document.getElementById("applyFiltersButton");
    Model.dom.clearFiltersButton = document.getElementById("clearFiltersButton");
    Model.dom.filterEs2 = document.getElementById("filterEs2");
    Model.dom.filterProgram = document.getElementById("filterProgram");
    Model.dom.filterStatus = document.getElementById("filterStatus");
    Model.dom.filterHei = document.getElementById("filterHei");
    Model.dom.filterDatePreset = document.getElementById("filterDatePreset");
    Model.dom.filterDateFromWrap = document.getElementById("filterDateFromWrap");
    Model.dom.filterDateToWrap = document.getElementById("filterDateToWrap");
    Model.dom.filterDateFrom = document.getElementById("filterDateFrom");
    Model.dom.filterDateTo = document.getElementById("filterDateTo");
    Model.dom.filterTrigger = document.getElementById("filterTrigger");
    Model.dom.filterFlyout = document.getElementById("filterFlyout");
    Model.dom.filterOverlay = document.getElementById("filterOverlay");
    Model.dom.mainDashboard = document.getElementById("mainDashboard");
    Model.dom.detailModalEl = document.getElementById("detailModal");
    Model.dom.detailModalKicker = document.getElementById("detailModalKicker");
    Model.dom.detailModalTitle = document.getElementById("detailModalTitle");
    Model.dom.detailModalLoadingState = document.getElementById("detailModalLoadingState");
    Model.dom.detailModalStatusTrend = document.getElementById("detailModalStatusTrend");
    Model.dom.detailModalMeta = document.getElementById("detailModalMeta");
    Model.dom.detailModalSummary = document.getElementById("detailModalSummary");
    Model.dom.detailModalPrograms = document.getElementById("detailModalPrograms");
    Model.dom.detailModalTransactionTypes = document.getElementById("detailModalTransactionTypes");
    Model.dom.detailModalOverallStatus = document.getElementById("detailModalOverallStatus");
    Model.dom.detailModalProgression = document.getElementById("detailModalProgression");
    Model.dom.detailModalLocations = document.getElementById("detailModalLocations");
    Model.dom.detailModalTableHead = document.getElementById("detailModalTableHead");
    Model.dom.detailModalTableBody = document.getElementById("detailModalTableBody");
    Model.dom.detailModalPrevPage = document.getElementById("detailModalPrevPage");
    Model.dom.detailModalNextPage = document.getElementById("detailModalNextPage");
    Model.dom.detailModalPageStatus = document.getElementById("detailModalPageStatus");
    Model.dom.detailModalInstance = Model.dom.detailModalEl ? new bootstrap.Modal(Model.dom.detailModalEl) : null;
  },

  bindStaticUi: function() {
    [
      Model.dom.filterEs2,
      Model.dom.filterProgram,
      Model.dom.filterStatus,
      Model.dom.filterTransactionType,
      Model.dom.filterHei,
      Model.dom.filterDatePreset,
      Model.dom.filterDateFrom,
      Model.dom.filterDateTo
    ].forEach(function(element) {
      if (element) element.addEventListener("change", Controller.handleFilterDraftChange.bind(Controller));
    });
    if (Model.dom.applyFiltersButton) {
      Model.dom.applyFiltersButton.addEventListener("click", function() {
        console.log("Apply button clicked");
        View.setApplyButtonLoading(true);
        var applied = Controller.handleApplyFilters(function() {
          // Success callback - close flyout when data is loaded
          console.log("Data loaded, closing flyout...");
          View.closeFilterFlyout();
          View.setApplyButtonLoading(false);
        }, function() {
          // Error callback
          View.setApplyButtonLoading(false);
        });
        if (!applied) {
          View.setApplyButtonLoading(false);
        }
      });
    }
    if (Model.dom.refreshButton) Model.dom.refreshButton.addEventListener("click", Controller.handleRefresh.bind(Controller));
    if (Model.dom.clearFiltersButton) Model.dom.clearFiltersButton.addEventListener("click", Controller.handleClearFilters.bind(Controller));
    if (Model.dom.detailModalPrevPage) {
      Model.dom.detailModalPrevPage.addEventListener("click", Controller.handleModalPreviousPage.bind(Controller));
    }
    if (Model.dom.detailModalNextPage) {
      Model.dom.detailModalNextPage.addEventListener("click", Controller.handleModalNextPage.bind(Controller));
    }
    if (Model.dom.monthlyYearSelect) {
      Model.dom.monthlyYearSelect.addEventListener("change", Controller.handleMonthlyYearChange.bind(Controller));
    }
    // Flyout filter toggle functionality
    this.bindFlyoutFilters();
  },

  bindFlyoutFilters: function() {
    var self = this;
    // Toggle flyout when trigger clicked
    if (Model.dom.filterTrigger) {
      Model.dom.filterTrigger.addEventListener("click", function() {
        self.toggleFilterFlyout();
      });
    }
    // Close flyout when overlay clicked
    if (Model.dom.filterOverlay) {
      Model.dom.filterOverlay.addEventListener("click", function() {
        View.closeFilterFlyout();
      });
    }
    // Close flyout on Apply (handled by apply button already)
  },

  toggleFilterFlyout: function() {
    document.body.classList.toggle('filter-open');
  },

  openFilterFlyout: function() {
    document.body.classList.add('filter-open');
  },

  closeFilterFlyout: function() {
    console.log("closeFilterFlyout called");
    document.body.classList.remove('filter-open');
    var flyout = document.getElementById('filterFlyout');
    if (flyout) {
      flyout.style.left = '-360px';
      console.log("Set flyout inline style left to -360px");
    }
  },

  setApplyButtonLoading: function(loading) {
    var btn = Model.dom.applyFiltersButton;
    if (!btn) return;
    var btnText = btn.querySelector('.btn-text');
    var btnLoading = btn.querySelector('.btn-loading');
    if (btnText) btnText.classList.toggle('d-none', loading);
    if (btnLoading) btnLoading.classList.toggle('d-none', !loading);
    btn.disabled = loading;
    console.log("Apply button loading:", loading);
  },

  readFilters: function() {
    return {
      program: Model.dom.filterProgram ? Model.dom.filterProgram.value : "ALL",
      es2InCharge: Model.dom.filterEs2 ? Model.dom.filterEs2.value : "ALL",
      datePreset: Model.dom.filterDatePreset ? Model.dom.filterDatePreset.value : "thisYear",
      dateFrom: Model.dom.filterDateFrom ? Model.dom.filterDateFrom.value : "",
      dateTo: Model.dom.filterDateTo ? Model.dom.filterDateTo.value : "",
      applicationStatus: Model.dom.filterStatus ? Model.dom.filterStatus.value : "ALL",
      hei: Model.dom.filterHei ? Model.dom.filterHei.value : "ALL"
    };
  },

  renderLoadingState: function(message) {
    this.hideStatusBanner();
    this.setInlineLoading(false, message || "Loading analytics...");
    this.setLoadingMore(false);
    // Show skeleton loading states for all sections
    this.renderTopProgramsSkeleton();
    this.renderSummaryCardsSkeleton();
    this.renderWorkloadSkeleton();
    this.renderExecutiveCardsSkeleton();
    this.renderLocationLoadSkeleton();
    this.renderAssignedStaffSkeleton();
  },

  renderFailure: function(message) {
    console.error("Executive Dashboard UI failure:", message);
    this.showStatusBanner(message, "danger");
    this.setInlineLoading(false);
    this.setLoadingMore(false);
    this.clearAllCharts();
    this.renderTopProgramsSkeleton();
    if (Model.dom.overallStatusBars) Model.dom.overallStatusBars.innerHTML = this.buildChartEmptyState();
    if (Model.dom.statusProgressionBars) Model.dom.statusProgressionBars.innerHTML = this.buildChartEmptyState();
    if (Model.dom.turnaroundSummary) Model.dom.turnaroundSummary.innerHTML = this.buildTurnaroundSummarySkeleton();
    if (Model.dom.turnaroundGroups) Model.dom.turnaroundGroups.innerHTML = this.buildChartEmptyState();
    var staffTableBody = document.getElementById("staffActivityTableBody");
    if (staffTableBody) staffTableBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">No Data Available</td></tr>';
    if (Model.dom.stageBacklogBars) Model.dom.stageBacklogBars.innerHTML = this.buildChartEmptyState();
    if (Model.dom.locationLoadBars) Model.dom.locationLoadBars.innerHTML = this.buildChartEmptyState();
    if (Model.dom.monthlyVolumeBars) Model.dom.monthlyVolumeBars.innerHTML = this.buildChartEmptyState();
    if (Model.dom.monthlyYearSelect) Model.dom.monthlyYearSelect.innerHTML = "";
    if (Model.dom.slaExposureBars) Model.dom.slaExposureBars.innerHTML = this.buildChartEmptyState();
    if (Model.dom.productivityChart) Model.dom.productivityChart.innerHTML = this.buildChartEmptyState();
    if (Model.dom.productivityTableBody) Model.dom.productivityTableBody.innerHTML = this.buildEmptyRow(4, "No Data Available");
  },

  buildEmptyRow: function(cols, text) {
    return '<tr><td colspan="' + cols + '" class="text-center text-muted py-4">' + (text || "No records found") + '</td></tr>';
  },

  renderDashboard: function(payload, hydrateFilters) {
    if (!payload) {
      console.error("[VIEW] renderDashboard called with NULL payload");
      this.renderFailure("No data received. Please refresh.");
      return;
    }
    
    // UNWRAP: Support Success-wrapped or direct payloads
    var data = payload.handled ? payload.data : payload;
    
    console.log("[VIEW] Rendering dashboard. OK:", data.ok, "Summary present:", !!data.summary);

    if (data.error) {
      this.renderError(data.error);
      return;
    }

    if (hydrateFilters && data.filters) this.populateFilters(data.filters);
    
    this.hideStatusBanner();
    this.setInlineLoading(false);
    this.clearIconSkeletons();
    
    if (data.meta) this.renderMeta(data.meta);
    
    // SAFE RENDER: Ensure summary object exists
    var summary = data.summary || { totalRecords: 0, total: 0 };
    var sections = data.sections || {};
    var monthlyTrend = sections.monthlyTrend || null;
    
    // Store year total for percentage calculations
    Model.yearTotal = summary.totalRecords || summary.total || 0;

    // PROGRESSIVE LOADING: Render sections independently with staggered timing
    // Priority 1: Critical KPIs and top-left content (immediate)
    this.renderSummaryCards(summary);
    this.renderSummaryTrendChart(summary, monthlyTrend);
    this.clearSkeletonForSection('summaryTrendChart');
    
    // Priority 2: Top Programs and Workload (visible above fold)
    var self = this;
    setTimeout(function() {
      self.renderTopPrograms(sections.topPrograms || { rows: [] });
      self.renderWorkload(sections.es2Ownership || { rows: [] }, Model.yearTotal);
      self.clearSkeletonForSection('topPrograms');
    }, 50);
    
    // Priority 3: Status charts and overall progress
    setTimeout(function() {
      self.renderOverallStatus(sections.overallApplicationStatus || { rows: [] }, Model.yearTotal);
      self.renderStatusProgression(sections.statusProgression || { rows: [] }, Model.yearTotal);
      self.clearSkeletonForSection('overallStatus');
    }, 100);
    
    // Priority 4: Turnaround and Location (middle section)
    setTimeout(function() {
      self.renderTurnaround(sections.turnaroundTime || { summary: {}, rows: [] });
      self.renderLocationLoad(sections.locationLoad || { rows: [] });
      self.clearSkeletonForSection('locationLoad');
    }, 150);
    
    // Priority 5: Executive metric cards (Monthly, Backlog, SLA)
    setTimeout(function() {
      try {
        self.renderMonthlyVolume(sections.monthlyVolume || { rows: [] });
        self.renderStageBacklog(sections.stageBacklog || { rows: [] });
        self.renderSlaExposure(sections.slaExposure || { rows: [] });
      } catch (e) {
        console.error('[VIEW] Executive cards render error:', e);
      } finally {
        // Always clear skeletons even if render fails
        self.clearSkeletonForSection('executiveCards');
      }
    }, 200);
    
    // Priority 6: Assigned Staff Activity (bottom section, lowest priority)
    setTimeout(function() {
      try {
        self.renderProductivity(sections.productivity || { rows: [] });
        self.clearSkeletonForSection('productivity');
      } catch (renderError) {
        console.error("[VIEW] Productivity render failed:", renderError);
      }
    }, 250);
  },

  clearSkeletonForSection: function(sectionName) {
    // Remove skeleton overlays for specific sections as they render
    var skeletonSelectors = {
      'summaryTrendChart': '.summary-trend-chart-wrapper .skeleton-overlay',
      'topPrograms': '#topProgramsHero .skeleton-overlay, #topProgramsRows .skeleton-overlay',
      'overallStatus': '#overallStatusChart .skeleton-overlay',
      'locationLoad': '#locationLoadBars .skeleton-overlay',
      'executiveCards': '#monthlyVolumeTotal .skeleton-overlay, #monthlyVolumeBars .skeleton-overlay, #workflowBacklogTotal .skeleton-overlay, #stageBacklogBars .skeleton-overlay, #slaExposureTotal .skeleton-overlay, #slaExposureBars .skeleton-overlay',
      'productivity': '#staffActivityTableBody .skeleton-overlay, #staffRingChart .skeleton-overlay'
    };
    
    var selector = skeletonSelectors[sectionName];
    if (selector) {
      document.querySelectorAll(selector).forEach(function(el) {
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.3s ease';
        setTimeout(function() { el.remove(); }, 300);
      });
    }
    
    // Also clear any skeleton elements that were directly inserted
    if (sectionName === 'productivity') {
      var staffTable = document.getElementById('staffActivityTableBody');
      if (staffTable && staffTable.querySelector('.table-skeleton-line')) {
        // Will be replaced by actual render
      }
    }
  },

  renderMeta: function(meta) {
    this.renderDataSourceHint(meta.cacheStatus || "");
    if (meta && meta.cacheStatus) {
      console.info("Executive Dashboard data source:", meta.cacheStatus, "requestId:", meta.requestId || "");
    }
  },

  clearIconSkeletons: function() {
    // Clear icon skeleton loading states after data loads
    var dashboardBtn = document.getElementById("navDashboardBtn");
    if (dashboardBtn) {
      dashboardBtn.classList.remove("dashboard-icon-loading");
    }
    var filterTrigger = document.getElementById("filterTrigger");
    if (filterTrigger) {
      filterTrigger.classList.remove("is-loading");
    }
  },

  formatNumber: function(val) {
    return Number(val || 0).toLocaleString();
  },

  getInitials: function(name) {
    if (!name || typeof name !== 'string') return '??';
    var parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  },

  formatBusinessDays: function(days) {
    var n = Number(days || 0);
    if (!n || isNaN(n)) return "0 days";
    var wholeDays = Math.floor(n);
    var hours = Math.round((n - wholeDays) * 8);
    if (hours >= 8) { wholeDays += 1; hours = 0; }
    if (wholeDays === 0) return hours + "h";
    if (hours === 0) return wholeDays + " days";
    return wholeDays + "d " + hours + "h";
  },

  renderDataSourceHint: function(cacheStatus) {
    if (!Model.dom.reportDataSourceHint) return;
    var token = String(cacheStatus || "").toLowerCase();
    var labelMap = {
      flat: "Source: Flat",
      raw: "Source: Raw",
      "client-array": "Source: Client Cache",
      live: "Source: Live",
      error: "Source: Error"
    };
    var label = labelMap[token] || "";
    Model.dom.reportDataSourceHint.textContent = label;
    Model.dom.reportDataSourceHint.classList.toggle("d-none", !label);
  },

  populateFilters: function(filters) {
    // Ensure filters object and all required arrays/objects exist with safe defaults
    var f = filters || {};
    var es2Owners = f.es2Owners || [];
    var programs = f.programs || [];
    var applicationStatuses = f.applicationStatuses || [];
    var transactionTypes = f.transactionTypes || ["Walk-In", "Online"];
    var heis = f.heis || [];
    var dateRange = f.dateRange || { min: "", max: "" };

    console.log("Populating Dashboard filters:", {
      es2Owners: es2Owners,
      programs: programs,
      applicationStatuses: applicationStatuses,
      transactionTypes: transactionTypes,
      heis: heis,
      dateRange: dateRange
    });

    this.fillSelect(Model.dom.filterEs2, es2Owners, Model.filters.es2InCharge);
    this.fillSelect(Model.dom.filterProgram, programs, Model.filters.program);
    this.fillSelect(Model.dom.filterStatus, applicationStatuses, Model.filters.applicationStatus);
    this.fillSelect(Model.dom.filterTransactionType, transactionTypes, Model.filters.transactionType);
    this.fillSelect(Model.dom.filterHei, heis, Model.filters.hei);
    
    if (Model.dom.filterDatePreset) Model.dom.filterDatePreset.value = Model.filters.datePreset || "thisYear";
    if (Model.dom.filterDateFrom) {
      Model.dom.filterDateFrom.min = dateRange.min || "";
      Model.dom.filterDateFrom.max = dateRange.max || "";
      Model.dom.filterDateFrom.value = Model.filters.dateFrom || "";
    }
    if (Model.dom.filterDateTo) {
      Model.dom.filterDateTo.min = dateRange.min || "";
      Model.dom.filterDateTo.max = dateRange.max || "";
      Model.dom.filterDateTo.value = Model.filters.dateTo || "";
    }
    this.syncDateFilterMode();
    this.setApplyButtonState();
  },

  fillSelect: function(select, values, selectedValue, allLabel) {
    if (!select) return;
    select.innerHTML = "";
    var allOption = document.createElement("option");
    allOption.value = "ALL";
    allOption.textContent = allLabel || "All";
    select.appendChild(allOption);
    (values || []).forEach(function(value) {
      var option = document.createElement("option");
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    });
    select.value = selectedValue || "ALL";
  },

  syncDateFilterMode: function() {
    var useSpecificDate = Model.dom.filterDatePreset && Model.dom.filterDatePreset.value === "specificDate";
    if (Model.dom.filterDateFromWrap) Model.dom.filterDateFromWrap.classList.toggle("d-none", !useSpecificDate);
    if (Model.dom.filterDateToWrap) Model.dom.filterDateToWrap.classList.toggle("d-none", !useSpecificDate);
    if (Model.dom.filterDateFrom) Model.dom.filterDateFrom.disabled = !useSpecificDate;
    if (Model.dom.filterDateTo) Model.dom.filterDateTo.disabled = !useSpecificDate || !Model.dom.filterDateFrom.value;
  },

  renderSummaryCards: function(summary) {
    var cards = [
      ["Total", summary.total],
      ["For Evaluation", summary.forEvaluation],
      ["Evaluated", summary.evaluated],
      ["Deficiency", summary.deficiency],
      ["Approved", summary.approved],
      ["Verified", summary.verified],
      ["For Signature", summary.forSignature],
      ["For Release", summary.forRelease],
      ["Released", summary.released],
      ["Cancelled", summary.cancelled]
    ];
    var visibleCards = [];
    var zeroCards = [];
    var self = this;
    cards.forEach(function(card) {
      var value = Number(card[1] || 0);
      if (card[0] === "Total" || value > 0) visibleCards.push(card);
      else zeroCards.push(card[0]);
    });
    if (zeroCards.length) visibleCards.push(["Inactive Stages", 0, zeroCards.join(" / ")]);
    if (!visibleCards.length) visibleCards = [["Total", 0]];
    if (Model.dom.summaryCards) {
      Model.dom.summaryCards.innerHTML = visibleCards.map(function(card) {
        var isGroupedZeroCard = card[0] === "Inactive Stages";
        var clickable = !isGroupedZeroCard && card[0] !== "Total";
        return '<div class="report-stat-card' + (isGroupedZeroCard ? ' report-stat-card-muted report-stat-card-grouped' : '') + (clickable ? ' analytics-clickable-card' : '') + '"' + (clickable ? ' data-detail-type="status" data-detail-name="' + self.escapeHtml(card[0]) + '"' : '') + '><span class="report-stat-label">' + self.escapeHtml(card[0]) + '</span>' +
          (isGroupedZeroCard
            ? '<div class="report-stat-muted-copy">No current records: ' + self.escapeHtml(card[2] || "") + '</div>'
            : '<strong class="report-stat-value">' + self.formatNumber(card[1]) + "</strong>") +
          "</div>";
      }).join("");
      this.bindSummaryCardClicks();
    }
  },

  renderSummaryTrendChart: function(summary, monthlyTrend) {
    this.destroyChart("summaryTrendChart");
    if (!Model.dom.summaryTrendChart) return;

    // Use backend monthly trend data if available
    var months = [];
    var statusDataMap = {};
    
    if (monthlyTrend && monthlyTrend.months && monthlyTrend.months.length > 0) {
      // Use actual data from backend - ensure consistent month format
      months = monthlyTrend.months.map(function(m) {
        // Normalize month format: handle "Jan 2024", "2024-01", "Jan '24", etc.
        if (!m) return "";
        var str = String(m).trim();
        // If already in "Jan 2024" format, use as-is
        if (/^[A-Za-z]{3}\s+\d{4}$/.test(str)) return str;
        // If in "2024-01" format, convert
        var match = str.match(/^(\d{4})-(\d{2})$/);
        if (match) {
          var monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
          var monthIndex = parseInt(match[2], 10) - 1;
          if (monthIndex >= 0 && monthIndex < 12) {
            return monthNames[monthIndex] + " " + match[1];
          }
        }
        return str;
      });
      statusDataMap = monthlyTrend.data || {};
    } else {
      // Fallback: generate months from filter range
      var filters = Model.filters || {};
      var dateFrom = filters.dateFrom;
      var dateTo = filters.dateTo;
      var datePreset = filters.datePreset;
      var monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      
      if (datePreset === "thisYear" || datePreset === "yearToDate") {
        var currentMonth = new Date().getMonth();
        for (var i = 0; i <= currentMonth; i++) {
          months.push(monthNames[i]);
        }
      } else if (dateFrom && dateTo) {
        var startDate = new Date(dateFrom);
        var endDate = new Date(dateTo);
        var current = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
        while (current <= endDate) {
          months.push(monthNames[current.getMonth()] + " '" + String(current.getFullYear()).slice(2));
          current.setMonth(current.getMonth() + 1);
        }
      } else {
        var today = new Date();
        for (var i = 5; i >= 0; i--) {
          var d = new Date(today.getFullYear(), today.getMonth() - i, 1);
          months.push(monthNames[d.getMonth()] + " '" + String(d.getFullYear()).slice(2));
        }
      }
    }

    // Status configurations with vibrant colors
    var statusConfig = [
      { key: "forEvaluation", label: "For Evaluation", color: "#ff9500" },
      { key: "evaluated", label: "Evaluated", color: "#00d4aa" },
      { key: "deficiency", label: "Deficiency", color: "#ff2d55" },
      { key: "approved", label: "Approved", color: "#34c759" },
      { key: "verified", label: "Verified", color: "#af52de" },
      { key: "forSignature", label: "For Signature", color: "#ffcc00" },
      { key: "forRelease", label: "For Release", color: "#007aff" },
      { key: "released", label: "Released", color: "#5856d6" },
      { key: "cancelled", label: "Cancelled", color: "#8e8e93" }
    ];

    // Check if we have real monthly data
    var hasMonthlyData = monthlyTrend && monthlyTrend.months && monthlyTrend.months.length > 0;
    
    // Create datasets for each status
    var datasets = statusConfig.filter(function(s) {
      return summary[s.key] > 0;
    }).map(function(s) {
      var trendData = [];
      
      if (hasMonthlyData && statusDataMap[s.key]) {
        // Use actual monthly data from backend
        trendData = statusDataMap[s.key].slice(0, months.length);
      } else {
        // Distribute total across months with slight variation
        var baseValue = summary[s.key] / months.length;
        for (var m = 0; m < months.length; m++) {
          var variation = (Math.random() - 0.5) * baseValue * 0.2;
          trendData.push(Math.max(0, Math.round(baseValue + variation)));
        }
      }
      
      return {
        label: s.label,
        data: trendData,
        fill: true,
        backgroundColor: s.color + "20",
        borderColor: s.color,
        borderWidth: 2,
        tension: 0.4,
        pointRadius: 4,
        pointHoverRadius: 6,
        pointBackgroundColor: s.color,
        pointBorderColor: "#fff",
        pointBorderWidth: 2
      };
    });

    // Determine title label based on date filter
    var filters = Model.filters || {};
    var datePreset = filters.datePreset;
    var dateFrom = filters.dateFrom;
    var dateTo = filters.dateTo;
    var titleLabel = "";
    
    if (datePreset === "thisYear" || datePreset === "yearToDate") {
      titleLabel = "THIS YEAR";
    } else if (datePreset === "last30Days") {
      titleLabel = "LAST 30 DAYS";
    } else if (datePreset === "last90Days") {
      titleLabel = "LAST 90 DAYS";
    } else if (datePreset === "allTime") {
      titleLabel = "ALL TIME";
    } else if (dateFrom && dateTo) {
      titleLabel = "CUSTOM RANGE";
    } else {
      titleLabel = "THIS YEAR";
    }
    
    // Store full totals for legend before any slicing
    var fullDatasetTotals = {};
    datasets.forEach(function(dataset) {
      var total = dataset.data.reduce(function(a, b) { return a + b; }, 0);
      fullDatasetTotals[dataset.label] = total;
    });
    
    // Calculate Y-axis max from actual data (not Total)
    var allValues = [];
    datasets.forEach(function(d) { allValues = allValues.concat(d.data); });
    var maxDataValue = Math.max.apply(Math, allValues);
    var yAxisMax = maxDataValue * 1.1;

    // Update HTML title
    var titleEl = document.getElementById("summaryTrendChartTitle");
    if (titleEl) {
      titleEl.textContent = titleLabel + " TOTAL: " + (summary.total || 0).toLocaleString();
    }
    
    // Sliding window: always show exactly 10 months
    var WINDOW_SIZE = 10;
    var currentWindowStart = 0;
    var maxWindowStart = Math.max(0, months.length - WINDOW_SIZE);
    
    // Get current window slice
    function getWindowData() {
      var end = Math.min(currentWindowStart + WINDOW_SIZE, months.length);
      return {
        months: months.slice(currentWindowStart, end),
        datasets: datasets.map(function(d) {
          return {
            label: d.label,
            data: d.data.slice(currentWindowStart, end),
            fill: d.fill,
            backgroundColor: d.backgroundColor,
            borderColor: d.borderColor,
            borderWidth: d.borderWidth,
            tension: d.tension,
            pointRadius: d.pointRadius,
            pointHoverRadius: d.pointHoverRadius,
            pointBackgroundColor: d.pointBackgroundColor,
            pointBorderColor: d.pointBorderColor,
            pointBorderWidth: d.pointBorderWidth
          };
        })
      };
    }
    
    // Update navigation
    function updateNavigation() {
      var prevBtn = document.getElementById("trendChartPrevBtn");
      var nextBtn = document.getElementById("trendChartNextBtn");
      var navLabel = document.getElementById("trendChartNavLabel");
      
      if (prevBtn) prevBtn.disabled = currentWindowStart === 0;
      if (nextBtn) nextBtn.disabled = currentWindowStart >= maxWindowStart;
      if (navLabel) {
        var endIndex = Math.min(currentWindowStart + WINDOW_SIZE, months.length);
        navLabel.textContent = months[currentWindowStart] + " - " + months[endIndex - 1];
      }
    }
    
    // Navigation handlers
    function slideWindow(direction) {
      if (direction === "prev" && currentWindowStart > 0) {
        currentWindowStart = Math.max(0, currentWindowStart - WINDOW_SIZE);
      } else if (direction === "next" && currentWindowStart < maxWindowStart) {
        currentWindowStart = Math.min(maxWindowStart, currentWindowStart + WINDOW_SIZE);
      }
      updateNavigation();
      // Update chart via registry
      var windowData = getWindowData();
      var chartInstance = self.chartRegistry["summaryTrendChart"];
      if (chartInstance) {
        chartInstance.data.labels = windowData.months;
        chartInstance.data.datasets.forEach(function(dataset, i) {
          dataset.data = windowData.datasets[i].data;
        });
        chartInstance.update('none');
      }
    }
    
    // Bind navigation buttons
    var prevBtn = document.getElementById("trendChartPrevBtn");
    var nextBtn = document.getElementById("trendChartNextBtn");
    if (prevBtn) prevBtn.onclick = function() { slideWindow("prev"); };
    if (nextBtn) nextBtn.onclick = function() { slideWindow("next"); };
    
    // Set canvas size for sharp rendering
    var chartArea = document.querySelector(".summary-trend-chart-area");
    var dpr = window.devicePixelRatio || 1;
    if (chartArea) {
      var containerWidth = chartArea.clientWidth || 300;
      Model.dom.summaryTrendChart.width = Math.floor(containerWidth * dpr);
      Model.dom.summaryTrendChart.height = Math.floor(320 * dpr);
    }
    
    // Render custom HTML legend
    var legendEl = document.getElementById("summaryTrendChartLegend");
    if (legendEl) {
      legendEl.innerHTML = "";
      datasets.forEach(function(dataset, i) {
        var total = fullDatasetTotals[dataset.label] || 0;
        var item = document.createElement("div");
        item.className = "summary-trend-chart-legend-item";
        item.dataset.index = i;
        item.innerHTML = '<span class="summary-trend-chart-legend-color" style="background-color: ' + dataset.borderColor + '"></span>' +
          '<span>' + dataset.label + " (" + total.toLocaleString() + ")</span>";
        item.addEventListener("click", function() {
          var idx = parseInt(this.dataset.index);
          var meta = chart.getDatasetMeta(idx);
          meta.hidden = !meta.hidden;
          this.classList.toggle("hidden", !!meta.hidden);
          chart.update();
        });
        legendEl.appendChild(item);
      });
    }
    
    updateNavigation();
    
    var ctx = Model.dom.summaryTrendChart.getContext("2d");
    // Scale context for high DPI displays
    ctx.scale(dpr, dpr);
    
    // Get initial window data
    var windowData = getWindowData();
    
    var self = this;
    var chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: windowData.months,
        datasets: windowData.datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: {
          padding: {
            left: 20,
            right: 20,
            top: 10,
            bottom: 10
          }
        },
        interaction: {
          mode: "index",
          intersect: false
        },
        plugins: {
          title: {
            display: false
          },
          subtitle: {
            display: false
          },
          legend: {
            display: false
          },
          tooltip: {
            backgroundColor: "rgba(255, 255, 255, 0.98)",
            titleColor: "#1e293b",
            bodyColor: "#334155",
            borderColor: "#cbd5e1",
            borderWidth: 1,
            padding: 12,
            cornerRadius: 10,
            displayColors: true,
            boxPadding: 4,
            usePointStyle: true,
            sort: function(a, b) {
              // Sort in ascending order by value
              return a.parsed.y - b.parsed.y;
            },
            callbacks: {
              label: function(context) {
                var label = context.dataset.label || "";
                var value = context.parsed.y || 0;
                return " " + label + ": " + value.toLocaleString() + " records";
              },
              labelColor: function(context) {
                return {
                  borderColor: context.dataset.borderColor,
                  backgroundColor: context.dataset.borderColor,
                  borderWidth: 2,
                  borderRadius: 6
                };
              }
            }
          }
        },
        scales: {
          x: {
            display: true,
            grid: {
              display: false,
              drawBorder: false
            },
            ticks: {
              color: "#64748b",
              font: {
                size: 11,
                family: "'Plus Jakarta Sans', sans-serif"
              }
            }
          },
          y: {
            display: true,
            position: "right",
            min: 0,
            max: yAxisMax,
            grid: {
              display: false,
              drawBorder: false
            },
            ticks: {
              display: true,
              color: "#64748b",
              font: {
                size: 10,
                family: "'Plus Jakarta Sans', sans-serif"
              },
              callback: function(value) {
                return value.toLocaleString();
              }
            }
          }
        },
        elements: {
          line: {
            tension: 0.4
          }
        }
      }
    });

    this.chartRegistry["summaryTrendChart"] = chart;
  },

  renderTopPrograms: function(section) {
    var heroEl = document.getElementById("topProgramsHero");
    var rowsEl = document.getElementById("topProgramsRows");
    
    if (!heroEl || !rowsEl) return;
    
    // Show skeleton if no data yet
    if (!section || !section.rows || !section.rows.length) {
      this.renderTopProgramsSkeleton();
      return;
    }
    
    var self = this;
    var rows = section.rows;
    
    // Helper to determine trend based on index
    function getTrend(index) {
      if (index === 0) return { type: 'high', icon: 'top rank', label: 'Top Rank' };
      if (index < 3) return { type: 'high', icon: 'trending-up', label: 'High Growth' };
      if (index < 6) return { type: 'stable', icon: 'minus', label: 'Stable' };
      return { type: 'cooling', icon: 'trending-down', label: 'Cooling' };
    }
    
    // Get Lucide icon for program type
    function getProgramIcon(programName) {
      var name = (programName || '').toLowerCase();
      if (name.includes('business') || name.includes('admin')) return 'briefcase';
      if (name.includes('crim')) return 'shield';
      if (name.includes('education') || name.includes('elementary') || name.includes('secondary')) return 'book-open';
      if (name.includes('nursing') || name.includes('med') || name.includes('health')) return 'heart-pulse';
      if (name.includes('engineer') || name.includes('tech') || name.includes('computer') || name.includes('it')) return 'monitor';
      if (name.includes('hospitality') || name.includes('tour')) return 'building';
      if (name.includes('account') || name.includes('finance')) return 'calculator';
      if (name.includes('law') || name.includes('legal')) return 'scale';
      if (name.includes('art') || name.includes('design')) return 'palette';
      if (name.includes('sci') || name.includes('bio') || name.includes('chem')) return 'flask-conical';
      return 'graduation-cap';
    }
    
    // Render #1 Hero Panel (Vertical layout, overlapping)
    var topProgram = rows[0];
    var topTrend = getTrend(0);
    heroEl.innerHTML = 
      '<div class="top-programs-hero-icon-wrapper">' +
        '<i data-lucide="' + getProgramIcon(topProgram.program) + '" stroke-width="2"></i>' +
      '</div>' +
      '<h1 class="top-programs-hero-title">' + self.escapeHtml(topProgram.program) + '</h1>' +
      '<div class="top-programs-hero-badge">' +

  renderTurnaround: function(section) {
    var summary = section && section.summary ? section.summary : {};
    var groups = Array.isArray(section && section.groups) ? section.groups : [];
    var self = this;

    // Status-specific color mapping
    var statusColors = {
      'Approved': { class: 'accent-green', color: '#10b981' },
      'Deficiency': { class: 'accent-red', color: '#ef4444' },
      'Evaluated': { class: 'accent-purple', color: '#6c5dd3' },
      'Unspecified': { class: 'accent-amber', color: '#d97706' }
    };
    var defaultAccentClasses = ["accent-teal", "accent-rose", "accent-blue", "accent-indigo"];
    var defaultAccentColors = ["#0d9488", "#e11d48", "#2563eb", "#6366f1"];

    // Render summary cards (left sidebar)
    if (Model.dom.turnaroundSummary) {
      var summaryCards = [
        { label: "Eligible Records", value: self.formatNumber(summary.eligibleRecordCount || 0) },
        { label: "Average Total Days", value: self.formatBusinessDays(summary.averageTotalDays) },
        { label: "Median Total Days", value: self.formatBusinessDays(summary.medianTotalDays) }
      ];
      Model.dom.turnaroundSummary.innerHTML = summaryCards.map(function(card) {
        return '<div class="col-12">' +
          '<div class="turnaround-metric-card">' +
            '<div class="turnaround-metric-label">' + self.escapeHtml(card.label) + '</div>' +
            '<div class="turnaround-metric-value">' + card.value + '</div>' +
          '</div>' +
        '</div>';
      }).join("");
    }

    // Build all cards array: groups + summary insights
    var allCards = [];

    // Add evaluation status groups
    groups.forEach(function(group) {
      allCards.push({
        type: 'group',
        label: group.label,
        sampleCount: group.sampleCount,
        metrics: group.metrics
      });
    });

    // Add Largest Workload Status card
    if (summary.largestWorkloadStatus) {
      allCards.push({
        type: 'insight',
        insightType: 'workload',
        headerLabel: 'Largest Workload',
        label: summary.largestWorkloadStatus,
        sampleCount: summary.largestWorkloadCount,
        description: 'Status with highest volume of records requiring attention'
      });
    }

    // Add Slowest Transition card
    if (summary.slowestTransitionLabel) {
      allCards.push({
        type: 'insight',
        insightType: 'transition',
        headerLabel: 'Slowest Transition',
        label: summary.slowestTransitionLabel,
        avgDays: summary.slowestTransitionAvg,
        description: 'Stage transition taking the longest average time'
      });
    }

    // Render all cards
    if (!Model.dom.turnaroundGroups) return;
    if (!allCards.length) {
      Model.dom.turnaroundGroups.innerHTML = '<div class="col-12">' + this.buildChartEmptyState() + '</div>';
      return;
    }

    var totalEligible = summary.eligibleRecordCount || 1;
    var defaultColorIndex = 0;

    Model.dom.turnaroundGroups.innerHTML = allCards.map(function(card, index) {
      var isInsight = card.type === 'insight';
      var isGroup = card.type === 'group';
      var accentClass, accentColor;

      // Determine color based on status or use default
      if (isGroup && statusColors[card.label]) {
        accentClass = statusColors[card.label].class;
        accentColor = statusColors[card.label].color;
      } else {
        accentClass = defaultAccentClasses[defaultColorIndex % defaultAccentClasses.length];
        accentColor = defaultAccentColors[defaultColorIndex % defaultAccentColors.length];
        defaultColorIndex++;
      }

      var cardClass = 'turnaround-status-card ' + accentClass;
      var percentOfTotal = card.sampleCount ? Math.round((card.sampleCount / totalEligible) * 100) : 0;
      var hasValidCount = card.sampleCount && !isNaN(card.sampleCount);

      // Build content based on card type
      var contentHtml = '';

      if (isInsight) {
        // Simplified design for insight cards
        if (card.insightType === 'workload' && hasValidCount) {
          // Workload insight with mini chart
          contentHtml = '<div class="turnaround-mini-chart">' +
            '<div class="turnaround-donut" style="--chart-color: ' + accentColor + '; --chart-percent: ' + percentOfTotal + '%;">' +
              '<span>' + percentOfTotal + '%</span>' +
            '</div>' +
            '<div>' +
              '<div class="fw-bold">' + self.formatNumber(card.sampleCount) + '</div>' +
              '<small class="text-muted">Records</small>' +
            '</div>' +
          '</div>' +
          '<p class="turnaround-insight-description">' + self.escapeHtml(card.description) + '</p>';
        } else if (card.insightType === 'transition' && card.avgDays) {
          // Transition insight showing average days
          contentHtml = '<div class="turnaround-insight-metric">' +
            '<div class="turnaround-insight-value">' + self.formatBusinessDays(card.avgDays) + '</div>' +
            '<div class="turnaround-insight-label">Average Transition Time</div>' +
          '</div>' +
          '<p class="turnaround-insight-description">' + self.escapeHtml(card.description) + '</p>';
        } else {
          // Fallback
          contentHtml = '<p class="turnaround-insight-description">' + self.escapeHtml(card.description) + '</p>';
        }
      } else {
        // Group cards with metrics table
        var metricsHtml = card.metrics.map(function(metric) {
          var isTotal = metric.isTotal;
          var rowClass = isTotal ? "fw-bold" : "";
          var value = metric.averageDays !== null && metric.averageDays !== undefined
            ? self.formatBusinessDays(metric.averageDays)
            : '—';
          return '<tr>' +
            '<td class="' + rowClass + '">' + self.escapeHtml(metric.label) + '</td>' +
            '<td class="text-end ' + rowClass + '">' + value + '</td>' +
          '</tr>';
        }).join("");

        contentHtml = '<table class="turnaround-table">' +
          '<thead><tr><th>Metric</th><th class="text-end">Avg. Business Days</th></tr></thead>' +
          '<tbody>' + metricsHtml + '</tbody>' +
        '</table>';
      }

      var headerLabel = isInsight ? card.headerLabel : 'Evaluation Status';

      // Build count section
      var countSectionHtml = '';
      if (!isInsight || hasValidCount) {
        var countValue = hasValidCount ? self.formatNumber(card.sampleCount) : '—';
        var countLabel = isInsight ? 'Records' : 'Eligible Records';
        countSectionHtml = '<div class="turnaround-status-count">' +
            '<div class="count-value">' + countValue + '</div>' +
            '<div class="count-label">' + countLabel + '</div>' +
          '</div>';
      }

      return '<div class="col-md-6 col-xl-4">' +
        '<div class="' + cardClass + '">' +
          '<div class="turnaround-status-header">' +
            '<div>' +
              '<div class="turnaround-status-label">' + headerLabel + '</div>' +
              '<h4 class="turnaround-status-name">' + self.escapeHtml(card.label || '—') + '</h4>' +
            '</div>' +
            countSectionHtml +
          '</div>' +
          contentHtml +
        '</div>' +
      '</div>';
    }).join("");
  },

  renderOverallStatus: function(section, yearTotal) {
    var self = this;
    var rows = section.rows || [];
    var colors = ["#6c5dd3", "#ff75a0", "#4ce1e5", "#5d5fef", "#9ca3af"];
    var labels = (rows || []).map(function(row) { return row.label || row.status || "-"; });
    var values = (rows || []).map(function(row) { return row.value || row.count || 0; });
    var sectionTotal = values.reduce(function(sum, val) { return sum + val; }, 0);
    var total = yearTotal || sectionTotal;

    // Update total count in center (show actual full number)
    var totalEl = document.getElementById("overallStatusTotal");
    var totalLabelEl = document.getElementById("overallStatusLabel");
    if (totalEl) totalEl.textContent = self.formatNumber(sectionTotal);
    if (totalLabelEl) totalLabelEl.textContent = sectionTotal === 1 ? "Total Student" : "Total Students";

    // Calculate dynamic cutout based on total Students text width
    var cutoutPercent = "75%";
    if (totalEl) {
      var totalText = self.formatNumber(sectionTotal);
      var charCount = totalText.length;
      if (charCount <= 3) cutoutPercent = "65%";
      else if (charCount <= 5) cutoutPercent = "70%";
      else if (charCount <= 7) cutoutPercent = "75%";
      else cutoutPercent = "78%";
    }

    // Render legend with actual numbers (not percentages)
    var legendEl = document.getElementById("overallStatusLegend");
    if (legendEl) {
      legendEl.innerHTML = rows.map(function(row, index) {
        var val = row.value || row.count || 0;
        return "<li class='legend-item'>" +
          "<div><span class='legend-dot' style='background-color: " + colors[index % colors.length] + "'></span>" + self.escapeHtml(row.label || row.status || "-") + "</div>" +
          "<span class='fw-bold'>" + self.formatNumber(val) + "</span>" +
        "</li>";
      }).join("");
    }

    // Render donut chart - use custom rendering to preserve overlay
    var chartContainer = document.querySelector(".status-chart-col .chart-wrapper");
    if (chartContainer) {
      // Clear previous chart but keep overlay
      this.destroyChart("overallStatusChart");
      var existingCanvas = chartContainer.querySelector("canvas");
      if (existingCanvas) existingCanvas.remove();

      // Create new canvas
      var canvas = document.createElement("canvas");
      canvas.id = "overallStatusChartCanvas";
      canvas.style.maxHeight = "100%";
      canvas.style.maxWidth = "100%";
      chartContainer.appendChild(canvas);

      // Render chart with external tooltip
      this.renderChart("overallStatusChart", canvas, {
        type: "doughnut",
        data: {
          labels: labels,
          datasets: [{
            data: values,
            backgroundColor: colors,
            borderWidth: 0,
            cutout: cutoutPercent,
            hoverOffset: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          layout: { padding: 10 },
          plugins: {
            legend: { display: false },
            tooltip: {
              enabled: false,
              external: function(context) {
                var tooltipEl = document.getElementById("chartjs-tooltip");
                if (!tooltipEl) {
                  tooltipEl = document.createElement("div");
                  tooltipEl.id = "chartjs-tooltip";
                  tooltipEl.style.background = "rgba(30, 41, 59, 0.95)";
                  tooltipEl.style.color = "#fff";
                  tooltipEl.style.borderRadius = "8px";
                  tooltipEl.style.padding = "10px 12px";
                  tooltipEl.style.fontSize = "13px";
                  tooltipEl.style.fontWeight = "500";
                  tooltipEl.style.pointerEvents = "none";
                  tooltipEl.style.position = "absolute";
                  tooltipEl.style.zIndex = "100";
                  tooltipEl.style.boxShadow = "0 4px 12px rgba(0,0,0,0.15)";
                  tooltipEl.style.border = "1px solid rgba(255,255,255,0.1)";
                  tooltipEl.style.transition = "opacity 0.2s";
                  document.body.appendChild(tooltipEl);
                }

                var tooltipModel = context.tooltip;
                if (tooltipModel.opacity === 0) {
                  tooltipEl.style.opacity = "0";
                  return;
                }

                if (tooltipModel.body) {
                  var dataPoint = tooltipModel.dataPoints[0];
                  var val = dataPoint.parsed || 0;
                  var pct = sectionTotal > 0 ? Math.round((val / sectionTotal) * 100) : 0;
                  var color = dataPoint.dataset.backgroundColor[dataPoint.dataIndex];
                  tooltipEl.innerHTML = "<div style='display:flex;align-items:center;gap:8px;'><span style='display:inline-block;width:10px;height:10px;border-radius:50%;background:" + color + "'></span><span>" + dataPoint.label + ": " + self.formatNumber(val) + " (" + pct + "%)</span></div>";
                }

                var canvas = context.chart.canvas;
                var rect = canvas.getBoundingClientRect();
                var tooltipRect = tooltipEl.getBoundingClientRect();

                // Position tooltip above the chart (outside the donut)
                var top = rect.top + window.scrollY - tooltipRect.height - 12;
                var left = rect.left + window.scrollX + (rect.width / 2) - (tooltipRect.width / 2);

                tooltipEl.style.opacity = "1";
                tooltipEl.style.top = top + "px";
                tooltipEl.style.left = left + "px";
              }
            }
          },
          elements: { arc: { borderRadius: 8 } }
        }
      });
    }
  },

          '</div>' +
          '<div class="exec-location-value">' + self.formatNumber(value) + '</div>' +
        '</div>';
      }).join("");

  renderMonthlyVolume: function(section) {
    var self = this;
    var rows = Array.isArray(section && section.rows) ? section.rows.slice() : [];
    Model.monthlyVolumeRows = rows;
    this.populateMonthlyYearSelect();
    var selectedYear = Model.monthlyYear || (Model.dom.monthlyYearSelect ? Model.dom.monthlyYearSelect.value : "");
    var filteredRows = Model.filterMonthlyRowsByYear(rows, selectedYear);
    if (!filteredRows.length && rows.length) {
      var fallbackYears = Model.extractAvailableYears(rows);
      var currentCalendarYear = String(new Date().getFullYear());
      selectedYear = fallbackYears.indexOf(currentCalendarYear) !== -1 ? currentCalendarYear : (fallbackYears[0] || "");
      Model.monthlyYear = selectedYear;
      if (Model.dom.monthlyYearSelect) Model.dom.monthlyYearSelect.value = selectedYear;
      filteredRows = Model.filterMonthlyRowsByYear(rows, selectedYear);
    }

    // Show highest monthly value instead of total
    var totalEl = document.getElementById("monthlyVolumeTotal");
    var maxVal = filteredRows.length > 0 ? Math.max.apply(Math, filteredRows.map(function(r) { return r.value || 0; })) : 0;
    if (totalEl) totalEl.textContent = self.formatNumber(maxVal);

    // Render mini bar chart
    if (Model.dom.monthlyVolumeBars) {
      if (!filteredRows.length) {
        Model.dom.monthlyVolumeBars.innerHTML = '<div class="text-muted text-center">No Data</div>';

            '<div class="exec-bar-value">' + self.formatNumber(value) + '</div>' +
            '<div class="exec-bar ' + (isHigh ? 'active' : '') + '" style="height: ' + heightPercent.toFixed(1) + '%"></div>' +
            '<div class="exec-bar-label">' + self.escapeHtml(shortLabel) + '</div>' +
          '</div>';
        }).join("") +
        '</div></div>';

  populateMonthlyYearSelect: function() {
    if (!Model.dom.monthlyYearSelect) return;
    var years = (Model.referenceData.availableYears && Model.referenceData.availableYears.length)
      ? Model.referenceData.availableYears.slice()
      : Model.extractAvailableYearsFromRecords(Model.fullData);
    var currentCalendarYear = String(new Date().getFullYear());
    var current = Model.monthlyYear && years.indexOf(Model.monthlyYear) !== -1 ? Model.monthlyYear : "";
    if (!current && years.indexOf(currentCalendarYear) !== -1) current = currentCalendarYear;
    if (!current) current = years.length ? years[0] : "";
    Model.monthlyYear = current;
    var self = this;
    Model.dom.monthlyYearSelect.innerHTML = years.length ? years.map(function(year) {
      return '<option value="' + self.escapeHtml(year) + '">' + self.escapeHtml(year) + '</option>';
    }).join("") : '<option value="">No Years</option>';
    Model.dom.monthlyYearSelect.value = current;
    Model.dom.monthlyYearSelect.disabled = !years.length;
  },

    if (tableBody) {
      if (!rows.length) {
        tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">No Data Available</td></tr>';
        if (ringChart) ringChart.innerHTML = '<circle cx="160" cy="160" r="120" stroke="#f0f0f0" stroke-width="35" fill="transparent" />';
        if (dataLabels) dataLabels.innerHTML = '';
        return;
      }

      // Calculate ring chart segments
      var circumference = 2 * Math.PI * 120; // r = 120
      var currentOffset = 0;
      var ringSegments = [];

      // Render ALL table rows
      tableBody.innerHTML = rows.map(function(row, index) {
        var color = paletteColors[index % paletteColors.length];
        var completed = row.completed || 0;
        var pending = row.pending || 0;
        var totalRow = row.totalHandled || 0;
        var isDimmed = index >= 3; // Dim rows after top 3

        // Calculate segment for ring chart
        var segmentLength = total > 0 ? (totalRow / total) * circumference : 0;
        var segmentOffset = currentOffset;
        currentOffset += segmentLength;

        ringSegments.push({
          color: color,
          length: segmentLength,
          offset: segmentOffset,
          name: row.person,
          value: pending
        });

        return '<tr class="' + (isDimmed ? 'exec-staff-dimmed' : '') + '">' +
          '<td><span class="exec-staff-dot" style="background: ' + color + ';"></span>' + self.escapeHtml(row.person || '-') + '</td>' +
          '<td class="exec-staff-muted">' + self.formatNumber(completed) + '</td>' +
          '<td class="exec-staff-pending">' + self.formatNumber(pending) + '</td>' +
          '<td class="exec-staff-total">' + self.formatNumber(totalRow) + '</td>' +
        '</tr>';
      }).join("");

      // Render ring chart segments
      if (ringChart) {
        var svgContent = '<circle cx="160" cy="160" r="120" stroke="#f0f0f0" stroke-width="35" fill="transparent" />';
        ringSegments.forEach(function(seg, i) {
          var dashArray = seg.length + ' ' + (circumference - seg.length);
          var strokeDashoffset = -seg.offset;
          svgContent += '<circle cx="160" cy="160" r="120" stroke="' + seg.color + '" stroke-dasharray="' + dashArray + '" stroke-dashoffset="' + strokeDashoffset + '" fill="transparent" stroke-width="35" stroke-linecap="round" class="exec-ring-segment" />';
        });
        ringChart.innerHTML = svgContent;
      }

      // Render floating labels for top 5 segments (if we have that many)
      if (dataLabels) {
        var topSegments = ringSegments.slice(0, Math.min(5, ringSegments.length));
        var labelPositionsCalc = [
          { bottom: '15%', right: '5%' },
          { top: '15%', left: '25%' },
          { bottom: '35%', left: '10%' },
          { top: '35%', right: '15%' },
          { bottom: '55%', right: '20%' }
        ];
        dataLabels.innerHTML = topSegments.map(function(seg, i) {
          var pos = labelPositionsCalc[i] || { bottom: '50%', left: '50%' };
          var style = Object.keys(pos).map(function(k) { return k + ': ' + pos[k]; }).join('; ');
          var darkClass = i === 0 ? ' dark' : '';
          return '<div class="exec-data-label' + darkClass + '" style="' + style + '">' + self.formatNumber(seg.value) + '</div>';
        }).join('');
      }
    }
  },

  renderChartBlock: function(container, chartKey, config, isMini) {
    if (!container) return;
    var dataPoints = [];
    if (config && config.data && config.data.datasets) {
      config.data.datasets.forEach(function(dataset) {
        dataPoints = dataPoints.concat(dataset.data || []);
      });
    }
    var hasData = dataPoints.some(function(value) { return Number(value || 0) > 0; });
    if (!hasData) {
      this.destroyChart(chartKey);
      container.innerHTML = this.buildChartEmptyState();
      return;
    }
    var canvasId = chartKey + "Canvas";
    container.innerHTML = '<div class="report-chart-block' + (isMini ? ' report-chart-block-mini' : '') + '"><canvas id="' + canvasId + '" class="report-chart-canvas"></canvas></div>';
    this.renderChart(chartKey, document.getElementById(canvasId), config);
  },

  renderChart: function(chartKey, canvas, config) {
    if (!canvas) return;
    this.destroyChart(chartKey);
    this.chartRegistry[chartKey] = new Chart(canvas, config);
  },

  destroyChart: function(chartKey) {
    if (this.chartRegistry[chartKey]) {
      this.chartRegistry[chartKey].destroy();
      delete this.chartRegistry[chartKey];
    }
  },

    });

  renderDetailModal: function(detail) {

    if (Model.dom.detailModalTitle) Model.dom.detailModalTitle.textContent = detail.name || "Analytics Detail";

    if (Model.dom.detailModalMeta) {
      var totalCount = Number(detail.totalCount || 0);
      var displayedCount = Number(detail.displayedRecordCount || totalCount);
      var page = Number(detail.page || 1);
      var pageCount = Number(detail.pageCount || 1);
      var metaMessage = "Showing " + this.formatNumber(displayedCount) + " records on page " + page + " of " + pageCount;
      if (totalCount > displayedCount || pageCount > 1) {
        metaMessage += ". Total matches: " + this.formatNumber(totalCount);
      }
      Model.dom.detailModalMeta.textContent = metaMessage;
      Model.dom.detailModalMeta.classList.remove("d-none");
    }

    // Summary cards
    if (Model.dom.detailModalSummary) {
      Model.dom.detailModalSummary.innerHTML = detail.compactStatusModal ? "" : this.buildModalSummaryCards(detail.summary);
      this.toggleDetailSection(Model.dom.detailModalSummary, !detail.compactStatusModal);
    }

    // ── Status Trend (ES2 only) ──────────────────────────────────────────
    var statusTrendSection = Model.dom.detailModalStatusTrend
      ? Model.dom.detailModalStatusTrend.closest('section') : null;
    var isEs2Modal = detail.kind === "ES II Owner" || detail.kind === "es2InCharge";
    var statusTrendData = detail.statusTrendRows || detail.statusTrend || [];

    if (Model.dom.detailModalStatusTrend) {
      if (!isEs2Modal) {
        if (statusTrendSection) statusTrendSection.classList.add('d-none');

        if (statusTrendSection) statusTrendSection.classList.remove('d-none');
        this.renderModalStatusTrend(Model.dom.detailModalStatusTrend, statusTrendData, detail.name);
      }
    }

    // ── Programs (Top Programs design) ──────────────────────────────────
    if (Model.dom.detailModalPrograms) {
      this.renderModalPrograms(Model.dom.detailModalPrograms, detail.programRows || detail.programs || []);
    }

    // ── Overall Status (Donut design) ────────────────────────────────────
    if (Model.dom.detailModalOverallStatus) {
      if (detail.compactStatusModal) {
        this.destroyChart("detailOverallStatusChart");
        Model.dom.detailModalOverallStatus.innerHTML = "";
      } else {
        this.renderModalOverallStatus(Model.dom.detailModalOverallStatus, detail.overallStatusRows || detail.overallStatus || []);

      this.toggleDetailSection(Model.dom.detailModalOverallStatus, !detail.compactStatusModal);

    // ── Status Progression (Pipeline bars design) ────────────────────────
    if (Model.dom.detailModalProgression) {
      if (detail.compactStatusModal) {
        this.destroyChart("detailProgressionChart");
        Model.dom.detailModalProgression.innerHTML = "";
      } else {
        var progressionData = detail.statusProgressionRows || detail.statusProgression || detail.overallStatus || [];
        this.renderModalStatusProgression(Model.dom.detailModalProgression, progressionData, totalCount);
      }
      this.toggleDetailSection(Model.dom.detailModalProgression, !detail.compactStatusModal);
    }

    // ── Locations (Location Load design) ────────────────────────────────
    if (Model.dom.detailModalLocations) {
      this.renderModalLocations(Model.dom.detailModalLocations, detail.locationRows || detail.locations || []);
    }

    // ── Table ────────────────────────────────────────────────────────────
    this.renderDetailModalTable(detail.modalColumns || [
      { label: "Record ID", field: "recordId" },
      { label: "Student Name", field: "studentName" },
      { label: "Program", field: "program" },
      { label: "Status", field: "canonicalStatus" },
      { label: "Location", field: "currentLocation" },
      { label: "Date Received", field: "dateReceived" }
    ], detail.rows || []);

    this.renderDetailModalPagination(detail);

  // Helper methods matching Executive Dashboard
  buildModalSummaryCards: function(summary) {
    if (!summary) return "";
    var cards = [
      { label: "Total Records", value: summary.totalCount || 0 },
      { label: "Programs", value: summary.programCount || 0 },
      { label: "Locations", value: summary.locationCount || 0 },
      { label: "Status Types", value: summary.statusTypeCount || 0 }
    ];
    return cards.map(function(card) {
      return '<div class="report-stat-card report-stat-card-compact"><span class="report-stat-label">' + card.label + '</span><strong class="report-stat-value">' + this.formatNumber(card.value) + '</strong></div>';
    }.bind(this)).join("");
  },

  toggleDetailSection: function(element, show) {
    if (!element) return;
    var card = element.closest(".report-card");
    if (card) card.classList.toggle("d-none", !show);
  },

  renderDetailModalTable: function(columns, records) {
    if (Model.dom.detailModalTableHead) {
      Model.dom.detailModalTableHead.innerHTML = "<tr>" + columns.map(function(column) {
        return "<th>" + this.escapeHtml(column.label) + "</th>";
      }.bind(this)).join("") + "</tr>";
    }
    if (Model.dom.detailModalTableBody) {
      Model.dom.detailModalTableBody.innerHTML = records.length ? records.map(function(record, rowIndex) {
        return "<tr>" + columns.map(function(column, colIndex) {
          var value = record[column.field];
          if (value === null || value === undefined) value = "";
          var strValue = this.escapeHtml(String(value));
          // Apply styling based on column position
          if (colIndex === 0) {
            // Record ID - monospace styling
            return '<td class="id-text">' + strValue + '</td>';
          } else if (colIndex === 1) {
            // Student Name - bold
            return '<td class="fw-bold">' + strValue + '</td>';
          } else if (column.field.toLowerCase().includes('status') || column.label.toLowerCase().includes('status')) {
            // Status column - apply badge styling
            var statusClass = this.getStatusBadgeClass(strValue);
            return '<td><span class="status-badge ' + statusClass + '">' + strValue + '</span></td>';
          } else {
            return "<td>" + strValue + "</td>";
          }
        }.bind(this)).join("") + "</tr>";
      }.bind(this)).join("") : '<tr><td colspan="' + columns.length + '" class="text-center text-muted py-4">No records found</td></tr>';
    }
  },

  getStatusBadgeClass: function(status) {
    var normalized = String(status || "").toLowerCase().trim();
    if (normalized.includes('evaluation') || normalized.includes('pending')) {
      return 'status-evaluation';
    } else if (normalized.includes('processed') || normalized.includes('complete') || normalized.includes('done')) {
      return 'status-processed';
    } else if (normalized.includes('cancel') || normalized.includes('reject')) {
      return 'status-cancelled';
    }
    return '';
  },

  renderDetailModalPagination: function(pagination) {
    if (!pagination) return;
    var currentPage = pagination.page || 1;
    var totalPages = pagination.pageCount || 1;
    
    if (Model.dom.detailModalPageStatus) {
      Model.dom.detailModalPageStatus.textContent = "Page " + currentPage + " of " + totalPages;
    }
    if (Model.dom.detailModalPrevPage) {
      Model.dom.detailModalPrevPage.disabled = currentPage <= 1;
    }
    if (Model.dom.detailModalNextPage) {
      Model.dom.detailModalNextPage.disabled = currentPage >= totalPages;
    }
  },

  buildBarsHtml: function(rows) {
    if (!rows || rows.length === 0) {
      return this.buildSilentEmptyState();
    }
    var max = Math.max.apply(Math, rows.map(function(r) { return r.value || 0; }));
    return rows.map(function(row) {
      var pct = max > 0 ? Math.round((row.value || 0) / max * 100) : 0;
      return '<div class="report-bar-row">' +
        '<div class="report-bar-text">' +
          '<span class="report-bar-label">' + this.escapeHtml(row.label || "") + '</span>' +
          '<span class="report-bar-value">' + this.formatNumber(row.value || 0) + '</span>' +
        '</div>' +
        '<div class="report-bar-track">' +
          '<span class="report-bar-fill" style="width:' + pct + '%"></span>' +
        '</div>' +
      '</div>';
    }.bind(this)).join("");
  },

  // ── Modal: Application Status Trend ─────────────────────────────────────
  renderModalStatusTrend: function(container, rows, ownerName) {
    var self = this;
    if (!container) return;

    // Build month/status map
    var monthSet = {};
    var statusSet = {};
    var monthKeyToLabel = {};

    rows.forEach(function(row) {
      if (row.month) {
        monthSet[row.month] = true;
        // Normalize YYYY-MM to "Jan 2026" format
        if (!monthKeyToLabel[row.month]) {
          var match = String(row.month).match(/^(\d{4})-(\d{2})$/);
          if (match) {
            var monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            var mIdx = parseInt(match[2], 10) - 1;
            monthKeyToLabel[row.month] = (mIdx >= 0 && mIdx < 12)
              ? monthNames[mIdx] + " " + match[1]
              : row.month;
          } else {
            monthKeyToLabel[row.month] = row.month;
          }
        }
      }
      if (row.label) statusSet[row.label] = true;
    });

    // Sort by raw YYYY-MM key, then map to display labels
    var monthKeys = Object.keys(monthSet).sort();
    var months = monthKeys.map(function(k) { return monthKeyToLabel[k]; });
    var statuses = Object.keys(statusSet);

    if (!months.length || !statuses.length) {
      container.innerHTML = '<div class="text-muted text-center py-4" style="font-size:0.9rem;">No status trend data available for this owner.</div>';
      return;
    }

    // Status colors matching main dashboard
    var statusColorMap = {
      "For Evaluation": "#ff9500",
      "Evaluated":      "#00d4aa",
      "Deficiency":     "#ff2d55",
      "Approved":       "#34c759",
      "Verified":       "#af52de",
      "For Signature":  "#ffcc00",
      "For Release":    "#007aff",
      "Released":       "#5856d6",
      "Cancelled":      "#8e8e93"
    };

    // Build datasets
    var dataByStatus = {};
    statuses.forEach(function(s) {
      dataByStatus[s] = monthKeys.map(function() { return 0; });
    });
    rows.forEach(function(row) {
      var mIdx = monthKeys.indexOf(row.month);
      if (mIdx !== -1 && row.label && dataByStatus[row.label]) {
        dataByStatus[row.label][mIdx] = Number(row.value || row.count || 0);
      }
    });

    var datasets = statuses.map(function(s) {
      var color = statusColorMap[s] || "#1f429b";
      return {
        label: s,
        data: dataByStatus[s],
        fill: true,
        backgroundColor: color + "20",
        borderColor: color,
        borderWidth: 2,
        tension: 0.4,
        pointRadius: 3,
        pointHoverRadius: 5,
        pointBackgroundColor: color,
        pointBorderColor: "#fff",
        pointBorderWidth: 2
      };
    });

    // Sliding window (same as main dashboard)
    var WINDOW = 8;
    var winStart = Math.max(0, months.length - WINDOW);
    var maxWinStart = Math.max(0, months.length - WINDOW);

    var legendId   = "modalTrendLegend_" + Date.now();
    var prevId     = "modalTrendPrev_"   + Date.now();
    var nextId     = "modalTrendNext_"   + Date.now();
    var navLabelId = "modalTrendNav_"    + Date.now();
    var canvasId   = "modalTrendCanvas_" + Date.now();

    container.innerHTML =
      '<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:12px;" id="' + legendId + '"></div>' +
      '<div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px;">' +
        '<button type="button" class="summary-trend-chart-nav-btn" id="' + prevId + '">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>' +
        '</button>' +
        '<span class="summary-trend-chart-nav-label" id="' + navLabelId + '"></span>' +
        '<button type="button" class="summary-trend-chart-nav-btn" id="' + nextId + '">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>' +
        '</button>' +
      '</div>' +
      '<div style="position:relative;height:220px;"><canvas id="' + canvasId + '"></canvas></div>';

    function getSlice() {
      var end = Math.min(winStart + WINDOW, months.length);
      return {
        labels: months.slice(winStart, end),
        datasets: datasets.map(function(d) {
          return Object.assign({}, d, { data: d.data.slice(winStart, end) });
        })
      };
    }

    function updateNav() {
      var prevBtn  = document.getElementById(prevId);
      var nextBtn  = document.getElementById(nextId);
      var navLabel = document.getElementById(navLabelId);
      if (prevBtn)  prevBtn.disabled  = winStart === 0;
      if (nextBtn)  nextBtn.disabled  = winStart >= maxWinStart;
      if (navLabel) {
        var end = Math.min(winStart + WINDOW, months.length);
        navLabel.textContent = months[winStart] + " – " + months[end - 1];
      }
    }

    var canvas = document.getElementById(canvasId);
    if (!canvas) return;

    self.destroyChart("modalStatusTrendChart");
    var slice = getSlice();
    var chart = new Chart(canvas.getContext("2d"), {
      type: "line",
      data: { labels: slice.labels, datasets: slice.datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "rgba(255,255,255,0.98)",
            titleColor: "#1e293b",
            bodyColor: "#334155",
            borderColor: "#cbd5e1",
            borderWidth: 1,
            padding: 10,
            cornerRadius: 8,
            usePointStyle: true,
            callbacks: {
              label: function(ctx) {
                return " " + ctx.dataset.label + ": " + ctx.parsed.y.toLocaleString();
              }
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: "#64748b", font: { size: 10 } } },
          y: { display: true, position: "right", grid: { display: false },
              ticks: { color: "#64748b", font: { size: 10 },
                        callback: function(v) { return v.toLocaleString(); } } }
        }
      }
    });
    self.chartRegistry["modalStatusTrendChart"] = chart;

    // Legend
    var legendEl = document.getElementById(legendId);
    if (legendEl) {
      datasets.forEach(function(d, i) {
        var item = document.createElement("div");
        item.className = "summary-trend-chart-legend-item";
        item.dataset.index = i;
        item.innerHTML =
          '<span class="summary-trend-chart-legend-color" style="background:' + d.borderColor + '"></span>' +
          '<span>' + d.label + '</span>';
        item.addEventListener("click", function() {
          var meta = chart.getDatasetMeta(parseInt(this.dataset.index));
          meta.hidden = !meta.hidden;
          this.classList.toggle("hidden", !!meta.hidden);
          chart.update();
        });
        legendEl.appendChild(item);
      });
    }

    // Nav buttons
    var prevBtn = document.getElementById(prevId);
    var nextBtn = document.getElementById(nextId);
    if (prevBtn) prevBtn.onclick = function() {
      if (winStart > 0) { winStart = Math.max(0, winStart - WINDOW); updateNav(); updateChart(); }
    };
    if (nextBtn) nextBtn.onclick = function() {
      if (winStart < maxWinStart) { winStart = Math.min(maxWinStart, winStart + WINDOW); updateNav(); updateChart(); }
    };

    function updateChart() {
      var s = getSlice();
      chart.data.labels = s.labels;
      chart.data.datasets.forEach(function(d, i) { d.data = s.datasets[i].data; });
      chart.update('none');
    }

    updateNav();
  },

  // ── Modal: Programs (Top Programs split-panel design) ────────────────────
  renderModalPrograms: function(container, rows) {
    var self = this;
    if (!container) return;

    if (!rows || !rows.length) {
      container.innerHTML = '<div class="text-muted text-center py-4" style="font-size:0.9rem;">No program data available.</div>';
      return;
    }

    function getProgramIcon(name) {
      var n = (name || '').toLowerCase();
      if (n.includes('business') || n.includes('admin')) return 'briefcase';
      if (n.includes('crim')) return 'shield';
      if (n.includes('education') || n.includes('elementary') || n.includes('secondary')) return 'book-open';
      if (n.includes('nursing') || n.includes('med') || n.includes('health')) return 'heart-pulse';
      if (n.includes('engineer') || n.includes('tech') || n.includes('computer') || n.includes('it')) return 'monitor';
      if (n.includes('hospitality') || n.includes('tour')) return 'building';
      if (n.includes('account') || n.includes('finance')) return 'calculator';
      if (n.includes('law') || n.includes('legal')) return 'scale';
      if (n.includes('art') || n.includes('design')) return 'palette';
      if (n.includes('sci') || n.includes('bio') || n.includes('chem')) return 'flask-conical';
      return 'graduation-cap';
    }

    var top = rows[0];
    var rest = rows.slice(1, 10);

    // Compact split-panel matching main dashboard but sized for modal
