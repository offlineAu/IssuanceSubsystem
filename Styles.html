/* Navbar redesign */

body {
  font-family: "Plus Jakarta Sans", "Inter", sans-serif;
  background: var(--bg-soft);
  color: var(--text-strong);
}

.page-shell {
  width: 100%;
  padding-top: 18px;
  padding-bottom: 24px;
  max-width: calc(var(--content-width) + (var(--page-gutter) * 2));
  padding-left: var(--page-gutter);
  padding-right: var(--page-gutter);
  margin: 0 auto;
}

.app-navbar {
  position: sticky;
  top: 0;
  z-index: 1030;
  padding: 0 !important;
  background: var(--ched-navy);
  border-radius: 12px 12px 0 0;
  overflow: visible;
}

/* Gold Ribbon/Border Slant - pseudo element on navbar */
.app-navbar-shell::before {
  content: "";
  position: absolute;
  left: -120px;
  top: 0;
  height: 100px;
  width: 500px;
  background:
    linear-gradient(180deg, rgba(233, 216, 180, 0.98) 0%, rgba(216, 196, 158, 0.98) 100%);
  box-shadow:
    0 12px 22px rgba(9, 19, 48, 0.12),
    0 1px 0 rgba(255,255,255,0.32) inset,
    0 -18px 24px rgba(113, 89, 47, 0.08) inset;
  clip-path: polygon(0 0, 88% 0, 100% 100%, 0% 100%);
  z-index: 2;
}

.app-navbar-shell {
  width: min(100%, var(--app-navbar-max-width));
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  position: relative;
}

.app-navbar-top {
  display: flex;
  align-items: center;
  height: 100px;
  position: relative;
}

.app-navbar-logo-slot {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 500px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  overflow: visible;
  z-index: 10;
}

.app-navbar-logo-placeholder {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  padding: 0;
  background: transparent;
  color: rgba(49, 54, 70, 0.7);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.app-navbar-logo-inner {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  padding: 0 20px;
  margin-left: -170px;
}
.app-navbar-logo-loading {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: rgba(57, 67, 86, 0.78);
  font-size: 0.88rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-left: -250px;
}

.app-navbar-logo-placeholder.is-loading .app-navbar-logo-loading {
  display: inline-flex;
}

.app-navbar-logo-placeholder.is-loading .app-navbar-logo-inner {
  visibility: hidden;
}

.app-navbar-logo-loading-dot {
  width: 12px;
  height: 12px;
  border-radius: 999px;
  background: #274784;
  box-shadow: 0 0 0 0 rgba(39, 71, 132, 0.34);
  animation: logoPulse 1.2s ease-out infinite;
}

@keyframes logoPulse {
  0% {
    transform: scale(0.94);
    box-shadow: 0 0 0 0 rgba(39, 71, 132, 0.34);
  }
  70% {
    transform: scale(1);
    box-shadow: 0 0 0 10px rgba(39, 71, 132, 0);
  }
  100% {
    transform: scale(0.94);
    box-shadow: 0 0 0 0 rgba(39, 71, 132, 0);
  }
}

.app-navbar-logo-image {
  display: block;
  max-width: 100%;
  width: auto;
  max-height: 125px;
  object-fit: contain;
  filter: drop-shadow(0 6px 10px rgba(52, 57, 77, 0.12));
}

.app-navbar-logo-fallback {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 88px;
  height: 88px;
  border-radius: 999px;
  border: 2px solid rgba(76, 99, 134, 0.28);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.62);
  color: #29416c;
  font-size: 1.55rem;
  font-weight: 800;
  letter-spacing: 0.08em;
}

.app-navbar-title-wrap {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 10px;
  padding: 0 20px;
  text-align: center;
  flex-grow: 1;
  margin-left: 380px;
  margin-right: 20px;
}

.app-navbar-kicker {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 4px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.82);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.app-navbar-title {
  margin: 0;
  color: var(--ched-gold);
  font-size: clamp(1.4rem, 2.5vw, 2.4rem);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}
