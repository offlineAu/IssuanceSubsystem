<script>
var Model = {
  fullData: [],
  filteredData: [],
  batchStudents: [],
  editingRowID: null,
  previewSO: null,
  searchMode: false,
  activeSearchToken: 0,
  currentPage: 1,
  rowsPerPage: 10,
  totalRows: 0,
  nextBatchStart: 2,
  nextBatchSize: 20000,
  initialBatchSize: 1000,
  loadingBatches: false,
  autoPrefillDisabled: false,
  dateSyncInProgress: false,
  soPrefixes: [],
  batchConfirmed: false,
  batchHasChanges: false,
  verificationFilterMain: ["verified", "deficiency", "unverified"],
  verificationFilterModal: ["verified", "deficiency", "unverified"],
  activeBatchSearchToken: 0,
  lastMainSearchTerm: "",
  lastBatchSearchTerm: "",
  isSearchingMain: false,
  listenersBound: false,
  lastFocusedStudentRow: null,
  historyRows: [],
  saveFailureRows: [],
  localSaveFailureRows: [],
  isHistoryLoading: false,
  isSaveFailureLoading: false,
  isSavingBatch: false,
  userRole: "Viewer",
  accessContext: {
    email: "",
    knownUser: false,
    name: "",
    position: "",
    accessType: "",
    profileId: "",
    scope: "all",
    actions: { create: false, read: true, update: false, delete: false },
    isPrivileged: false,
    editableFieldKeys: [],
    readOnlyFieldKeys: [],
    canUpdateAny: false,
    canEditRecord: false,
    isAssigned: false,
    assignmentColumn: "",
    denyReason: ""
  },
  userDebugInfo: {
    activeEmail: "",
    effectiveEmail: "",
    resolvedEmail: "",
    resolvedSource: "",
    userFound: false,
    profileFound: false,
    denyReason: ""
  },
  userPositionFieldSchema: {
    sessionEmail: "",
    source: "",
    position: "",
    accessType: "",
    profileId: "",
    knownUser: false,
    isPrivileged: false,
    fields: [],
    placeholderFields: [],
    liveIssuanceFields: [],
    denyReason: ""
  },
  recordViewConfig: {
    mode: "developer",
    supportsIssuanceEditor: true,
    showVerificationFilters: true,
    dataColumns: [],
    tableColumns: [],
    modalFields: []
  },
  currentRecordPermissions: null,
  lastDatabaseUpdateAt: "0",
  isSyncingRow: false,
  statusEditConfirmed: false,
  activeMainView: "home",
  historyLoadedOnce: false,
  historyFailureLoadedOnce: false,
  activeHistorySection: "success",
  lastSaveOutcomeSummary: "",

  setEditingRow: function(id) {
    this.editingRowID = id;
  },

  clearEditing: function() {
    this.editingRowID = null;
    this.previewSO = null;
    this.batchStudents = [];
    this.batchConfirmed = false;
    this.batchHasChanges = false;
    this.statusEditConfirmed = false;
    this.currentRecordPermissions = null;
  },

  setLastFocusedStudent: function(rowID) {
    this.lastFocusedStudentRow = rowID ? String(rowID) : null;
  },

  getCurrentStudent: function() {
    return this.fullData.find(function(r) { return String(r._row) === String(Model.editingRowID); });
  },

  shouldUseVerificationFilter: function() {
    return !!(this.recordViewConfig && this.recordViewConfig.showVerificationFilters);
  },

  applyMainViewFilters: function(rows) {
    var source = Array.isArray(rows) ? rows : [];
    if (!this.shouldUseVerificationFilter()) return source.slice();
    return source.filter(function(r) {
      return Model.passesVerificationFilter(r["Verification Status"], Model.verificationFilterMain);
    });
  },

  evaluateRecordPermissions: function(student) {
    var base = this.accessContext || {};
    var actions = base.actions || { create: false, read: true, update: false, delete: false };
    var editableFieldKeys = Array.isArray(base.editableFieldKeys) ? base.editableFieldKeys.slice() : [];
    var assignmentColumn = String(base.assignmentColumn || "");
    var assignmentValue = student ? String(student[assignmentColumn] || "").trim() : "";
    var assignedEmailsMatch = assignmentValue.toLowerCase().match(/[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}/g);
    var assignedEmails = assignedEmailsMatch ? assignedEmailsMatch : [];
    var userEmail = String(base.email || "").trim().toLowerCase();
    var isAssigned = !assignmentValue ? false : assignedEmails.indexOf(userEmail) !== -1;
    var isPrivileged = !!base.isPrivileged;
    var canEditRecord = !!actions.update && !!editableFieldKeys.length && (isPrivileged ? true : (base.scope === "all" ? true : isAssigned));
    var denyReason = "";
    if (!base.email) {
      denyReason = "Unable to determine the current signed-in user.";
    } else if (!base.knownUser) {
      denyReason = base.denyReason || "Your email is not registered in the Users sheet.";
    } else if (!actions.update) {
      denyReason = base.denyReason || "Your access type does not allow updates.";
    } else if (!editableFieldKeys.length) {
      denyReason = base.denyReason || "Your position does not allow editing issuance fields.";
    } else if (base.scope === "assigned" && !assignmentColumn && !isPrivileged) {
      denyReason = "No assignment field mapping exists for issuance updates.";
    } else if (base.scope === "assigned" && !isAssigned) {
      denyReason = "This record is not assigned to your email.";
    }
    return {
      canEditRecord: canEditRecord,
      isAssigned: isAssigned,
      editableFieldKeys: editableFieldKeys,
      readOnlyFieldKeys: Array.isArray(base.readOnlyFieldKeys) ? base.readOnlyFieldKeys.slice() : [],
      assignmentValue: assignmentValue,
      denyReason: denyReason
    };
  },

  parseSoNo: function(soNo) {
    var raw = String(soNo || "").trim();
    if (!raw) return { prefix: "", number: "", normalized: "" };
    var parts = raw.split("-");
    if (parts.length < 2) return { prefix: raw, number: "", normalized: raw };
    var prefix = String(parts[0] || "").trim();
    var number = String(parts.slice(1).join("-") || "").trim();
    return { prefix: prefix, number: number, normalized: prefix && number ? (prefix + "-" + number) : raw };
  },

  formatSoNo: function(prefix, number) {
    var p = String(prefix || "").trim();
    var n = String(number || "").trim();
    if (!p || !n) return "";
    return p + "-" + n;
  },

  normalizeStudentToBatchEntry: function(student) {
    var existingSo = String(student["SO No."] || "").trim();
    var parsed = this.parseSoNo(existingSo);
    var currentYear = String(new Date().getFullYear());
    return {
      _row: student._row,
      ID: student.ID || "",
      name: student["Name of the Student"] || "",
      HEI: student.HEI || "",
      hasExistingSO: !!existingSo,
      existingSO: existingSo,
      previewSO: existingSo,
      overrides: this.getDefaultOverrides(),
      fields: {
        dateReceived: student["Issuance and Encoding of No.: Date Received"] || "",
        dateAccomplished: student["Issuance and Encoding of No.: Date Accomplished"] || "",
        status: student["Issuance and Encoding of No.: Status"] || "",
        remarks: student["Issuance and Encoding of No.: Remarks"] || "",
        dateForwarded: student["Issuance and Encoding of No.: Date Forwarded"] || "",
        soPrefix: parsed.prefix || "",
        soNumber: parsed.number || "",
        soNo: existingSo || "",
        series: student["Series"] || currentYear,
        dateSOIssuance: student["Date of SO Issuance"] || ""
      },
      originalFields: {
        dateReceived: student["Issuance and Encoding of No.: Date Received"] || "",
        dateAccomplished: student["Issuance and Encoding of No.: Date Accomplished"] || "",
        status: student["Issuance and Encoding of No.: Status"] || "",
        remarks: student["Issuance and Encoding of No.: Remarks"] || "",
        dateForwarded: student["Issuance and Encoding of No.: Date Forwarded"] || "",
        soPrefix: parsed.prefix || "",
        soNumber: parsed.number || "",
        soNo: existingSo || "",
        series: student["Series"] || currentYear,
        dateSOIssuance: student["Date of SO Issuance"] || ""
      },
      originalPreviewSO: existingSo
    };
  },

  getDefaultOverrides: function() {
    return {
      dateReceived: false,
      dateAccomplished: false,
      status: false,
      remarks: false,
      dateForwarded: false,
      soPrefix: false,
      soNumber: false,
      series: false,
      dateSOIssuance: false
    };
  },

  getBatchEntryByRow: function(rowID) {
    return this.batchStudents.find(function(s) { return String(s._row) === String(rowID); }) || null;
  },

  getCurrentBatchEntry: function() {
    return this.getBatchEntryByRow(this.editingRowID);
  },

  getVerificationCategory: function(statusValue) {
    var raw = String(statusValue || "").trim().toLowerCase();
    if (!raw) return "unverified";
    if (raw.indexOf("deficien") !== -1) return "deficiency";
    if (raw.indexOf("verif") !== -1 || raw === "approved" || raw === "complete" || raw === "completed") return "verified";
    return "unverified";
  },

  passesVerificationFilter: function(statusValue, filterMode) {
    var category = this.getVerificationCategory(statusValue);
    if (Array.isArray(filterMode)) {
      if (!filterMode.length) return false;
      return filterMode.indexOf(category) !== -1;
    }
    var mode = String(filterMode || "all");
    if (mode === "all") return true;
    return category === mode;
  },

  getFirstWithoutSOEntry: function() {
    for (var i = 0; i < this.batchStudents.length; i++) {
      if (!this.batchStudents[i].hasExistingSO) return this.batchStudents[i];
    }
    return null;
  },

  removeDuplicates: function(arr) {
    var map = {};
    arr.forEach(function(r){
      var key = r && r._row ? "_row_" + r._row : "id_" + String(r.ID || "");
      map[key] = r;
    });
    return Object.values(map);
  },

  getCurrentFormData: function() {
    var prefixEl = document.getElementById("so_prefix");
    var numberEl = document.getElementById("so_number");
    var combinedSo = prefixEl && numberEl && prefixEl.value
      ? prefixEl.value.trim() + "-" + numberEl.value.trim()
      : "";
      
    return {
      dateReceived: document.getElementById("issuance_date_received") ? document.getElementById("issuance_date_received").value : "",
      dateAccomplished: document.getElementById("issuance_date_accomplished") ? document.getElementById("issuance_date_accomplished").value : "",
      status: document.getElementById("issuance_status") ? document.getElementById("issuance_status").value : "",
      remarks: document.getElementById("issuance_remarks") ? document.getElementById("issuance_remarks").value : "",
      dateForwarded: document.getElementById("issuance_date_forwarded") ? document.getElementById("issuance_date_forwarded").value : "",
      soNo: combinedSo,
      series: document.getElementById("edit_series") ? document.getElementById("edit_series").value : "",
      dateSOIssuance: document.getElementById("edit_date_so_issuance") ? document.getElementById("edit_date_so_issuance").value : ""
    };
  },

  setBatchStudents: function(students) {
    this.batchStudents = students;
    this.batchConfirmed = false;
    this.batchHasChanges = this.isBatchDirty();
  },

  addBatchStudents: function(students) {
    this.batchStudents = this.batchStudents.concat(students);
  },

  isBatchSelected: function(rowID) {
    return this.batchStudents.some(function(s) { return String(s._row) === String(rowID); });
  },

  addBatchStudent: function(studentOrEntry) {
    if (!studentOrEntry) return;
    var entry = studentOrEntry.fields ? studentOrEntry : this.normalizeStudentToBatchEntry(studentOrEntry);
    if (this.isBatchSelected(entry._row)) return;
    this.batchStudents.push(entry);
    this.batchConfirmed = false;
    this.batchHasChanges = this.isBatchDirty();
  },

  removeBatchStudent: function(rowID) {
    this.batchStudents = this.batchStudents.filter(function(s) { return String(s._row) !== String(rowID); });
    this.batchConfirmed = false;
    this.batchHasChanges = this.isBatchDirty();
  },

  updateBatchEntryFields: function(rowID, patch) {
    var entry = this.getBatchEntryByRow(rowID);
    if (!entry || !patch) return;
    var changed = false;
    var keys = Object.keys(patch);
    for (var i = 0; i < keys.length; i++) {
      var key = keys[i];
      var before = String((entry.fields || {})[key] || "");
      var after = String(patch[key] || "");
      if (before !== after) {
        changed = true;
        break;
      }
    }
    Object.assign(entry.fields, patch);
    if (changed) this.batchConfirmed = false;
    this.batchHasChanges = this.isBatchDirty();
  },

  toNumberAndWidth: function(numberStr) {
    var raw = String(numberStr || "").trim();
    var width = raw.length;
    if (!raw) return { value: 0, width: 0 };
    var n = Number(raw);
    if (isNaN(n)) return { value: 0, width: width };
    return { value: n, width: width };
  },

  formatWithWidth: function(num, width) {
    var n = String(num);
    var w = Math.max(Number(width) || 0, n.length);
    return n.padStart(w, "0");
  },

  getMaxNumberInfoForPrefix: function(prefix) {
    var max = 0;
    var width = 4;
    var p = String(prefix || "").trim();
    if (!p) return { value: max, width: width };
    this.fullData.forEach(function(s) {
      var parsed = Model.parseSoNo(s["SO No."]);
      if (parsed.prefix === p) {
        var info = Model.toNumberAndWidth(parsed.number);
        if (info.width > width) width = info.width;
        if (info.value > max) max = info.value;
      }
    });
    return { value: max, width: width };
  },

  getIncrementedSO: function(prefix, currentValue, width) {
    var info = this.toNumberAndWidth(currentValue);
    var next = info.value + 1;
    var useWidth = Math.max(width || 0, info.width || 0, 1);
    return String(prefix || "").trim() + "-" + this.formatWithWidth(next, useWidth);
  },

  isBatchDirty: function() {
    if (!this.batchStudents.length) return false;
    for (var i = 0; i < this.batchStudents.length; i++) {
      var entry = this.batchStudents[i];
      var keys = Object.keys(entry.fields || {});
      for (var k = 0; k < keys.length; k++) {
        var key = keys[k];
        var curr = String(entry.fields[key] || "");
        var orig = String((entry.originalFields || {})[key] || "");
        if (curr !== orig) return true;
      }
      if (String(entry.previewSO || "") !== String(entry.originalPreviewSO || "")) return true;
    }
    return false;
  },

  getAllUsedSoNos: function() {
    var used = {};
    this.fullData.forEach(function(s) {
      var so = String(s["SO No."] || "").trim();
      if (so) used[so] = true;
    });
    return used;
  },

  getFirstAvailablePrefix: function() {
    var first = "";
    for (var i = 0; i < this.fullData.length; i++) {
      var parsed = this.parseSoNo(this.fullData[i]["SO No."]);
      if (parsed.prefix) {
        first = parsed.prefix;
        break;
      }
    }
    if (!first) first = "401002";
    return first;
  },

  getMaxNumberForPrefix: function(prefix) {
    var max = 0;
    var p = String(prefix || "").trim();
    if (!p) return max;
    this.fullData.forEach(function(s) {
      var parsed = Model.parseSoNo(s["SO No."]);
      if (parsed.prefix === p) {
        var n = Number(parsed.number);
        if (!isNaN(n) && n > max) max = n;
      }
    });
    return max;
  },

  recomputeBatchSoPreviews: function() {
    if (!this.batchStudents.length) return;

    this.batchStudents.forEach(function(e) { e.isFirstWithoutSO = false; });
    var firstWithoutSO = this.getFirstWithoutSOEntry();
    if (firstWithoutSO) firstWithoutSO.isFirstWithoutSO = true;

    var usedSo = this.getAllUsedSoNos();
    var basePrefix = "";
    var nextNumber = 0;
    var numberWidth = 4;
    var hasAnchorManualSeed = false;

    if (firstWithoutSO) {
      var manualFirst = this.formatSoNo(firstWithoutSO.fields.soPrefix, firstWithoutSO.fields.soNumber);
      var parsedFirst = this.parseSoNo(manualFirst);
      basePrefix = parsedFirst.prefix || firstWithoutSO.fields.soPrefix || this.getFirstAvailablePrefix();

      if (manualFirst && parsedFirst.number) {
        var manualInfo = this.toNumberAndWidth(parsedFirst.number);
        nextNumber = manualInfo.value || 0;
        numberWidth = Math.max(numberWidth, manualInfo.width || 0);
        hasAnchorManualSeed = true;
      } else {
        var maxInfo = this.getMaxNumberInfoForPrefix(basePrefix);
        nextNumber = maxInfo.value;
        numberWidth = Math.max(numberWidth, maxInfo.width);
      }
    }

    this.batchStudents.forEach(function(entry) {
      if (entry.hasExistingSO) {
        var editedExistingSO = Model.formatSoNo(entry.fields.soPrefix, entry.fields.soNumber);
        var activeExistingSO = editedExistingSO || entry.existingSO;
        entry.previewSO = activeExistingSO;
        entry.fields.soNo = activeExistingSO;
        if (entry.previewSO) usedSo[entry.previewSO] = true;
      }
    });

    if (!firstWithoutSO) return;

    this.batchStudents.forEach(function(entry) {
      if (entry.hasExistingSO) return;

      if (entry.isFirstWithoutSO) {
        var firstManual = Model.formatSoNo(entry.fields.soPrefix, entry.fields.soNumber);
        if (!firstManual) {
          entry.previewSO = "";
          entry.fields.soNo = "";
          return;
        }
        var candidateFirst = firstManual;
        var parsedCandidate = Model.parseSoNo(candidateFirst);
        entry.previewSO = candidateFirst;
        entry.fields.soNo = candidateFirst;
        entry.fields.soPrefix = parsedCandidate.prefix || basePrefix;
        entry.fields.soNumber = parsedCandidate.number || "";
        usedSo[candidateFirst] = true;
        if (parsedCandidate.prefix === basePrefix) {
          var parsedNum = Number(parsedCandidate.number);
          if (!isNaN(parsedNum) && parsedNum > nextNumber) nextNumber = parsedNum;
          numberWidth = Math.max(numberWidth, String(parsedCandidate.number || "").length);
        }
        return;
      }

      var hasManualOverride = !!(entry.overrides && (entry.overrides.soPrefix || entry.overrides.soNumber));
      if (hasManualOverride) {
        var manualSO = Model.formatSoNo(entry.fields.soPrefix, entry.fields.soNumber);
        if (manualSO && !usedSo[manualSO]) {
          entry.previewSO = manualSO;
          entry.fields.soNo = manualSO;
          usedSo[manualSO] = true;
          var parsedManual = Model.parseSoNo(manualSO);
          if (parsedManual.prefix === basePrefix) {
            var parsedManualNum = Model.toNumberAndWidth(parsedManual.number).value;
            if (!isNaN(parsedManualNum) && parsedManualNum > nextNumber) nextNumber = parsedManualNum;
          }
          return;
        }
      }

      if (!hasAnchorManualSeed) {
        entry.previewSO = "";
        entry.fields.soNo = "";
        return;
      }

      var candidate = "";
      do {
        candidate = Model.getIncrementedSO(basePrefix, Model.formatWithWidth(nextNumber, numberWidth), numberWidth);
        nextNumber = Model.toNumberAndWidth(Model.parseSoNo(candidate).number).value;
      } while (usedSo[candidate]);

      entry.previewSO = candidate;
      entry.fields.soNo = candidate;
      entry.fields.soPrefix = basePrefix;
      entry.fields.soNumber = String(nextNumber).padStart(numberWidth, "0");
      usedSo[candidate] = true;
    });
  }
};
</script>
