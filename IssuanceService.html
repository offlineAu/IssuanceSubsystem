<script>
var Service = {
  buildContext: function(module, source) {
    var context = {
      module: String(module || "issuance"),
      requestId: Number((Model.executionLock && Model.executionLock.requestId) || 0),
      source: String(source || "ui"),
      timestamp: new Date().toISOString()
    };
    Model.serviceContext = Object.assign({}, context);
    console.log("[CONTEXT ATTACHED] " + context.module + " + " + context.requestId);
    return context;
  },

  validateContext: function(context) {
    var activeModule = String((Model.executionLock && Model.executionLock.activeModule) || "");
    var activeRequestId = Number((Model.executionLock && Model.executionLock.requestId) || 0);
    var valid = activeModule === String(context.module || "") && activeRequestId === Number(context.requestId || 0);
    console.log("[CONTEXT VALIDATED] " + (valid ? "OK" : "FAILED"));
    return valid;
  },

  assertModuleContext: function(module) {
    var expected = String(module || "");
    var activeModule = String((Model.executionLock && Model.executionLock.activeModule) || "");
    if (expected && activeModule && expected !== activeModule) {
      console.log("[SERVICE BLOCKED] module mismatch");
      return false;
    }
    return true;
  },

  attachPayloadContext: function(payload, context) {
    var nextPayload = payload && typeof payload === "object" ? Object.assign({}, payload) : {};
    nextPayload.__context = Object.assign({}, context);
    return nextPayload;
  },

  wrapSuccess: function(context, onSuccess, safeValue) {
    return function(result) {
      if (!Service.validateContext(context)) {
        console.log("[SERVICE BLOCKED] module mismatch");
        if (typeof onSuccess === "function") onSuccess(safeValue);
        return;
      }
      if (typeof onSuccess === "function") onSuccess(result);
    };
  },

  wrapFailure: function(context, onFailure) {
    return function(error) {
      if (!Service.validateContext(context)) {
        console.log("[SERVICE BLOCKED] module mismatch");
        return;
      }
      if (typeof onFailure === "function") onFailure(error);
    };
  },

  getInitialData: function(batchSize, onSuccess) {
    var context = this.buildContext("issuance", "ui");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess({ data: [], total: 0, viewConfig: Model.recordViewConfig || {} });
      return;
    }
    google.script.run
      .withSuccessHandler(this.wrapSuccess(context, onSuccess, { data: [], total: 0, viewConfig: Model.recordViewConfig || {} }))
      .getInitialData(batchSize, context);
  },

  loadRemainingData: function(startRow, batchSize, onSuccess) {
    var context = this.buildContext("issuance", "internal");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess({ data: [] });
      return;
    }
    google.script.run
      .withSuccessHandler(this.wrapSuccess(context, onSuccess, { data: [] }))
      .loadRemainingData(startRow, batchSize, context);
  },

  /* ============================================
     YEAR-BASED DATA LOADING METHODS
     ============================================ */

  getAvailableYears: function(onSuccess) {
    var context = this.buildContext("issuance", "ui");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess({ years: [] });
      return;
    }
    google.script.run
      .withSuccessHandler(this.wrapSuccess(context, onSuccess, { years: [] }))
      .withFailureHandler(this.wrapFailure(context, onSuccess, { years: [] }))
      .getAvailableYears("issuance");
  },

  getYearsSummary: function(onSuccess) {
    var context = this.buildContext("issuance", "ui");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess({ summaries: [] });
      return;
    }
    console.log("[IssuanceService] Calling getYearsSummary...");
    google.script.run
      .withSuccessHandler(function(res) {
        console.log("[IssuanceService] getYearsSummary success:", res);
        if (onSuccess) onSuccess(res);
      })
      .withFailureHandler(function(err) {
        console.error("[IssuanceService] getYearsSummary failed:", err);
        if (onSuccess) onSuccess({ summaries: [] });
      })
      .getYearsSummary("issuance");
  },

  refreshCacheInBackground: function(module) {
    google.script.run
      .withSuccessHandler(function(result) {
        if (!result || !result.ok) return;
        console.log("[BG REFRESH] Complete, rows=" + result.rowCount);
        // If row count differs from what we loaded, trigger a soft reload
        // of just the year summaries so new tabs appear
        if (result.summaries && result.summaries.length) {
          // You can hook this into your existing Controller.onYearSummaryLoaded
          // or simply update the year tabs if counts changed
        }
      })
      .withFailureHandler(function() {})
      .refreshUserCache(module);
  },

  getDataByYear: function(year, batchSize, nextScanFrom, onSuccess) {
    if (typeof nextScanFrom === "function") {
      onSuccess = nextScanFrom;
      nextScanFrom = undefined;
    }

    // Do NOT use buildContext/wrapSuccess here — the execution lock
    // moves between the call and the response, blocking valid data
    console.log("[IssuanceService] Calling getDataByYear for year:", year, "nextScanFrom:", nextScanFrom);
    google.script.run
      .withSuccessHandler(function(res) {
        console.log("[IssuanceService] getDataByYear success:", res);
        if (onSuccess) onSuccess(res);
      })
      .withFailureHandler(function(err) {
        console.error("[IssuanceService] getDataByYear failed:", err);
        if (onSuccess) onSuccess({ data: [], total: 0, year: year, success: false, error: err });
      })
      .getDataByYear("issuance", year, batchSize, nextScanFrom);
  },

  loadRemainingDataByYear: function(year, startRow, batchSize, onSuccess) {
    var context = this.buildContext("issuance", "internal");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess({ data: [], year: year });
      return;
    }
    google.script.run
      .withSuccessHandler(function(res) {
        if (onSuccess) onSuccess(res);
      })
      .withFailureHandler(function(err) {
        console.error("[IssuanceService] loadRemainingDataByYear failed:", err);
        if (onSuccess) onSuccess({ data: [], year: year, success: false, error: err });
      })
      .loadRemainingDataByYear("issuance", year, startRow, batchSize);
  },

  searchExactName: function(term, onSuccess) {
    var context = this.buildContext("issuance", "ui");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess([]);
      return;
    }
    google.script.run
      .withSuccessHandler(this.wrapSuccess(context, onSuccess, []))
      .searchExactName(term, context);
  },

  getSavedSoPrefixes: function(onSuccess) {
    var context = this.buildContext("issuance", "internal");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess([]);
      return;
    }
    google.script.run
      .withSuccessHandler(this.wrapSuccess(context, onSuccess, []))
      .getSavedSoPrefixes();
  },

  saveSoPrefix: function(prefix, onSuccess) {
    var context = this.buildContext("issuance", "internal");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess([]);
      return;
    }
    google.script.run
      .withSuccessHandler(this.wrapSuccess(context, onSuccess, []))
      .saveSoPrefix(prefix);
  },

  updateIssuanceColumns: function(payload, onSuccess, onFailure) {
    var context = this.buildContext("issuance", "ui");
    if (!this.assertModuleContext(context.module)) {
      console.log("[SERVICE BLOCKED] module mismatch");
      if (onSuccess) onSuccess({ ok: false, message: "Service call blocked by module context." });
      return;
    }
    google.script.run
      .withSuccessHandler(this.wrapSuccess(context, onSuccess, { ok: false, message: "Service call blocked by module context." }))
      .withFailureHandler(this.wrapFailure(context, onFailure))
      .updateIssuanceColumns(payload, context);
  },

  getIssuanceHistory: function(studentId, studentName, onSuccess, onFailure) {
    var context = this.buildContext("issuance", "internal");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess([]);
      return;
    }
    var runner = google.script.run.withSuccessHandler(this.wrapSuccess(context, onSuccess || function(){}, []));
    if (onFailure) runner = runner.withFailureHandler(this.wrapFailure(context, onFailure));
    runner.getIssuanceHistory(studentId, studentName);
  },

  getSaveFailureHistory: function(onSuccess, onFailure) {
    var context = this.buildContext("issuance", "retry");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess([]);
      return;
    }
    var runner = google.script.run.withSuccessHandler(this.wrapSuccess(context, onSuccess || function(){}, []));
    if (onFailure) runner = runner.withFailureHandler(this.wrapFailure(context, onFailure));
    runner.getSaveFailureHistory();
  },

  retryFailedSave: function(logRow, onSuccess, onFailure) {
    var context = this.buildContext("issuance", "retry");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess({ ok: false, message: "Service call blocked by module context." });
      return;
    }
    var runner = google.script.run.withSuccessHandler(this.wrapSuccess(context, onSuccess || function(){}, { ok: false, message: "Service call blocked by module context." }));
    if (onFailure) runner = runner.withFailureHandler(this.wrapFailure(context, onFailure));
    runner.retryFailedSave(logRow, context);
  },

  logClientSaveFailure: function(payload, message, onSuccess, onFailure) {
    var context = this.buildContext("issuance", "retry");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess({ ok: false, message: "Service call blocked by module context." });
      return;
    }
    var runner = google.script.run.withSuccessHandler(this.wrapSuccess(context, onSuccess || function(){}, { ok: false, message: "Service call blocked by module context." }));
    if (onFailure) runner = runner.withFailureHandler(this.wrapFailure(context, onFailure));
    runner.logClientSaveFailure(payload, message, context);
  },

  getAccountName: function(onSuccess) {
    google.script.run.withSuccessHandler(onSuccess).getAccountName();
  },

  getUserRole: function(onSuccess) {
    google.script.run.withSuccessHandler(onSuccess).getUserRole();
  },

  getUserAccessContext: function(onSuccess) {
    google.script.run.withSuccessHandler(onSuccess).getUserAccessContext();
  },

  getCurrentUserDebugInfo: function(onSuccess) {
    google.script.run.withSuccessHandler(onSuccess).getCurrentUserDebugInfo();
  },

  getUserPositionFieldSchema: function(onSuccess) {
    google.script.run.withSuccessHandler(onSuccess).getUserPositionFieldSchema();
  },

  getUserModuleAccess: function() {
    return new Promise(function(resolve, reject) {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .getUserModuleAccess();
    });
  },

  getNavbarLogoData: function(onSuccess, onFailure) {
    var runner = google.script.run.withSuccessHandler(onSuccess || function(){});
    if (onFailure) runner = runner.withFailureHandler(onFailure);
    runner.getNavbarLogoData();
  },

  getDatabaseRowUpdateInfo: function(onSuccess) {
    var context = this.buildContext("issuance", "polling");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess(null);
      return;
    }
    google.script.run
      .withSuccessHandler(this.wrapSuccess(context, onSuccess, null))
      .getDatabaseRowInfo(context);
  },

  getDatabaseRow: function(rowNumber, onSuccess, onFailure) {
    var context = this.buildContext("issuance", "polling");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess(null);
      return;
    }
    var runner = google.script.run.withSuccessHandler(this.wrapSuccess(context, onSuccess || function(){}, null));
    if (onFailure) runner = runner.withFailureHandler(this.wrapFailure(context, onFailure));
    runner.getDatabaseRow(rowNumber, context);
  },

  getDashboardData: function(params, onSuccess, onFailure) {
    var context = this.buildContext("dashboard", "dashboard");
    if (!this.assertModuleContext(context.module)) {
      if (onSuccess) onSuccess({ rows: [], hasMore: false });
      return;
    }
    var runner = google.script.run.withSuccessHandler(this.wrapSuccess(context, onSuccess, { rows: [], hasMore: false }));
    if (onFailure) runner = runner.withFailureHandler(this.wrapFailure(context, onFailure));
    runner.getDashboardData(params, context);
  }
};
</script>
