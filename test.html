<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Yearly Verification Ledger</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

        <style>
            :root {
                --prussian-blue: #0B1D37;
                --slate-grey: #727F8E;
                --camel: #AC9055;
                --soft-fawn: #CFB88D;
                --pale-oak: #D3C2A0;
                --bg-light: #F8FAFC;
                --success: #2D6A4F;
            }

            body {
                font-family: 'Inter', sans-serif;
                background-color: var(--pale-oak);
                padding: 30px;
                margin: 0;
            }

            .ledger-container {
                background: white;
                border-radius: 24px;
                box-shadow: 0 10px 40px rgba(11, 29, 55, 0.15);
                overflow: hidden;
                max-width: 1800px;
                margin: 0 auto;
            }

            /* --- Year Tabs Styling --- */
            .tab-nav-container {
                background: #fff;
                padding: 20px 30px 0 30px;
                border-bottom: 1px solid #EDF2F7;
            }

            .nav-tabs-custom {
                border-bottom: none;
                gap: 10px;
            }

            .nav-tabs-custom .nav-link {
                border: none;
                color: var(--slate-grey);
                font-weight: 700;
                font-size: 0.9rem;
                padding: 12px 25px;
                border-radius: 12px 12px 0 0;
                position: relative;
                transition: all 0.3s;
            }

            .nav-tabs-custom .nav-link:hover {
                color: var(--camel);
                background: rgba(172, 144, 85, 0.05);
            }

            .nav-tabs-custom .nav-link.active {
                color: var(--prussian-blue);
                background: transparent;
            }

            .nav-tabs-custom .nav-link.active::after {
                content: '';
                position: absolute;
                bottom: 0;
                left: 20%;
                width: 60%;
                height: 4px;
                background: var(--camel);
                border-radius: 10px 10px 0 0;
            }

            /* --- Header Actions --- */
            .search-header {
                padding: 20px 30px;
                background: #fff;
                display: flex;
                align-items: center;
                gap: 15px;
            }

            .form-control-search {
                padding: 10px 15px 10px 40px;
                border-radius: 10px;
                border: 1px solid #E2E8F0;
                background: var(--bg-light);
                font-size: 0.85rem;
                flex-grow: 1;
            }

            /* --- Table Specifics --- */
            .table-wrapper { overflow-x: auto; }
            .table-modern { width: 100%; border-collapse: collapse; }
            .table-modern thead th {
                background: #F8FAFC;
                color: var(--slate-grey);
                font-size: 0.7rem;
                font-weight: 800;
                text-transform: uppercase;
                padding: 15px 20px;
                border-bottom: 1px solid #EDF2F7;
            }
            .table-modern tbody td { padding: 16px 20px; font-size: 0.85rem; border-bottom: 1px solid #F1F5F9; }

            .badge-year {
                background: var(--prussian-blue);
                color: var(--soft-fawn);
                font-size: 0.65rem;
                padding: 3px 8px;
                border-radius: 4px;
                margin-left: 8px;
                vertical-align: middle;
            }
        </style>
    </head>
    <body>

        <div class="ledger-container">
            <!-- Year Tabs -->
            <div class="tab-nav-container">
                <ul class="nav nav-tabs nav-tabs-custom" id="yearTabs" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" type="button">All Years</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" type="button">2026</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" type="button">2025</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" type="button">2024</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" type="button">Archive</button>
                    </li>
                </ul>
            </div>

            <!-- Search Header -->
            <div class="search-header">
                <div style="position: relative; flex-grow: 1;">
                    <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 15px; top: 13px; color: var(--slate-grey);"></i>
                    <input type="text" class="form-control-search" placeholder="Search within this year...">
                </div>
                <button class="btn btn-outline-secondary btn-sm fw-bold px-3" style="border-radius: 8px;">
                    <i class="fa-solid fa-filter me-2"></i>Filters
                </button>
                <button class="btn btn-dark btn-sm fw-bold px-3" style="background: var(--prussian-blue); border-radius: 8px;">
                    <i class="fa-solid fa-download me-2"></i>Report
                </button>
            </div>

            <!-- Table -->
            <div class="table-wrapper">
                <table class="table-modern">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Full Name</th>
                            <th>Institution</th>
                            <th>Verification Status</th>
                            <th>Batch Year</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="fw-bold text-muted">2300010</td>
                            <td class="fw-bold" style="color: var(--prussian-blue);">SILAWANAN, JOVERNA A.</td>
                            <td class="text-muted">Golden Heritage Polytechnic College</td>
                            <td><span class="badge rounded-pill" style="background: rgba(45,106,79,0.1); color: var(--success); font-size: 0.7rem; padding: 6px 12px;">Verified</span></td>
                            <td><span class="badge-year">2026</span></td>
                            <td><button class="btn btn-sm text-primary p-0"><i class="fa-solid fa-pen-to-square"></i></button></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">2300100</td>
                            <td class="fw-bold" style="color: var(--prussian-blue);">DUMAS, JOY KIRSLYN P.</td>
                            <td class="text-muted">Misamis University</td>
                            <td><span class="badge rounded-pill" style="background: rgba(45,106,79,0.1); color: var(--success); font-size: 0.7rem; padding: 6px 12px;">Verified</span></td>
                            <td><span class="badge-year">2024</span></td>
                            <td><button class="btn btn-sm text-primary p-0"><i class="fa-solid fa-pen-to-square"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Simple Pagination Footer -->
            <div class="p-4 d-flex justify-content-between align-items-center border-top">
                <div class="small text-muted">Showing <strong>2</strong> records</div>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item disabled"><a class="page-link border-0" href="#">Prev</a></li>
                        <li class="page-item active"><a class="page-link border-0" style="background: var(--camel);" href="#">1</a></li>
                        <li class="page-item"><a class="page-link border-0 text-dark" href="#">Next</a></li>
                    </ul>
                </nav>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
