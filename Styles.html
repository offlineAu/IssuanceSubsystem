}

.table-hover tbody tr { transition:background-color 0.25s ease, box-shadow 0.25s ease; }

.text-gradient { background:linear-gradient(45deg,var(--primary),var(--accent)); -webkit-background-clip:text; background-clip: text; color:transparent; font-weight:bold; }

table { table-layout: auto; width: 100%; }
th, td { text-align:center; overflow-wrap:break-word; min-width:120px; }

/* Only animate main table rows; keep modal rows always visible */

#batchSearchResults tr.show {

}

.search-footer-status {

.search-footer-pagination {

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 10000;

  align-items: center;
  justify-content: center;
}

.modal.show {
  display: flex;
}

.modal-content {

  border-radius: 1rem;

  max-width: 1200px;

  flex-direction: row;

  padding: 2rem;

}

.left-panel,
.right-panel {

}

}

  display: flex;
  flex-direction: column;

.filter-shell {

}

.modern-filter {

}

}

.main-filter-title {
  font-size: 13px;
  font-weight: 700;

}

.main-filter-subtitle {

}

.batch-result,
.selected-student-item {

}

.batch-result:hover,
.selected-student-item:hover {

}

}

.selected-batch-empty {

}

.selected-student-card-title {

}

@keyframes fadeIn {
  from { transform: scale(.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.button .selectedStudents {
  cursor: pointer
}

.table-hover tbody tr {
  cursor: pointer;
  transition: background-color 0.2s ease, transform 0.2s ease;
}

}

.table-hover tbody tr:hover {

}

.search-student-card {

@media (max-width: 992px) {

/* Navbar redesign */
.app-navbar {
  --app-navbar-max-width: 1720px;
  position: sticky;
  top: 0;
  z-index: 1030;
  padding: 0 !important;
  background:
    linear-gradient(135deg, rgba(11, 32, 86, 0.26), rgba(255,255,255,0) 22%),
    linear-gradient(180deg, #224ba9 0%, #1f429b 100%);
  box-shadow: 0 12px 26px rgba(16, 24, 40, 0.18);
  border-radius: 0 0 18px 18px;
  overflow: hidden;
}

.app-navbar-shell {
  width: min(100%, var(--app-navbar-max-width));
  margin: 0 auto;
}

.app-navbar-top {
  display: grid;
  grid-template-columns: 380px minmax(0, 1fr) 260px;
  align-items: stretch;
  min-height: 146px;
}

.app-navbar-logo-slot {
  position: relative;
  display: flex;
  align-items: stretch;
  justify-content: stretch;
  padding: 0;
  overflow: visible;
}

.app-navbar-logo-slot::after {
  content: none;
}

.app-navbar-logo-placeholder {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: stretch;
  justify-content: flex-start;
  width: 100%;
  min-height: 100%;
  padding: 0;
  background: transparent;
  color: rgba(49, 54, 70, 0.7);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.app-navbar-paper-panel {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: min(calc(100% + 220px), 700px);
  min-height: 100%;
  margin-left: calc(0px + ((100vw - min(100vw, var(--app-navbar-max-width))) / -2));
  padding: 0 48px 0 0;
  clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%);
  background:
    linear-gradient(180deg, rgba(233, 216, 180, 0.98) 0%, rgba(216, 196, 158, 0.98) 100%);
  box-shadow:
    0 12px 22px rgba(9, 19, 48, 0.12),
    0 1px 0 rgba(255,255,255,0.32) inset,
    0 -18px 24px rgba(113, 89, 47, 0.08) inset;
  overflow: hidden;
}

.app-navbar-paper-panel::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0) 26%),
    repeating-linear-gradient(
      0deg,
      rgba(130, 111, 69, 0.055) 0,
      rgba(130, 111, 69, 0.055) 1px,
      rgba(255,255,255,0) 1px,
      rgba(255,255,255,0) 4px
    );
  pointer-events: none;
}

.app-navbar-paper-panel::after {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  width: 118px;
  height: 100%;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
  clip-path: polygon(48% 0, 100% 0, 100% 100%, 0 100%);
  pointer-events: none;
}

.app-navbar-paper-inner {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  width: 100%;
  min-height: 100%;
  padding-left: 0;
  padding-right: 0;
  transform: translate(8px, -4px);
}

.app-navbar-logo-loading {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: rgba(57, 67, 86, 0.78);
  font-size: 0.88rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: rgba(236, 223, 192, 0.78);
  backdrop-filter: blur(1.5px);
}

.app-navbar-logo-placeholder.is-loading .app-navbar-logo-loading {
  display: inline-flex;
}

.app-navbar-logo-placeholder.is-loading .app-navbar-paper-inner {
  visibility: hidden;
}

.app-navbar-logo-loading-dot {
  width: 12px;
  height: 12px;
  border-radius: 999px;
  background: #274784;
  box-shadow: 0 0 0 0 rgba(39, 71, 132, 0.34);
  animation: logoPulse 1.2s ease-out infinite;
}

@keyframes logoPulse {
  0% {
    transform: scale(0.94);
    box-shadow: 0 0 0 0 rgba(39, 71, 132, 0.34);
  }
  70% {
    transform: scale(1);
    box-shadow: 0 0 0 10px rgba(39, 71, 132, 0);
  }
  100% {
    transform: scale(0.94);
    box-shadow: 0 0 0 0 rgba(39, 71, 132, 0);
  }
}

.app-navbar-logo-image {
  display: block;
  max-width: 100%;
  width: auto;
  max-height: 114px;
  object-fit: contain;
  filter: drop-shadow(0 6px 10px rgba(52, 57, 77, 0.12));
}
