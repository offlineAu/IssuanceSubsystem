<script>
var Controller = {
  formFieldMap: {
    issuance_date_received: "dateReceived",
    issuance_date_accomplished: "dateAccomplished",
    issuance_status: "status",
    issuance_remarks: "remarks",
    issuance_date_forwarded: "dateForwarded",
    so_prefix: "soPrefix",
    so_number: "soNumber",
    edit_series: "series",
    edit_date_so_issuance: "dateSOIssuance"
  },

  propagatedFields: [
    "dateReceived",
    "dateAccomplished",
    "status",
    "remarks",
    "dateForwarded",
    "soPrefix",
    "series",
    "dateSOIssuance"
  ],

  validationFieldMap: {
    dateReceived: { id: "issuance_date_received", label: "Date Received" },
    dateAccomplished: { id: "issuance_date_accomplished", label: "Date Accomplished" },
    status: { id: "issuance_status", label: "Status" },
    remarks: { id: "issuance_remarks", label: "Remarks" },
    dateForwarded: { id: "issuance_date_forwarded", label: "Date Forwarded" },
    soNo: { id: "so_prefix", partnerId: "so_number", label: "SO No." },
    series: { id: "edit_series", label: "Series" },
    dateSOIssuance: { id: "edit_date_so_issuance", label: "Date of SO Issuance" }
  },

  searchDebounced: null,
  batchSearchDebounced: null,
  pendingSaveTargets: null,
  pendingStatusEditStudent: null,
  pendingStatusAction: null,

  setActiveMainView: function(viewName) {
    var nextView = viewName === "report" ? "report" : (viewName === "history" ? "history" : "home");
    Model.activeMainView = nextView;
    View.setActiveMainView(nextView);
    if (nextView === "report") {
      View.renderReportAnalytics();
    }
  },

  init: function() {
    this.initEventListeners();
    this.loadNavbarLogo();
    this.loadAccountName();
    this.loadUserDebugInfo();
    this.loadUserRole();
    this.loadUserPositionFieldSchema();
    this.loadSoPrefixes();
    View.populateSeriesDropdown(String(new Date().getFullYear()));
    this.setActiveMainView("home");
    this.initData();
    this.startDatabaseRowPolling();
  },

  initData: function() {
    View.showOverlay(true);
    Service.getInitialData(Model.initialBatchSize, function(res){
      Model.recordViewConfig = res.viewConfig || Model.recordViewConfig;
      View.applyRecordViewConfig();
      Model.fullData = res.data;
      Model.totalRows = res.total;
      Model.filteredData = Model.applyMainViewFilters(Model.fullData);
      Controller.renderPage(1);
      View.showOverlay(false);

      Model.loadingBatches = true;
      Model.nextBatchStart = 2 + Model.fullData.length;
      Controller.loadNextBatch(Model.nextBatchStart);
    });
  },

  loadNextBatch: function(startRow) {
    if (!Model.loadingBatches || startRow > (Model.totalRows + 1)) return;
    Service.loadRemainingData(startRow, Model.nextBatchSize, function(res){
      if (res.data && res.data.length) {
        var existingRows = {};
        Model.fullData.forEach(function(f){ existingRows[String(f._row)] = true; });
        var newRows = res.data.filter(function(r){ return !existingRows[String(r._row)]; });
        Model.fullData = Model.fullData.concat(newRows);

        if (!Model.searchMode) {
          Model.filteredData = Model.applyMainViewFilters(Model.fullData);
          Controller.renderPage(Model.currentPage);
        }

        Model.recomputeBatchSoPreviews();
        View.renderSelectedBatchList();
        View.renderReportAnalytics();

        Model.nextBatchStart += Model.nextBatchSize;
        Controller.loadNextBatch(Model.nextBatchStart);
      } else {
        Model.loadingBatches = false;
      }
    });
  },

  renderPage: function(page) {
    var totalPages = Math.max(1, Math.ceil(Model.filteredData.length / Model.rowsPerPage));
    var safePage = Number(page) || 1;
    if (safePage < 1) safePage = 1;
    if (safePage > totalPages) safePage = totalPages;
    Model.currentPage = safePage;
    View.renderPage(safePage);
  },

  goToPage: function(page) {
    this.renderPage(page);
  },

  debounce: function(fn, wait) {
    var timer = null;
    return function() {
      var ctx = this;
      var args = arguments;
      clearTimeout(timer);
      timer = setTimeout(function() { fn.apply(ctx, args); }, wait);
    };
  },

  doSearch: function(term) {
    var token = ++Model.activeSearchToken;
    term = (term || "").trim().toLowerCase();
    Model.lastMainSearchTerm = term;
    Model.isSearchingMain = false;

    if (!term) {
      Model.searchMode = false;
      Model.filteredData = Model.applyMainViewFilters(Model.fullData);
      this.renderPage(1);
      return;
    }

    Model.searchMode = true;
    var localMatch = Model.fullData.filter(function(r){
      return r["Name of the Student"] && r["Name of the Student"].toLowerCase().includes(term);
    });
    var filteredLocal = Model.applyMainViewFilters(localMatch);

    if (filteredLocal.length) {
      Model.filteredData = Model.removeDuplicates(filteredLocal);
      this.renderPage(1);
    } else {
      var shouldFetchServer = Model.fullData.length < Model.totalRows || Model.loadingBatches;
      if (!shouldFetchServer) {
        View.renderEmpty("No records found");
        return;
      }

      Model.isSearchingMain = true;
      View.showMainSearchLoading();
      Service.searchExactName(term, function(res){
        if (token !== Model.activeSearchToken) return;
        Model.isSearchingMain = false;
        if (res && res.length) {
          var filteredRemote = Model.applyMainViewFilters(res);
          if (!filteredRemote.length) {
            View.renderEmpty("No records found");
            return;
          }
          Model.filteredData = Model.removeDuplicates(filteredRemote);
          Controller.renderPage(1);
        } else {
          View.renderEmpty("No records found");
        }
      });
    }
  },

  getFormPatch: function() {
    var soPrefix = (document.getElementById("so_prefix") || {}).value || "";
    var soNumber = (document.getElementById("so_number") || {}).value || "";
    var series = (document.getElementById("edit_series") || {}).value || "";
    if (!series) series = String(new Date().getFullYear());

    return {
      dateReceived: (document.getElementById("issuance_date_received") || {}).value || "",
      dateAccomplished: (document.getElementById("issuance_date_accomplished") || {}).value || "",
      status: (document.getElementById("issuance_status") || {}).value || "",
      remarks: (document.getElementById("issuance_remarks") || {}).value || "",
      dateForwarded: (document.getElementById("issuance_date_forwarded") || {}).value || "",
      soPrefix: String(soPrefix).trim(),
      soNumber: String(soNumber).trim(),
      series: series,
      dateSOIssuance: (document.getElementById("edit_date_so_issuance") || {}).value || ""
    };
  },

  getPermissionKeyForField: function(fieldKey) {
    if (fieldKey === "soPrefix" || fieldKey === "soNumber") return "soNo";
    return fieldKey;
  },

  isFieldEditableForCurrentRecord: function(fieldKey) {
    var permissionKey = this.getPermissionKeyForField(fieldKey);
    var permissions = Model.currentRecordPermissions || {};
    var editable = Array.isArray(permissions.editableFieldKeys) ? permissions.editableFieldKeys : [];
    return !!permissions.canEditRecord && editable.indexOf(permissionKey) !== -1;
  },

  applyCurrentRecordPermissions: function(student) {
    Model.currentRecordPermissions = Model.evaluateRecordPermissions(student);
    View.applyRolePermissions();
    View.updateActionButtons();
  },

  syncIssuanceDatesOnce: function(changedField, patch) {
    if (Model.dateSyncInProgress) return patch;
    if (!patch) patch = this.getFormPatch();
    if (["dateReceived", "dateAccomplished", "dateSOIssuance"].indexOf(changedField) === -1) return patch;

    var value = patch[changedField];
    if (!value) return patch;

    Model.dateSyncInProgress = true;
    patch.dateReceived = value;
    patch.dateAccomplished = value;
    patch.dateSOIssuance = value;

    var fieldToId = {
      dateReceived: "issuance_date_received",
      dateAccomplished: "issuance_date_accomplished",
      dateSOIssuance: "edit_date_so_issuance"
    };
    Object.keys(fieldToId).forEach(function(key) {
      var el = document.getElementById(fieldToId[key]);
      if (el) el.value = value;
    });
    Model.dateSyncInProgress = false;
    return patch;
  },

  propagateFromFirstStudent: function() {
    if (!Model.batchStudents.length) return;
    var anchor = Model.getFirstWithoutSOEntry() || Model.batchStudents[0];
    var anchorIndex = Model.batchStudents.findIndex(function(s) {
      return String(s._row) === String(anchor._row);
    });
    if (anchorIndex < 0) anchorIndex = 0;

    for (var i = anchorIndex + 1; i < Model.batchStudents.length; i++) {
      var entry = Model.batchStudents[i];
      this.propagatedFields.forEach(function(field) {
        if (entry.hasExistingSO && field === "soPrefix") return;
        if (!entry.overrides || entry.overrides[field] !== true) {
          entry.fields[field] = anchor.fields[field] || "";
        }
      });
    }
  },

  syncCurrentFormToModel: function(changedField) {
    var entry = Model.getCurrentBatchEntry();
    if (!entry) return;
    if (changedField && !this.isFieldEditableForCurrentRecord(changedField)) return;
    View.clearModalActionError("savebtn");
    View.clearModalActionError("updateStudentBtn");

    var previous = Object.assign({}, entry.fields);
    var patch = this.getFormPatch();
    patch = this.syncIssuanceDatesOnce(changedField, patch);

    if (changedField) {
      var changedFieldId = null;
      Object.keys(this.formFieldMap).forEach(function(inputId) {
        if (Controller.formFieldMap[inputId] === changedField) changedFieldId = inputId;
      });
      if (changedFieldId === "so_prefix" || changedFieldId === "so_number") {
        View.clearModalFieldError("so_prefix", "so_number");
      } else if (changedFieldId) {
        View.clearModalFieldError(changedFieldId);
      }
    }

    if (changedField === "soPrefix" || changedField === "soNumber") {
      var typedSO = Model.formatSoNo(patch.soPrefix, patch.soNumber);
      if (typedSO && this.isDuplicateSOForRow(typedSO, entry._row)) {
        View.setModalFieldError("so_prefix", "Duplicate SO number detected.", "so_number");
        patch.soPrefix = previous.soPrefix || "";
        patch.soNumber = previous.soNumber || "";
        var soPrefixEl = document.getElementById("so_prefix");
        var soNumberEl = document.getElementById("so_number");
        if (soPrefixEl) soPrefixEl.value = patch.soPrefix;
        if (soNumberEl) soNumberEl.value = patch.soNumber;
      } else if (typedSO) {
        View.clearModalFieldError("so_prefix", "so_number");
      }
      if (entry.overrides && Object.prototype.hasOwnProperty.call(entry.overrides, changedField)) {
        var originalValue = String((entry.originalFields || {})[changedField] || "");
        entry.overrides[changedField] = String(patch[changedField] || "") !== originalValue;
      }
    }

    var first = Model.getFirstWithoutSOEntry() || (Model.batchStudents.length ? Model.batchStudents[0] : null);
    var firstIndex = first ? Model.batchStudents.findIndex(function(s) { return String(s._row) === String(first._row); }) : -1;
    var entryIndex = Model.batchStudents.findIndex(function(s) { return String(s._row) === String(entry._row); });
    var isFirst = first && String(first._row) === String(entry._row);
    var followsAnchor = first && entryIndex > firstIndex;

    if (!isFirst && followsAnchor && changedField && entry.overrides) {
      var keysToMark = [changedField];
      if (["dateReceived", "dateAccomplished", "dateSOIssuance"].indexOf(changedField) !== -1) {
        keysToMark = ["dateReceived", "dateAccomplished", "dateSOIssuance"];
      }
      keysToMark.forEach(function(key) {
        if (!Object.prototype.hasOwnProperty.call(entry.overrides, key)) return;
        var firstValue = first ? (first.fields[key] || "") : "";
        entry.overrides[key] = (patch[key] || "") !== firstValue;
      });
    }

    Model.updateBatchEntryFields(entry._row, patch);
    this.propagateFromFirstStudent();
    Model.recomputeBatchSoPreviews();
    Model.batchHasChanges = Model.isBatchDirty();
    View.renderSelectedBatchList();
    View.updateActionButtons();
  },

  isDuplicateSOForRow: function(so, rowID) {
    var value = String(so || "").trim();
    if (!value) return false;

    var inDb = Model.fullData.some(function(row) {
      var rowSo = String(row["SO No."] || "").trim();
      return rowSo && rowSo === value && String(row._row) !== String(rowID);
    });
    if (inDb) return true;

    var inBatch = Model.batchStudents.some(function(entry) {
      return String(entry._row) !== String(rowID) && String(entry.previewSO || "").trim() === value;
    });
    return inBatch;
  },

  getMissingRequiredFields: function(entry) {
    if (!entry) return ["student entry"];
    var keys = [];
    if (!String(entry.fields.dateReceived || "").trim()) keys.push("dateReceived");
    if (!String(entry.fields.dateAccomplished || "").trim()) keys.push("dateAccomplished");
    if (!String(entry.fields.status || "").trim()) keys.push("status");
    if (!String(entry.fields.dateForwarded || "").trim()) keys.push("dateForwarded");
    if (!String(entry.previewSO || "").trim()) keys.push("soNo");
    if (!String(entry.fields.series || "").trim()) keys.push("series");
    if (!String(entry.fields.dateSOIssuance || "").trim()) keys.push("dateSOIssuance");
    return keys;
  },

  showBatchValidationError: function(result) {
    if (!result) return;
    View.clearModalValidationErrors();
    if (result.entry && String(Model.editingRowID) !== String(result.entry._row)) {
      View.populateEditForm(result.entry);
      View.renderSelectedBatchList();
    }
    (result.fieldKeys || []).forEach(function(key) {
      var meta = Controller.validationFieldMap[key];
      if (!meta) return;
      var message = (result.fieldMessages && result.fieldMessages[key]) || (meta.label + " is required.");
      View.setModalFieldError(meta.id, message, meta.partnerId);
    });
    if (result.actionTarget) {
      View.setModalActionError(result.actionTarget, result.actionMessage || "Please review the highlighted fields.");
    }
  },

  validateBatchEntriesDetailed: function(actionTarget) {
    if (!Model.batchStudents.length) {
      return {
        actionTarget: actionTarget || "updateStudentBtn",
        actionMessage: "No students in batch."
      };
    }

    for (var m = 0; m < Model.batchStudents.length; m++) {
      var entry = Model.batchStudents[m];
      var missing = this.getMissingRequiredFields(entry);
      if (missing.length) {
        var fieldMessages = {};
        missing.forEach(function(key) {
          var meta = Controller.validationFieldMap[key];
          if (meta) fieldMessages[key] = meta.label + " is required.";
        });
        return {
          entry: entry,
          fieldKeys: missing,
          fieldMessages: fieldMessages,
          actionTarget: actionTarget || "updateStudentBtn",
          actionMessage: "Complete the required fields before continuing."
        };
      }
    }

    var batchSoMap = {};
    for (var i = 0; i < Model.batchStudents.length; i++) {
      var so = String(Model.batchStudents[i].previewSO || "").trim();
      if (!so) continue;
      if (batchSoMap[so]) {
        return {
          entry: Model.batchStudents[i],
          fieldKeys: ["soNo"],
          fieldMessages: { soNo: "Duplicate SO number detected." },
          actionTarget: actionTarget || "updateStudentBtn",
          actionMessage: "Resolve the highlighted SO number before continuing."
        };
      }
      batchSoMap[so] = true;
    }

    for (var j = 0; j < Model.batchStudents.length; j++) {
      var b = Model.batchStudents[j];
      var candidate = String(b.previewSO || "").trim();
      if (!candidate) continue;
      var clash = Model.fullData.find(function(row) {
        var rowSo = String(row["SO No."] || "").trim();
        return rowSo && rowSo === candidate && String(row._row) !== String(b._row);
      });
      if (clash) {
        return {
          entry: b,
          fieldKeys: ["soNo"],
          fieldMessages: { soNo: "Duplicate SO number detected." },
          actionTarget: actionTarget || "updateStudentBtn",
          actionMessage: "Resolve the highlighted SO number before continuing."
        };
      }
    }

    return null;
  },

  validateBatchEntries: function() {
    var result = this.validateBatchEntriesDetailed("updateStudentBtn");
    return result ? (result.actionMessage || "Please review the highlighted fields.") : "";
  },

  getExistingSoChangeEntries: function(targets) {
    return (targets || []).filter(function(entry) {
      return entry.hasExistingSO && String(entry.previewSO || "").trim() !== String(entry.existingSO || "").trim();
    });
  },

  getExistingSoChangeMessage: function(entries) {
    if (!entries || !entries.length) return "";
    if (entries.length === 1) {
      return "This student already has an SO number. Do you want to change it from " +
        (entries[0].existingSO || "-") + " to " + (entries[0].previewSO || "-") + "?";
    }
    return entries.length + " students already have SO numbers. Do you want to save the edited SO numbers anyway?";
  },

  buildSavePayload: function(entry) {
    return {
      row: entry._row,
      dateReceived: entry.fields.dateReceived || "",
      dateAccomplished: entry.fields.dateAccomplished || "",
      status: entry.fields.status || "",
      remarks: entry.fields.remarks || "",
      dateForwarded: entry.fields.dateForwarded || "",
      soNo: entry.previewSO || "",
      series: entry.fields.series || "",
      dateSOIssuance: entry.fields.dateSOIssuance || ""
    };
  },

  applySavedEntryToData: function(entry) {
    var applySaved = function(row) {
      if (String(row._row) !== String(entry._row)) return row;
      row["Issuance and Encoding of No.: Date Received"] = entry.fields.dateReceived || "";
      row["Issuance and Encoding of No.: Date Accomplished"] = entry.fields.dateAccomplished || "";
      row["Issuance and Encoding of No.: Status"] = entry.fields.status || "";
      row["Issuance and Encoding of No.: Remarks"] = entry.fields.remarks || "";
      row["Issuance and Encoding of No.: Date Forwarded"] = entry.fields.dateForwarded || "";
      row["SO No."] = entry.previewSO || "";
      row["Series"] = entry.fields.series || "";
      row["Date of SO Issuance"] = entry.fields.dateSOIssuance || "";
      return row;
    };

    Model.fullData = Model.fullData.map(applySaved);
    Model.filteredData = Model.filteredData.map(applySaved);

    entry.hasExistingSO = !!String(entry.previewSO || "").trim();
    entry.existingSO = entry.previewSO || "";
    entry.originalPreviewSO = entry.previewSO || "";
    entry.fields.soNo = entry.previewSO || "";
    var parsedSavedSo = Model.parseSoNo(entry.previewSO || "");
    entry.fields.soPrefix = parsedSavedSo.prefix || entry.fields.soPrefix || "";
    entry.fields.soNumber = parsedSavedSo.number || entry.fields.soNumber || "";
    entry.originalFields = Object.assign({}, entry.fields);
    if (entry.overrides) {
      Object.keys(entry.overrides).forEach(function(key) {
        entry.overrides[key] = false;
      });
    }
  },

  summarizeSaveOutcomes: function(successes, failures) {
    var summary = "Saved " + successes.length + " of " + (successes.length + failures.length);
    if (!failures.length) return summary + " successfully.";
    var first = (failures[0] && failures[0].result) ? failures[0].result : {};
    var detail = first.message || "Unable to save one or more students.";
    if (first.debugId) detail += " Debug ID: " + first.debugId;
    return summary + ". " + failures.length + " failed. " + detail + " View details in History.";
  },

  createLocalFailureRecord: function(entry, payload, result) {
    var now = new Date();
    return {
      localKey: "local-" + now.getTime() + "-" + String(entry && entry._row || ""),
      logRow: result && result.logRow ? result.logRow : "",
      row: String((result && result.row) || (entry && entry._row) || ""),
      id: String((result && result.id) || (entry && entry.ID) || ""),
      name: String((result && result.name) || (entry && entry.name) || ""),
      payload: payload || {},
      payloadJson: JSON.stringify(payload || {}),
      code: String((result && result.code) || "CLIENT_RPC_FAILURE"),
      message: String((result && result.message) || "The save request failed before the server returned a result."),
      details: String((result && result.details) || ""),
      debugId: String((result && result.debugId) || ""),
      status: String((result && result.status) || "failed"),
      retryResult: String((result && result.retryResult) || ""),
      retryDebugId: String((result && result.retryDebugId) || ""),
      dateSaved: now.getFullYear() + "-" +
        String(now.getMonth() + 1).padStart(2, "0") + "-" +
        String(now.getDate()).padStart(2, "0") + " " +
        String(now.getHours()).padStart(2, "0") + ":" +
        String(now.getMinutes()).padStart(2, "0") + ":" +
        String(now.getSeconds()).padStart(2, "0")
    };
  },

  upsertLocalFailureRecord: function(record) {
    if (!record) return;
    var matched = false;
    Model.localSaveFailureRows = (Model.localSaveFailureRows || []).map(function(item) {
      if (record.logRow && String(item.logRow || "") === String(record.logRow)) {
        matched = true;
        return Object.assign({}, item, record);
      }
      if (record.localKey && String(item.localKey || "") === String(record.localKey)) {
        matched = true;
        return Object.assign({}, item, record);
      }
      return item;
    });
    if (!matched) Model.localSaveFailureRows.unshift(record);
  },

  removeLocalFailureRecord: function(match) {
    Model.localSaveFailureRows = (Model.localSaveFailureRows || []).filter(function(item) {
      if (match.logRow && String(item.logRow || "") === String(match.logRow)) return false;
      if (match.localKey && String(item.localKey || "") === String(match.localKey)) return false;
      return true;
    });
  },

  getMergedFailureRows: function(serverRows) {
    var merged = Array.isArray(serverRows) ? serverRows.slice() : [];
    var seen = {};
    merged.forEach(function(item) {
      if (item.logRow) seen["log:" + item.logRow] = true;
      if (item.localKey) seen["local:" + item.localKey] = true;
    });
    (Model.localSaveFailureRows || []).forEach(function(item) {
      var key = item.logRow ? "log:" + item.logRow : "local:" + item.localKey;
      if (!seen[key]) {
        merged.push(item);
        seen[key] = true;
      }
    });
    merged.sort(function(a, b) {
      return String(b.dateSaved || "").localeCompare(String(a.dateSaved || ""));
    });
    return merged;
  },

  executeSaveTargets: function(targets) {
    var idx = 0;
    var successes = [];
    var failures = [];

    Model.isSavingBatch = true;
    View.showSaveIndicator("Saving...", "info", 0);
    View.clearModalActionError("savebtn");
    View.setSaveButtonLoading(true);
    View.updateActionButtons();

    var updateNext = function() {
      if (idx >= targets.length) {
        successes.forEach(function(item) {
          Controller.applySavedEntryToData(item.entry);
        });
        Model.batchConfirmed = false;
        Model.batchHasChanges = Model.isBatchDirty();
        Model.lastSaveOutcomeSummary = Controller.summarizeSaveOutcomes(successes, failures);
        Controller.pendingSaveTargets = null;
        Model.isSavingBatch = false;
        Controller.renderPage(Model.currentPage);
        View.renderSelectedBatchList();
        View.setSaveButtonLoading(false);
        View.updateActionButtons();
        if (successes.length) {
          Controller.loadHistoryData();
        }
        if (failures.length) {
          View.setModalActionError("savebtn", Model.lastSaveOutcomeSummary);
          View.showSaveIndicator(Model.lastSaveOutcomeSummary, "error", 5000);
          Controller.loadSaveFailureHistory();
        } else {
          View.showSaveIndicator("Saved successfully", "success", 3000);
        }
        return;
      }

      var entry = targets[idx++];
      var payload = Controller.buildSavePayload(entry);

      Service.updateIssuanceColumns(
        payload,
        function(result) {
          if (result && result.ok) {
            successes.push({ entry: entry, result: result });
            if (result.logRow) Controller.removeLocalFailureRecord({ logRow: result.logRow });
          } else {
            Controller.upsertLocalFailureRecord(Controller.createLocalFailureRecord(entry, payload, result));
            failures.push({
              entry: entry,
              result: result || {
                ok: false,
                row: entry._row,
                message: "The save did not complete.",
                code: "UNKNOWN_SAVE_FAILURE",
                debugId: ""
              }
            });
          }
          updateNext();
        },
        function(err) {
          Service.logClientSaveFailure(payload, err && err.message ? err.message : "The save request failed before the server returned a result.", function(result) {
            Controller.upsertLocalFailureRecord(Controller.createLocalFailureRecord(entry, payload, result));
            failures.push({
              entry: entry,
              result: result || {
                ok: false,
                row: entry._row,
                message: "The save request failed before the server returned a result.",
                code: "CLIENT_RPC_FAILURE",
                debugId: ""
              }
            });
            updateNext();
          }, function() {
            Controller.upsertLocalFailureRecord(Controller.createLocalFailureRecord(entry, payload, {
              row: entry._row,
              id: entry.ID || "",
              name: entry.name || "",
              message: "The save request failed before the server returned a result.",
              code: "CLIENT_RPC_FAILURE",
              debugId: ""
            }));
            failures.push({
              entry: entry,
              result: {
                ok: false,
                row: entry._row,
                message: "The save request failed before the server returned a result.",
                code: "CLIENT_RPC_FAILURE",
                debugId: ""
              }
            });
            updateNext();
          });
        }
      );
    };

    if (!targets.length) {
      Model.isSavingBatch = false;
      View.setSaveButtonLoading(false);
      View.showSaveIndicator("No changes to save", "error", 2000);
      return;
    }

    updateNext();
  },

  retryFailedSave: function(logRow) {
    if (!logRow) return;
    View.setRetryFailureButtonLoading(logRow, "", true);
    View.showSaveIndicator("Retrying failed save...", "info", 0);
    Service.retryFailedSave(logRow, function(result) {
      View.setRetryFailureButtonLoading(logRow, "", false);
      if (result && result.ok) {
        if (result.row) {
          Controller.syncDatabaseRow(result.row);
        }
        Controller.loadHistoryData();
        Controller.loadSaveFailureHistory();
        View.showSaveIndicator("Retry succeeded", "success", 3000);
        if (Model.activeMainView !== "history") Controller.setActiveMainView("history");
        Controller.setActiveHistorySection("failure");
      } else {
        Controller.loadSaveFailureHistory();
        View.showSaveIndicator((result && result.message ? result.message : "Retry failed.") + (result && result.debugId ? " Debug ID: " + result.debugId : ""), "error", 5000);
      }
    }, function(err) {
      View.setRetryFailureButtonLoading(logRow, "", false);
      View.showSaveIndicator((err && err.message ? err.message : "Retry failed before the server returned a result."), "error", 5000);
    });
  },

  retryLocalFailedSave: function(localKey) {
    var failure = (Model.localSaveFailureRows || []).find(function(item) {
      return String(item.localKey || "") === String(localKey || "");
    });
    if (!failure || !failure.payload) return;

    View.setRetryFailureButtonLoading("", localKey, true);
    View.showSaveIndicator("Retrying failed save...", "info", 0);
    Service.updateIssuanceColumns(failure.payload, function(result) {
      View.setRetryFailureButtonLoading("", localKey, false);
      if (result && result.ok) {
        if (result.row) Controller.syncDatabaseRow(result.row);
        Controller.removeLocalFailureRecord({ localKey: localKey });
        Controller.loadHistoryData();
        Controller.loadSaveFailureHistory();
        View.showSaveIndicator("Retry succeeded", "success", 3000);
        Controller.setActiveMainView("history");
        Controller.setActiveHistorySection("failure");
        return;
      }
      Controller.upsertLocalFailureRecord(Object.assign({}, failure, {
        message: (result && result.message) || failure.message,
        code: (result && result.code) || failure.code,
        debugId: (result && result.debugId) || failure.debugId,
        retryResult: (result && result.message) || failure.retryResult,
        retryDebugId: (result && result.debugId) || failure.retryDebugId
      }));
      Controller.loadSaveFailureHistory();
      View.showSaveIndicator(((result && result.message) || "Retry failed.") + ((result && result.debugId) ? " Debug ID: " + result.debugId : ""), "error", 5000);
    }, function(err) {
      View.setRetryFailureButtonLoading("", localKey, false);
      Controller.upsertLocalFailureRecord(Object.assign({}, failure, {
        retryResult: err && err.message ? err.message : "Retry failed before the server returned a result."
      }));
      Controller.loadSaveFailureHistory();
      View.showSaveIndicator((err && err.message ? err.message : "Retry failed before the server returned a result."), "error", 5000);
    });
  },

  addBatchStudent: function(rowID, skipStatusPrompt) {
    this.syncCurrentFormToModel();
    var student = Model.fullData.find(function(s){ return String(s._row) === String(rowID); });
    if (!student) return;
    var permissionCheck = Model.evaluateRecordPermissions(student);
    if (!permissionCheck.canEditRecord) {
      View.setModalActionError("updateStudentBtn", permissionCheck.denyReason || "You do not have permission to edit this record.");
      return;
    }
    var restrictionReason = this.getBatchAddRestrictionReason(student);
    if (restrictionReason) {
      View.setModalActionError("updateStudentBtn", restrictionReason);
      return;
    }
    var category = Model.getVerificationCategory(student["Verification Status"]);
    if (!skipStatusPrompt && !Model.statusEditConfirmed && category !== "verified") {
      this.pendingStatusEditStudent = student;
      this.pendingStatusAction = "batch-add";
      var statusLabel = category === "deficiency" ? "Deficiency" : "Unverified";
      View.openStatusEditConfirmModal("This student is currently marked as " + statusLabel + ". Do you want to continue editing and adding this record to the batch?");
      return;
    }

    Model.addBatchStudent(student);
    this.propagateFromFirstStudent();
    Model.recomputeBatchSoPreviews();
    Model.batchHasChanges = Model.isBatchDirty();
    View.renderSelectedBatchList();
    View.updateActionButtons();

    var anchorEntry = Model.getFirstWithoutSOEntry() || Model.batchStudents[0];
    if (anchorEntry) {
      View.populateEditForm(anchorEntry);
      this.applyCurrentRecordPermissions(Model.fullData.find(function(s) { return String(s._row) === String(anchorEntry._row); }) || null);
    }
    this.searchBatchStudents((document.getElementById("batchSearchInput") || {}).value || "");
  },

  searchBatchStudents: function(term) {
    term = (term || "").trim().toLowerCase();
    var token = ++Model.activeBatchSearchToken;
    Model.lastBatchSearchTerm = term;

    if (!term) {
      View.renderBatchSearchResults([], false);
      return;
    }

    var localResults = Model.fullData.filter(function(student) {
      if (Model.isBatchSelected(student._row)) return false;
      var name = (student["Name of the Student"] || "").toLowerCase();
      var id = String(student.ID || "").toLowerCase();
      var match = name.indexOf(term) !== -1 || id.indexOf(term) !== -1;
      return match && Model.passesVerificationFilter(student["Verification Status"], Model.verificationFilterModal);
    }).slice(0, 25);

    if (localResults.length) {
      View.renderBatchSearchResults(localResults, true);
      return;
    }

    var shouldFetchServer = Model.fullData.length < Model.totalRows || Model.loadingBatches;
    if (!shouldFetchServer) {
      View.renderBatchSearchResults([], true);
      return;
    }

    View.showBatchSearchLoading();
    Service.searchExactName(term, function(res) {
      if (token !== Model.activeBatchSearchToken) return;
      if (!res || !res.length) {
        View.renderBatchSearchResults([], true);
        return;
      }
      var remote = res.filter(function(student) {
        if (Model.isBatchSelected(student._row)) return false;
        return Model.passesVerificationFilter(student["Verification Status"], Model.verificationFilterModal);
      }).slice(0, 25);
      View.renderBatchSearchResults(remote, true);
    });
  },

  setVerificationFilter: function(mode, scope) {
    var allowed = ["verified", "deficiency", "unverified"];
    var selected = [];
    var modeWasArray = Array.isArray(mode);
    var target = (scope === "modal") ? "verificationFilterModal" : "verificationFilterMain";
    if (Array.isArray(mode)) {
      selected = mode.filter(function(v, i, arr) {
        return allowed.indexOf(v) !== -1 && arr.indexOf(v) === i;
      });
    } else {
      var value = String(mode || "all");
      if (value === "all") {
        selected = allowed.slice();
      } else if (allowed.indexOf(value) !== -1) {
        selected = [value];
      }
    }
    if (!selected.length && !modeWasArray) selected = allowed.slice();
    Model[target] = selected;
    this.refreshFilterUI();

    if (target === "verificationFilterMain") {
      this.doSearch(Model.lastMainSearchTerm || "");
      return;
    }
    this.searchBatchStudents(Model.lastBatchSearchTerm || "");
  },

  refreshFilterUI: function() {
    var labelMap = {
      verified: "Verified",
      deficiency: "Deficiency",
      unverified: "Unverified"
    };

    var renderTags = function(containerId, mode, scope) {
      var container = document.getElementById(containerId);
      if (!container) return;
      if (!mode.length) {
        container.innerHTML = "";
        return;
      }
      container.innerHTML = mode.map(function(item) {
        var chipScopeClass = (scope === "main") ? "filter-chip-main" : "filter-chip-modal";
        return "<span class='filter-chip " + chipScopeClass + " active' data-filter='" + item + "'>" + (labelMap[item] || item) + " <button type='button' title='Remove filter'>&times;</button></span>";
      }).join(" ");
      container.querySelectorAll(".filter-chip button").forEach(function(btn) {
        btn.onclick = function(e) {
          e.stopPropagation();
          var chip = btn.closest(".filter-chip");
          var key = chip ? chip.getAttribute("data-filter") : "";
          var next = mode.filter(function(m) { return m !== key; });
          Controller.setVerificationFilter(next, scope);
        };
      });
    };

    var mainMode = Array.isArray(Model.verificationFilterMain) ? Model.verificationFilterMain.slice() : ["verified", "deficiency", "unverified"];
    var modalMode = Array.isArray(Model.verificationFilterModal) ? Model.verificationFilterModal.slice() : ["verified", "deficiency", "unverified"];
    renderTags("filterTagsMain", mainMode, "main");
    renderTags("filterTagsModal", modalMode, "modal");
    var mainOptions = document.querySelectorAll("input[name='filterMainOption']");
    var modalOptions = document.querySelectorAll("input[name='filterModalOption']");
    mainOptions.forEach(function(r) { r.checked = mainMode.indexOf(r.value) !== -1; });
    modalOptions.forEach(function(r) { r.checked = modalMode.indexOf(r.value) !== -1; });
  },

  saveEdit: function() {
    View.clearModalValidationErrors();
    if (!(Model.currentRecordPermissions && Model.currentRecordPermissions.canEditRecord)) {
      View.setModalActionError("savebtn", (Model.currentRecordPermissions && Model.currentRecordPermissions.denyReason) || "You do not have permission to edit this record.");

      return;
    }
    if (!Model.batchConfirmed) {
      View.setModalActionError("savebtn", "Click Update first to confirm the current batch changes.");
      View.updateActionButtons();
      return;
    }
    if (!Model.batchHasChanges) {
      View.showSaveIndicator("No changes to save", "error", 2000);
      View.updateActionButtons();
      return;

    var validationError = this.validateBatchEntriesDetailed("savebtn");
    if (validationError) {

      Model.batchConfirmed = false;
      View.updateActionButtons();

    var targets = Model.batchStudents.slice();

    if (existingSoChanges.length) {

      View.openSoChangeConfirmModal(this.getExistingSoChangeMessage(existingSoChanges));

    this.executeSaveTargets(targets);

    var fallback = document.getElementById("navbarLogoFallback");
    var loading = document.getElementById("navbarLogoLoading");

    if (shell) {
      shell.classList.add("is-loading");

    }
    if (loading) loading.classList.remove("d-none");

      var dataUrl = result && result.dataUrl ? String(result.dataUrl).trim() : "";

      if (!dataUrl) {
        if (shell) shell.classList.remove("is-loading");
        if (loading) loading.classList.add("d-none");
        if (logoImage) {
          logoImage.onload = null;
          logoImage.onerror = null;
          logoImage.removeAttribute("src");
          logoImage.classList.add("d-none");
        }
        if (fallback) fallback.classList.remove("d-none");
        return;
      }

      if (!logoImage) {
        if (shell) shell.classList.remove("is-loading");
        if (loading) loading.classList.add("d-none");

      }

      logoImage.onload = function() {
        if (shell) {
          shell.classList.remove("is-loading");

  startDatabaseRowPolling: function() {
    setInterval(function() {
      if (Model.isSyncingRow) return;

      Service.getDatabaseRowUpdateInfo(function(info) {
        if (!info || !info.updatedAt) return;
        if (String(info.updatedAt) === String(Model.lastDatabaseUpdateAt)) return;

        Model.lastDatabaseUpdateAt = String(info.updatedAt);
        var sheetName = String(info.sheet || "");

        if (sheetName === "Accounts" || sheetName === "Users" || sheetName === "User Access" || sheetName === "Data Types") {
          Controller.loadAccountName();
          Controller.loadUserDebugInfo();
          Controller.loadUserRole();
          Controller.loadUserPositionFieldSchema();
          Controller.initData();
          return;
        }

        var rowNumber = Number(info.row);
        if (!rowNumber || rowNumber < 2) return;

        Controller.syncDatabaseRow(rowNumber);
      });
    }, 10000);
  },

  syncDatabaseRow: function(rowNumber) {
    Model.isSyncingRow = true;

    Service.getDatabaseRow(rowNumber, function(updatedRow) {
      Model.isSyncingRow = false;
      if (!updatedRow || !updatedRow._row) return;

      var replaced = false;

      Model.fullData = Model.fullData.map(function(row) {
        if (String(row._row) === String(updatedRow._row)) {
          replaced = true;
          return updatedRow;
        }
        return row;
      })
      
      if (!replaced) {
        return;
      }

      if (Model.searchMode) {
        Controller.doSearch(Model.lastMainSearchTerm || "");
      } else {
        Model.filteredData = Model.fullData.filter(function(r) {
          return true;
        });
        Model.filteredData = Model.applyMainViewFilters(Model.fullData);
        Controller.renderPage(Model.currentPage);
      }

      Model.recomputeBatchSoPreviews();
      View.renderSelectedBatchList();
      if (Model.editingRowID) {
        Controller.applyCurrentRecordPermissions(Model.getCurrentStudent());
      }
    }, function() {
      Model.isSyncingRow = false;
    });
  },


  initEventListeners: function() {
    if (Model.listenersBound) return;
    Model.listenersBound = true;

    this.searchDebounced = this.debounce(function(value) { Controller.doSearch(value); }, 220);
    this.batchSearchDebounced = this.debounce(function(value) { Controller.searchBatchStudents(value); }, 180);

    var searchInput = document.getElementById("searchInput");
    var searchClearBtn = document.getElementById("searchClearBtn");
    var updateClearButtonState = function(inputEl, buttonEl) {
      if (!inputEl || !buttonEl) return;
      var hasText = !!String(inputEl.value || "").trim();
      buttonEl.disabled = !hasText;
      buttonEl.style.visibility = hasText ? "visible" : "hidden";
    };
    if (searchInput) {
      searchInput.addEventListener("input", function(e){
        updateClearButtonState(searchInput, searchClearBtn);
        Controller.searchDebounced(e.target.value);
      });
    }
    if (searchClearBtn && searchInput) {
      searchClearBtn.addEventListener("click", function() {
        searchInput.value = "";
        updateClearButtonState(searchInput, searchClearBtn);
        Controller.doSearch("");
      });
      updateClearButtonState(searchInput, searchClearBtn);
    }

    var statusFilterMain = document.getElementById("statusFilterMain");
    var statusFilterModal = document.getElementById("statusFilterModal");
    if (statusFilterMain) statusFilterMain.value = "all";
    if (statusFilterModal) statusFilterModal.value = "all";

    var addFilterBtnMain = document.getElementById("addFilterBtnMain");
    var addFilterBtnModal = document.getElementById("addFilterBtnModal");
    var filterPopoverMain = document.getElementById("filterPopoverMain");
    var filterPopoverModal = document.getElementById("filterPopoverModal");
    var filterDoneMain = document.getElementById("filterDoneMain");
    var filterDoneModal = document.getElementById("filterDoneModal");
    var filterAllMain = document.getElementById("filterAllMain");
    var filterAllModal = document.getElementById("filterAllModal");
    var filterClearMain = document.getElementById("filterClearMain");
    var filterClearModal = document.getElementById("filterClearModal");
    var mainRadioOptions = document.querySelectorAll("input[name='filterMainOption']");
    var modalRadioOptions = document.querySelectorAll("input[name='filterModalOption']");

    if (addFilterBtnMain && filterPopoverMain) {
      addFilterBtnMain.addEventListener("click", function(e) {
        e.stopPropagation();
        filterPopoverMain.classList.toggle("show");
        if (filterPopoverModal) filterPopoverModal.classList.remove("show");
      });
    }
    if (addFilterBtnModal && filterPopoverModal) {
      addFilterBtnModal.addEventListener("click", function(e) {
        e.stopPropagation();
        filterPopoverModal.classList.toggle("show");
        if (filterPopoverMain) filterPopoverMain.classList.remove("show");
      });
    }
    if (filterDoneMain && filterPopoverMain) {
      filterDoneMain.addEventListener("click", function() { filterPopoverMain.classList.remove("show"); });
    }
    if (filterDoneModal && filterPopoverModal) {
      filterDoneModal.addEventListener("click", function() { filterPopoverModal.classList.remove("show"); });
    }
    mainRadioOptions.forEach(function(radio) {
      radio.addEventListener("change", function() {
        var selected = Array.from(mainRadioOptions).filter(function(el) { return el.checked; }).map(function(el) { return el.value; });
        Controller.setVerificationFilter(selected, "main");
      });
    });
    modalRadioOptions.forEach(function(radio) {
      radio.addEventListener("change", function() {
        var selected = Array.from(modalRadioOptions).filter(function(el) { return el.checked; }).map(function(el) { return el.value; });
        Controller.setVerificationFilter(selected, "modal");
      });
    });
    if (filterAllMain) filterAllMain.addEventListener("click", function() { Controller.setVerificationFilter(["verified", "deficiency", "unverified"], "main"); });
    if (filterAllModal) filterAllModal.addEventListener("click", function() { Controller.setVerificationFilter(["verified", "deficiency", "unverified"], "modal"); });
    if (filterClearMain) filterClearMain.addEventListener("click", function() { Controller.setVerificationFilter([], "main"); });
    if (filterClearModal) filterClearModal.addEventListener("click", function() { Controller.setVerificationFilter([], "modal"); });
    document.addEventListener("click", function(e) {
      if (filterPopoverMain && !e.target.closest("#filterBuilderMain")) filterPopoverMain.classList.remove("show");
      if (filterPopoverModal && !e.target.closest("#filterBuilderModal")) filterPopoverModal.classList.remove("show");
    });
    this.refreshFilterUI();

    var resultsTable = document.getElementById("searchResults");
    if (resultsTable) {
      resultsTable.addEventListener("click", function(e) {
        var tr = e.target.closest("tr");
        if (tr && tr.dataset.row) {
          var student = Model.fullData.find(function(s) { return String(s._row) === String(tr.dataset.row); });
          if (student) Controller.requestOpenStudentEditor(student);
        }
      });
    }
    var resultsMobile = document.getElementById("searchResultsMobile");
    if (resultsMobile) {
      resultsMobile.addEventListener("click", function(e) {
        var card = e.target.closest("[data-row]");
        if (card && card.dataset.row) {
          var student = Model.fullData.find(function(s) { return String(s._row) === String(card.dataset.row); });
          if (student) Controller.requestOpenStudentEditor(student);
        }
      });
    }

    var batchSearchInput = document.getElementById("batchSearchInput");
    var batchSearchClearBtn = document.getElementById("batchSearchClearBtn");
    if (batchSearchInput) {
      batchSearchInput.addEventListener("input", function(e) {
        updateClearButtonState(batchSearchInput, batchSearchClearBtn);
        Controller.batchSearchDebounced(e.target.value);
      });
    }
    if (batchSearchClearBtn && batchSearchInput) {
      batchSearchClearBtn.addEventListener("click", function() {
        batchSearchInput.value = "";
        updateClearButtonState(batchSearchInput, batchSearchClearBtn);
        Controller.searchBatchStudents("");
      });
      updateClearButtonState(batchSearchInput, batchSearchClearBtn);
    }

    var pageInput = document.getElementById("pageJumpInput");
    var pageBtn = document.getElementById("pageJumpBtn");
    if (pageBtn && pageInput) {
      pageBtn.addEventListener("click", function() {
        Controller.goToPage(pageInput.value);
      });
      pageInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") Controller.goToPage(pageInput.value);
      });
    }

    Object.keys(this.formFieldMap).forEach(function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      var key = Controller.formFieldMap[id];
      el.addEventListener("input", function() { Controller.onFormFieldEvent(key); });
      el.addEventListener("change", function() { Controller.onFormFieldEvent(key); });
    });

    var soPrefixEl = document.getElementById("so_prefix");
    if (soPrefixEl) {
      soPrefixEl.addEventListener("blur", function() {
        Controller.saveSoPrefixIfNeeded(soPrefixEl.value);
      });
      soPrefixEl.addEventListener("change", function() {
        Controller.saveSoPrefixIfNeeded(soPrefixEl.value);
      });
    }

    var editModal = document.getElementById("editModal");
    if (editModal) {
      editModal.addEventListener("click", function(e) {
        if (e.target === editModal) View.closeEditModal();
      });
    }

    var navHomeBtn = document.getElementById("navHomeBtn");
    if (navHomeBtn) {
      navHomeBtn.addEventListener("click", function() {
        Controller.setActiveMainView("home");
      });
    }

    var navReportBtn = document.getElementById("navReportBtn");
    if (navReportBtn) {
      navReportBtn.addEventListener("click", function() {
        Controller.setActiveMainView("report");
      });
    }

    var navHistoryBtn = document.getElementById("navHistoryBtn");
    if (navHistoryBtn) {
      navHistoryBtn.addEventListener("click", function() {
        Controller.openHistoryForFocusedStudent();
      });
    }

    var historySuccessTab = document.getElementById("historySuccessTab");
    if (historySuccessTab) {
      historySuccessTab.addEventListener("click", function() {
        Controller.setActiveHistorySection("success");
      });
    }

    var historyFailureTab = document.getElementById("historyFailureTab");
    if (historyFailureTab) {
      historyFailureTab.addEventListener("click", function() {
        Controller.setActiveHistorySection("failure");
      });
    }

    var historyFailureResults = document.getElementById("historyFailureResults");
    if (historyFailureResults) {
      historyFailureResults.addEventListener("click", function(e) {
        var retryBtn = e.target.closest(".retry-failure-btn");
        if (!retryBtn) return;
        var logRow = retryBtn.getAttribute("data-log-row");
        var localKey = retryBtn.getAttribute("data-local-key");
        if (logRow) {
          Controller.retryFailedSave(logRow);
          return;
        }
        if (localKey) {
          Controller.retryLocalFailedSave(localKey);
        }
      });
    }

    View.updateActionButtons();
  }
};
</script>
