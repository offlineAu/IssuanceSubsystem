<script>
var TypingController = {
  formFieldMap: {
    temp_date_received: "dateReceived",
    temp_student_name: "studentName",
    temp_hei: "hei",
    temp_date_graduation: "dateGraduation",
    temp_program: "program"
  },

  validationFieldMap: {
    dateReceived: { id: "temp_date_received", label: "Date Received" },
    studentName: { id: "temp_student_name", label: "Name of the Student" },
    hei: { id: "temp_hei", label: "HEI" },
    dateGraduation: { id: "temp_date_graduation", label: "Date of Graduation" },
    program: { id: "temp_program", label: "Program" }
  },

  searchDebounced: null,
  pendingSaveTargets: null,

  setActiveMainView: function(viewName) {
    var nextView = viewName === "history" ? "history" : "home";
    Model.activeMainView = nextView;
    View.setActiveMainView(nextView);
    if (nextView === "history") {
      this.setActiveHistorySection(Model.activeHistorySection || "success");
    }
  },

  init: function() {
    this.initEventListeners();
    this.loadNavbarLogo();
    this.loadAccountName();
    this.loadUserRole();
    this.loadRefData();
    this.setActiveMainView("home");
    this.initData();
    this.startDatabaseRowPolling();
  },

  initData: function(options) {
    var settings = options || {};
    if (!settings.silent) View.showOverlay(true);

    Service.getYearsSummary(function(yearSummary) {
      if (!yearSummary || !yearSummary.summaries || !yearSummary.summaries.length) {
        Model.availableYears = [];
        Model.yearDataMap = {};
        Model.filteredData = [];
        TypingController.renderYearTabs();
        if (!settings.silent) View.showOverlay(false);
        return;
      }

      Model.availableYears = yearSummary.summaries.map(function(s) { return String(s.year); });
      Model.yearLoadState = {};
      yearSummary.summaries.forEach(function(s) {
        Model.yearLoadState[s.year] = 'unloaded';
        Model.yearDataMap[s.year] = [];
      });

      TypingController.renderYearTabs();

      var latestYears = yearSummary.summaries.slice(0, 2);

      if (latestYears.length > 0) {
        var firstYear = String(latestYears[0].year);
        Model.currentYear = firstYear;

        TypingController.loadYearData(firstYear, function() {
          if (latestYears.length > 1) {
            var secondYear = String(latestYears[1].year);
            TypingController.loadYearData(secondYear, function() {
              if (!settings.silent) View.showOverlay(false);
            });
          } else {
            if (!settings.silent) View.showOverlay(false);
          }
        });
      } else {
        if (!settings.silent) View.showOverlay(false);
      }
    });
  },

  loadYearData: function(year, onComplete) {
    console.log("[TypingController] loadYearData called for year:", year);
    if (Model.yearLoadState[year] === 'loading' || Model.yearLoadState[year] === 'loaded') {
      if (onComplete) onComplete();
      return;
    }

    Model.yearLoadState[year] = 'loading';
    Model.loadingYears.push(year);
    TypingController.renderYearTabs();

    var allRecords = [];
    var batchSize = 5000;

    function syncFullData() {
      var byRow = {};
      Model.availableYears.forEach(function(y) {
        var rows = Model.yearDataMap[y] || [];
        rows.forEach(function(row) {
          if (row && row._row) byRow[String(row._row)] = row;
        });
      });
      Model.fullData = Object.keys(byRow).map(function(k) {
        return byRow[k];
      }).sort(function(a, b) { return Number(a._row) - Number(b._row); });
    }

    function fetchBatch(nextScanFrom) {
      console.log("[TypingController] getDataByYear year:", year, "scanFrom:", nextScanFrom);
      Service.getDataByYear(year, batchSize, nextScanFrom, function(res) {
        if (!res || !res.success) {
          finalize(allRecords);
          return;
        }

        allRecords = allRecords.concat(res.data || []);
        Model.yearDataMap[year] = allRecords;
        syncFullData();
        TypingController.renderYearTabs();

        if (Model.currentYear === String(year)) {
          Model.filteredData = Model.applyMainViewFilters(allRecords);
          TypingController.renderPage(1);
        }

        if (res.hasMore && res.nextScanFrom && res.nextScanFrom > 0) {
          fetchBatch(res.nextScanFrom);
        } else {
          finalize(allRecords);
        }
      });
    }

    function finalize(records) {
      Model.yearDataMap[year] = records;
      syncFullData();
      Model.yearLoadState[year] = 'loaded';
      Model.yearBatchProgress[year] = { hasMore: false, nextScanFrom: 0, total: records.length };
      console.log("[TypingController] Finished year", year, "total:", records.length);

      Model.loadingYears = Model.loadingYears.filter(function(y) { return y !== year; });
      TypingController.renderYearTabs();

      if (Model.currentYear === String(year)) {
        Model.filteredData = Model.applyMainViewFilters(records);
        TypingController.renderPage(1);
      }

      if (onComplete) onComplete();
    }

    fetchBatch(undefined);
  },
  updateYearTabCounts: function() {
    // This would fetch summary counts for remaining years
    // For now, we rely on the initial summary data
  },

  loadNextBatchForYear: function(year) {
    var progress = Model.yearBatchProgress[year];
    if (!progress || !progress.hasMore || Model.yearLoadState[year] !== 'loaded') {
      return;
    }
    
    Service.loadRemainingDataByYear(year, progress.nextStartRow, Model.nextBatchSize, function(res) {
      if (res && res.success && res.data) {
        // Append new data to existing year data
        Model.yearDataMap[year] = Model.yearDataMap[year].concat(res.data);
        Model.yearBatchProgress[year] = {
          nextStartRow: res.nextStartRow,
          hasMore: res.hasMore,
          total: res.total
        };
        
        // Refresh if this is current year
        if (Model.currentYear === year) {
          Model.filteredData = Model.applyMainViewFilters(Model.yearDataMap[year]);
          Controller.renderPage(Model.currentPage);
        }
      }
    });
  },

  loadNextBatch: function(startRow) {
    var targetModule = "typing";
    var requestId = this.getCurrentModuleRequestId();
    if (!Model.loadingBatches || startRow > (Model.totalRows + 1)) return;
    Service.loadRemainingData(startRow, Model.nextBatchSize, this.guardModuleCallback(targetModule, requestId, function(res){
      if (res.data && res.data.length) {
        var existingRows = {};
        Model.fullData.forEach(function(f){ existingRows[String(f._row)] = true; });
        var newRows = res.data.filter(function(r){ return !existingRows[String(r._row)]; });
        Model.fullData = Model.fullData.concat(newRows);

        if (!Model.searchMode) {
          Model.filteredData = Model.applyMainViewFilters(Model.fullData);
          Controller.renderPage(Model.currentPage);
        }

        Model.recomputeBatchSoPreviews();
        View.renderSelectedBatchList();
        View.renderReportAnalytics();

        Model.nextBatchStart += Model.nextBatchSize;
        Controller.loadNextBatch(Model.nextBatchStart);
      } else {
        Model.loadingBatches = false;
      }
    }));
  },

  renderPage: function(page) {
    var totalPages = Math.max(1, Math.ceil(Model.filteredData.length / Model.rowsPerPage));
    var safePage = Number(page) || 1;
    if (safePage < 1) safePage = 1;
    if (safePage > totalPages) safePage = totalPages;
    Model.currentPage = safePage;
    View.renderPage(safePage);
  },

  goToPage: function(page) {
    this.renderPage(page);
  },

  findLoadedStudentByRow: function(rowID) {
    var key = String(rowID || "");
    return (Model.filteredData || []).find(function(s) { return String(s._row) === key; }) ||
      (Model.fullData || []).find(function(s) { return String(s._row) === key; });
  },

  debounce: function(fn, wait) {
    var timer = null;
    return function() {
      var ctx = this;
      var args = arguments;
      clearTimeout(timer);
      timer = setTimeout(function() { fn.apply(ctx, args); }, wait);
    };
  },

  loadRefData: function() {
    Service.getRefSheetData(function(data) {
      Model.refData = data || { programs: [], heis: [], programMap: {}, heiMap: {} };
      // Populate datalists
      View.populateDatalistOptions("temp_program_list",
        Model.refData.programs.map(function(p) { return p.program; })
      );
      View.populateDatalistOptions("temp_hei_list",
        Model.refData.heis.map(function(h) { return h.hei; })
      );
    });
  },

  doSearch: function(term) {
    var token = ++Model.activeSearchToken;
    term = (term || "").trim().toLowerCase();
    Model.lastMainSearchTerm = term;
    Model.isSearchingMain = false;

    // Always scope to current year's data
    var currentYearData = Model.yearDataMap[Model.currentYear] || [];

    if (!term) {
      Model.searchMode = false;
      Model.filteredData = Model.applyMainViewFilters(currentYearData);
      this.renderPage(1);
      return;
    }

    Model.searchMode = true;
    var searchFields = ["Name of the Student", "ID", "HEI", "Program"];
    var localMatch = currentYearData.filter(function(r) {
      return searchFields.some(function(field) {
        var value = r[field] || "";
        return value.toString().toLowerCase().includes(term);
      });
    });
    var filteredLocal = Model.applyMainViewFilters(localMatch);

    if (filteredLocal.length) {
      Model.filteredData = Model.removeDuplicates(filteredLocal);
      this.renderPage(1);
    } else {
      Model.isSearchingMain = true;
      View.showMainSearchLoading();
      Service.searchExactName(term, function(res) {
        if (token !== Model.activeSearchToken) return;
        Model.isSearchingMain = false;
        if (res && res.length) {
          // Also scope remote results to current year
          var yearFiltered = res.filter(function(r) {
            return String(r["Year"] || new Date(r["Date Received"] || "").getFullYear()) === String(Model.currentYear);
          });
          var filteredRemote = Model.applyMainViewFilters(yearFiltered.length ? yearFiltered : res);
          if (!filteredRemote.length) {
            View.renderEmpty("No records found");
            return;
          }
          Model.filteredData = Model.removeDuplicates(filteredRemote);
          TypingController.renderPage(1);
        } else {
          View.renderEmpty("No records found");
        }
      });
    }
  },

  getFormPatch: function() {
    return {
      dateReceived: this.normalizeIsoDateInput((document.getElementById("temp_date_received") || {}).value || ""),
      studentName: (document.getElementById("temp_student_name") || {}).value || "",
      hei: (document.getElementById("temp_hei") || {}).value || "",
      heiAddress: (document.getElementById("temp_hei_address") || {}).value || "",
      dateGraduation: this.normalizeIsoDateInput((document.getElementById("temp_date_graduation") || {}).value || ""),
      program: (document.getElementById("temp_program") || {}).value || "",
      es2InCharge: (document.getElementById("temp_es2_incharge") || {}).value || "",
      targetReleaseDate: (document.getElementById("temp_target_release_date") || {}).value || ""
    };
  },

  openEditModal: function(student) {
    if (!student) return;
    
    // Debug: log the student object to confirm field names
    console.log("[openEditModal] student fields:", Object.keys(student));
    console.log("[openEditModal] student data:", student);
    
    Model.setEditingRow(student._row);

    var setText = function(id, val) {
      var el = document.getElementById(id);
      if (el) el.textContent = (val !== undefined && val !== null && val !== "") ? val : "-";
    };

    var setVal = function(id, val) {
      var el = document.getElementById(id);
      if (el) el.value = (val !== undefined && val !== null) ? val : "";
    };

    // Info strip
    setText("editModalStudentName", student["Name of the Student"]);
    setText("editModalStudentMeta", "Row: " + student._row + " | ID: " + (student["ID"] || "-"));
    setText("view_date_received", student["Date Received"]);
    setText("view_target_release", student["Target Release Date"]);
    setText("view_hei", student["HEI"]);
    setText("view_program", student["Program"]);
    setText("view_transaction", student["Transaction Type"]);
    setText("view_es2", student["ES II In-charge of the Program"]);

    // General Info tab
    setVal("edit_or_no", student["OR No."]);
    setVal("edit_or_date_issued", student["OR: Date Issued"]);
    setVal("edit_status_of_application", student["Status of the Application"]);
    setVal("edit_eval_date_received", student["Status of Course/Evaluation: Date Received"]);
    setVal("edit_eval_date_accomplished", student["Status of Course/Evaluation: Date Accomplished"]);
    setVal("edit_eval_date_forwarded", student["Status of Course/Evaluation: Date Forwarded"]);
    setVal("edit_evaluation_status", student["Evaluation Status"]);
    setVal("edit_application_remarks", student["Application Remarks"]);
    setVal("edit_assigned_person", student["Assigned Person"]);

    // Verification tab - read-only mirror
    setText("vview_eval_date_received", student["Status of Course/Evaluation: Date Received"]);
    setText("vview_eval_date_accomplished", student["Status of Course/Evaluation: Date Accomplished"]);
    setText("vview_eval_date_forwarded", student["Status of Course/Evaluation: Date Forwarded"]);
    setText("vview_evaluation_status", student["Evaluation Status"]);
    setText("vview_application_remarks", student["Application Remarks"]);
    setText("vview_assigned_person", student["Assigned Person"]);

    // Verification tab - editable
    setVal("edit_verif_date_received", student["Verification: Date Received"]);
    setVal("edit_verif_date_accomplished", student["Verification: Date Accomplished"]);
    setVal("edit_verif_status", student["Verification Status"]);
    setVal("edit_verif_remarks", student["Verification: Remarks"]);
    setVal("edit_verif_date_forwarded", student["Verification: Date Forwarded"]);
    setVal("edit_issuance_assigned_person", student["Issuance and Encoding of No.: Assigned Person"]);

    // Default to General tab
    this.switchEditTab("general", document.querySelector("#editModalTabs .nav-link"));

    var modal = document.getElementById("editModal");
    if (modal) modal.classList.add("show");
  },

  switchEditTab: function(tab, btn) {
    // Hide all panels
    document.querySelectorAll(".edit-tab-panel").forEach(function(p) {
      p.classList.add("d-none");
    });
    // Deactivate all tab buttons
    document.querySelectorAll("#editModalTabs .nav-link").forEach(function(b) {
      b.classList.remove("active");
    });
    // Show selected panel and activate button
    var panel = document.getElementById("editTab_" + tab);
    if (panel) panel.classList.remove("d-none");
    if (btn) btn.classList.add("active");
  },

  saveExistingRecord: function() {
    var rowID = Model.editingRowID;
    if (!rowID) return;

    var getVal = function(id) {
      var el = document.getElementById(id);
      return el ? el.value.trim() : "";
    };

    var payload = {
      row: rowID,
      orNo: getVal("edit_or_no"),
      orDateIssued: getVal("edit_or_date_issued"),
      statusOfApplication: getVal("edit_status_of_application"),
      evalDateReceived: getVal("edit_eval_date_received"),
      evalDateAccomplished: getVal("edit_eval_date_accomplished"),
      evalDateForwarded: getVal("edit_eval_date_forwarded"),
      evaluationStatus: getVal("edit_evaluation_status"),
      applicationRemarks: getVal("edit_application_remarks"),
      assignedPerson: getVal("edit_assigned_person"),
      verifDateReceived: getVal("edit_verif_date_received"),
      verifDateAccomplished: getVal("edit_verif_date_accomplished"),
      verifStatus: getVal("edit_verif_status"),
      verifRemarks: getVal("edit_verif_remarks"),
      verifDateForwarded: getVal("edit_verif_date_forwarded"),
      issuanceAssignedPerson: getVal("edit_issuance_assigned_person")
    };

    View.showSaveIndicator("Saving...", "info", 0);

    Service.saveExistingRecord(payload, function(result) {
      if (result && result.ok) {
        View.showSaveIndicator("Saved successfully", "success", 3000);
        View.closeEditModal();
        // Update the row in local data
        var student = Model.fullData.find(function(s) {
          return String(s._row) === String(rowID);
        });
        if (student) {
          student["OR No."] = payload.orNo;
          student["OR: Date Issued"] = payload.orDateIssued;
          student["Status of the Application"] = payload.statusOfApplication;
          student["Status of Course/Evaluation: Date Received"] = payload.evalDateReceived;
          student["Status of Course/Evaluation: Date Accomplished"] = payload.evalDateAccomplished;
          student["Status of Course/Evaluation: Date Forwarded"] = payload.evalDateForwarded;
          student["Evaluation Status"] = payload.evaluationStatus;
          student["Application Remarks"] = payload.applicationRemarks;
          student["Assigned Person"] = payload.assignedPerson;
          student["Verification: Date Received"] = payload.verifDateReceived;
          student["Verification: Date Accomplished"] = payload.verifDateAccomplished;
          student["Verification Status"] = payload.verifStatus;
          student["Verification: Remarks"] = payload.verifRemarks;
          student["Verification: Date Forwarded"] = payload.verifDateForwarded;
          student["Issuance and Encoding of No.: Assigned Person"] = payload.issuanceAssignedPerson;
        }
        Model.filteredData = Model.applyMainViewFilters(Model.yearDataMap[Model.currentYear] || []);
        TypingController.renderPage(Model.currentPage);
      } else {
        View.showSaveIndicator((result && result.message) || "Save failed.", "error", 5000);
      }
    }, function(err) {
      View.showSaveIndicator("Save failed: " + (err && err.message || "Unknown error"), "error", 5000);
    });
  },

  openManualBatchModal: function() {
    Model.clearEditing();
    View.clearModalValidationErrors();
    ["temp_date_received","temp_target_release_date","temp_student_name",
    "temp_hei","temp_hei_address","temp_date_graduation",
    "temp_program","temp_es2_incharge"].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = "";
    });
    // Default transaction type
    var txType = document.getElementById("temp_transaction_type");
    if (txType) txType.value = "Walk-in";

    this.renderAddModalBatchList();
    var modal = document.getElementById("addRecordModal");
    if (modal) modal.classList.add("show");
  },

  renderAddModalBatchList: function() {
    var section = document.getElementById("addModalBatchSection");
    var list = document.getElementById("addModalBatchList");
    var count = document.getElementById("addModalBatchCount");
    if (!section || !list) return;

    var students = Model.batchStudents;
    if (count) count.textContent = students.length;
    section.style.display = students.length ? "" : "none";

    list.innerHTML = students.map(function(entry, idx) {
      return "<div class='d-flex justify-content-between align-items-center border rounded p-2 mb-1'>" +
        "<div><strong>" + (entry.fields.studentName || "Student " + (idx+1)) + "</strong>" +
        "<div class='text-muted small'>" + (entry.fields.hei || "") + " | " + (entry.fields.program || "") + "</div></div>" +
        "<button type='button' class='btn btn-sm btn-outline-danger' onclick=\"TypingController.removeBatchStudent('" + entry._row + "')\">" +
        "<i class='bi bi-trash'></i></button>" +
        "</div>";
    }).join("");
  },

  saveBatch: function() {
    if (!Model.batchStudents.length) return;

    var payloads = Model.batchStudents.map(function(entry) {
      return {
        dateReceived: entry.fields.dateReceived || "",
        studentName: entry.fields.studentName || "",
        hei: entry.fields.hei || "",
        heiAddress: entry.fields.heiAddress || "",
        dateGraduation: entry.fields.dateGraduation || "",
        program: entry.fields.program || "",
        es2InCharge: entry.fields.es2InCharge || "",
        targetReleaseDate: entry.fields.targetReleaseDate || "",
        transactionType: entry.fields.transactionType || ""
      };
    });

    View.showSaveIndicator("Saving batch...", "info", 0);

    Service.updateTempRecordEntries(payloads, "batch-" + Date.now(), function(result) {
      var successCount = (result && result.results ? result.results.filter(function(r){ return r.ok; }).length : 0);
      if (successCount === payloads.length) {
        View.showSaveIndicator("Batch saved successfully", "success", 3000);
        var modal = document.getElementById("addRecordModal");
        if (modal) modal.classList.remove("show");
        Model.batchStudents = [];
        TypingController.initData({ silent: true });
      } else {
        View.showSaveIndicator("Saved " + successCount + " of " + payloads.length, "error", 5000);
      }
    }, function(err) {
      View.showSaveIndicator("Batch save failed", "error", 5000);
    });
  },

  normalizeNameInput: function(value) {
    return String(value || "").toUpperCase();
  },

  pad2: function(value) {
    var text = String(value == null ? "" : value);
    return text.length < 2 ? "0" + text : text;
  },

  mergeObjects: function() {
    var result = {};
    for (var i = 0; i < arguments.length; i++) {
      var source = arguments[i] || {};
      var keys = Object.keys(source);
      for (var k = 0; k < keys.length; k++) {
        var key = keys[k];
        result[key] = source[key];
      }
    }
    return result;
  },

  normalizeIsoDateInput: function(value) {
    var raw = String(value || "").trim();
    if (!raw) return "";
    var match = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (match) {
      return match[1] + "-" + this.pad2(Number(match[2])) + "-" + this.pad2(Number(match[3]));
    }
    match = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (match) {
      return match[3] + "-" + this.pad2(Number(match[1])) + "-" + this.pad2(Number(match[2]));
    }
    var parsed = new Date(raw);
    if (!isNaN(parsed.getTime())) {
      return parsed.getFullYear() + "-" +
        this.pad2(parsed.getMonth() + 1) + "-" +
        this.pad2(parsed.getDate());
    }
    return raw;
  },

  addDaysToIso: function(value, days) {
    if (!value) return "";
    var parts = String(value).split("-");
    if (parts.length !== 3) return "";
    var date = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    if (isNaN(date.getTime())) return "";
    date.setDate(date.getDate() + Number(days || 0));
    return date.getFullYear() + "-" +
      this.pad2(date.getMonth() + 1) + "-" +
      this.pad2(date.getDate());
  },

  refreshDerivedFields: function(entry) {
    if (!entry) return;
    var staticOptions = Model.staticOptions || {};
    var heiKey = String(entry.fields.hei || "").trim().toLowerCase();
    var heiLookup = (staticOptions.heiLookup || {})[heiKey] || {};
    entry.fields.targetReleaseDate = entry.fields.dateReceived
      ? this.addDaysToIso(entry.fields.dateReceived, staticOptions.releaseOffsetDays || 7)
      : "";
    entry.fields.transactionType = heiLookup.transactionType || staticOptions.defaultTransactionType || "Airl";
    entry.fields.heiAddress = heiLookup.heiAddress || "";
    entry.fields.ess2InCharge = heiLookup.ess2InCharge || staticOptions.defaultEss2InCharge || "";
    entry.fields.statusOfApplication = heiLookup.statusOfApplication || staticOptions.defaultStatusOfApplication || "";
  },

  loadTempPrefillForEntry: function(entry, updateForm) {
    if (!entry) return;
    if (!/^\d+$/.test(String(entry._row || ""))) {
      this.refreshDerivedFields(entry);
      if (updateForm && String(Model.editingRowID) === String(entry._row)) {
        View.populateEditForm(entry);
      }
      View.renderSelectedBatchList();
      return;
    }
    Service.getTempRecordPrefill(entry._row, entry.fields.dateReceived || "", function(prefill) {
      if (!prefill) return;
      var liveEntry = Model.getBatchEntryByRow(entry._row);
      if (!liveEntry) return;
      liveEntry.fields = TypingController.mergeObjects(liveEntry.fields, {
        studentName: prefill.studentName || liveEntry.fields.studentName || "",
        hei: prefill.hei || liveEntry.fields.hei || "",
        dateGraduation: prefill.dateGraduation || "",
        program: prefill.program || "",
        targetReleaseDate: prefill.targetReleaseDate || "",
        transactionType: prefill.transactionType || "",
        heiAddress: prefill.heiAddress || "",
        ess2InCharge: prefill.ess2InCharge || "",
        statusOfApplication: prefill.statusOfApplication || ""
      });
      if (updateForm && String(Model.editingRowID) === String(liveEntry._row)) {
        View.populateEditForm(liveEntry);
      }
      View.renderSelectedBatchList();
    });
  },

  syncCurrentFormToModel: function(changedField) {
    var entry = Model.getCurrentBatchEntry();
    if (!entry) return;
    View.clearModalActionError("savebtn");
    View.clearModalActionError("updateStudentBtn");

    var patch = this.getFormPatch();

    // Auto-fill from ref data FIRST, before refreshDerivedFields overwrites
    if (changedField === "program" && patch.program) {
      var es2 = (Model.refData.programMap || {})[patch.program] || "";
      patch.es2InCharge = es2;
      View.setValue("temp_es2_incharge", es2);
    }
    if (changedField === "hei" && patch.hei) {
      var address = (Model.refData.heiMap || {})[patch.hei] || "";
      patch.heiAddress = address;
      View.setValue("temp_hei_address", address);
    }

    Model.updateBatchEntryFields(entry._row, patch);
    this.refreshDerivedFields(entry);
    Model.recomputeBatchSoPreviews();
    Model.batchHasChanges = Model.isBatchDirty();
    View.renderSelectedBatchList();
    View.updateActionButtons();
    this.loadTempPrefillForEntry(entry, true);
  },

  // Throttled save — waits 1.5s after last addition before firing
  enqueueSave: function(entry) {
    Model.addToSaveQueue(entry);
    View.renderSaveQueue();

    if (Model.saveThrottleTimer) clearTimeout(Model.saveThrottleTimer);
    Model.saveThrottleTimer = setTimeout(function() {
      TypingController.flushSaveQueue();
    }, 1500);
  },

  cancelSaveQueue: function() {
    // Stop any pending throttle timer
    if (Model.saveThrottleTimer) {
      clearTimeout(Model.saveThrottleTimer);
      Model.saveThrottleTimer = null;
    }
    // Mark any pending/saving items as cancelled so they don't retry
    Model.saveQueue.forEach(function(q) {
      if (q.status === "pending" || q.status === "saving") {
        q.status = "failed";
        q.error = "Cancelled by user";
      }
    });
    View.renderSaveQueue();
    View.showSaveIndicator("Queue cancelled. Already-saved records are kept.", "error", 4000);
  },

  flushSaveQueue: function() {
    var pending = Model.saveQueue.filter(function(q) {
      return q.status === "pending" || (q.status === "failed" && q.attempts < 3);
    });
    if (!pending.length) return;

    pending.forEach(function(q) {
      q.status = "saving";
      q.attempts++;
    });
    View.renderSaveQueue();

    var payloads = pending.map(function(q) {
      return {
        dateReceived:      q.entry.fields.dateReceived      || "",
        studentName:       q.entry.fields.studentName       || "",
        hei:               q.entry.fields.hei               || "",
        heiAddress:        q.entry.fields.heiAddress        || "",
        dateGraduation:    q.entry.fields.dateGraduation    || "",
        program:           q.entry.fields.program           || "",
        es2InCharge:       q.entry.fields.es2InCharge       || "",
        targetReleaseDate: q.entry.fields.targetReleaseDate || "",
        transactionType:   q.entry.fields.transactionType   || "Walk-In"
      };
    });

    var batchId = "batch-" + Date.now();

    Service.updateTempRecordEntries(payloads, batchId, function(result) {
      // Unwrap route wrapper: { handled, status, data: { results: [...] } }
      var unwrapped = (result && result.data && typeof result.data === "object") ? result.data : result;

      // Guard: server returned null or non-object
      if (!unwrapped || typeof unwrapped !== "object") {
        pending.forEach(function(q) {
          Model.updateQueueStatus(q.entry._row, "failed", "Server returned no response");
        });
        View.renderSaveQueue();
        View.showSaveIndicator("Server error — will retry automatically.", "error", 3000);
        if (Model.saveThrottleTimer) clearTimeout(Model.saveThrottleTimer);
        Model.saveThrottleTimer = setTimeout(function() {
          TypingController.retryFailedQueueItems();
        }, 4000);
        return;
      }

      var results = Array.isArray(unwrapped.results) ? unwrapped.results : [];

      // Guard: results array length mismatch — partial failure, log what we can
      if (results.length !== pending.length) {
        console.warn("[flushSaveQueue] Results length mismatch: expected " +
          pending.length + " got " + results.length);
      }

      var hasAnyFailure = false;
      pending.forEach(function(q, i) {
        var res = results[i];
        if (res && res.ok) {
          Model.updateQueueStatus(q.entry._row, "saved");
        } else {
          hasAnyFailure = true;
          var errMsg = (res && res.message) ? res.message : "No result returned for this entry";
          Model.updateQueueStatus(q.entry._row, "failed", errMsg);
        }
      });

      View.renderSaveQueue();

      // Check overall queue completion
      var allDone = Model.saveQueue.every(function(q) {
        return q.status === "saved" || (q.status === "failed" && q.attempts >= 3);
      });

      if (!allDone) {
        // Some still have retries left — schedule
        if (Model.saveThrottleTimer) clearTimeout(Model.saveThrottleTimer);
        Model.saveThrottleTimer = setTimeout(function() {
          TypingController.retryFailedQueueItems();
        }, 3000);
        return;
      }

      var anyStillFailed = Model.saveQueue.some(function(q) { return q.status === "failed"; });
      if (!anyStillFailed) {
        View.showSaveIndicator("All " + Model.saveQueue.length + " records saved.", "success", 4000);
        setTimeout(function() {
          Model.clearSavedFromQueue();
          View.renderSaveQueue();
          var modal = document.getElementById("addRecordModal");
          if (modal) modal.classList.remove("show");
          Model.batchStudents = [];
          Model.saveQueue = [];
          TypingController.initData({ silent: true });
        }, 1800);
      } else {
        var failedNames = Model.saveQueue
          .filter(function(q) { return q.status === "failed"; })
          .map(function(q) { return q.entry.fields.studentName || "Unknown"; });
        View.showSaveIndicator(
          failedNames.length + " record(s) failed after 3 attempts: " + failedNames.join(", "),
          "error", 0
        );
      }

    }, function(err) {
      // Network/RPC failure
      pending.forEach(function(q) {
        Model.updateQueueStatus(q.entry._row, "failed",
          (err && err.message) ? err.message : "Network error");
      });
      View.renderSaveQueue();
      View.showSaveIndicator("Connection failed. Retrying in 5s...", "error", 4000);
      if (Model.saveThrottleTimer) clearTimeout(Model.saveThrottleTimer);
      Model.saveThrottleTimer = setTimeout(function() {
        TypingController.retryFailedQueueItems();
      }, 5000);
    });
  },

  retryFailedQueueItems: function() {
    Model.saveQueue.forEach(function(q) {
      if (q.status === "failed") {
        q.status = "pending";
        q.attempts = 0;  // ← reset so the 3-attempt limit starts fresh
        q.error = "";
      }
    });
    View.renderSaveQueue();
    this.flushSaveQueue();
  },

  saveEdit: function() {
    View.clearModalValidationErrors();
    if (!Model.batchStudents.length) {
      View.showSaveIndicator("No changes to save", "error", 2000);
      return;
    }
    
    var targets = Model.batchStudents.slice();
    View.setSaveButtonLoading(true);
    
    var payloads = targets.map(function(entry) {
      return {
        row: entry._row,
        dateReceived: entry.fields.dateReceived || "",
        studentName: entry.fields.studentName || "",
        hei: entry.fields.hei || "",
        dateGraduation: entry.fields.dateGraduation || "",
        program: entry.fields.program || ""
      };
    });

    Service.updateTempRecordEntries(payloads, "batch-" + Date.now(), function(batchResult) {
      View.setSaveButtonLoading(false);
      var results = batchResult && Array.isArray(batchResult.results) ? batchResult.results : [];
      var successCount = results.filter(function(r) { return r.ok; }).length;
      
      if (successCount === targets.length) {
        View.showSaveIndicator("Batch saved successfully", "success", 3000);
        View.closeEditModal();
        TypingController.initData({ silent: true });
      } else {
        View.showSaveIndicator("Saved " + successCount + " of " + targets.length + " students.", "error", 5000);
      }
    }, function(err) {
      View.setSaveButtonLoading(false);
      View.showSaveIndicator("Batch save failed: " + (err.message || "Unknown error"), "error", 5000);
    });
  },

  loadNavbarLogo: function() {
    var shell = document.getElementById("navbarLogoShell");
    var logoImage = document.getElementById("navbarLogoImage");
    var fallback = document.getElementById("navbarLogoFallback");
    var loading = document.getElementById("navbarLogoLoading");

    if (shell) {
      shell.classList.add("is-loading");
      shell.classList.remove("is-ready");
    }
    if (loading) loading.classList.remove("d-none");
    if (fallback) fallback.classList.remove("d-none");

    Service.getNavbarLogoData(function(result) {
      var dataUrl = result && result.dataUrl ? String(result.dataUrl).trim() : "";

      if (!dataUrl) {
        if (shell) shell.classList.remove("is-loading");
        if (loading) loading.classList.add("d-none");
        if (logoImage) {
          logoImage.onload = null;
          logoImage.onerror = null;
          logoImage.removeAttribute("src");
          logoImage.classList.add("d-none");
        }
        if (fallback) fallback.classList.remove("d-none");
        return;
      }

      if (!logoImage) {
        if (shell) shell.classList.remove("is-loading");
        if (loading) loading.classList.add("d-none");
        return;
      }

      logoImage.onload = function() {
        if (shell) {
          shell.classList.remove("is-loading");
          shell.classList.add("is-ready");
        }
        if (loading) loading.classList.add("d-none");
        if (fallback) fallback.classList.add("d-none");
        logoImage.classList.remove("d-none");
      };

      logoImage.onerror = function() {
        if (shell) shell.classList.remove("is-loading");
        if (loading) loading.classList.add("d-none");
        logoImage.removeAttribute("src");
        logoImage.classList.add("d-none");
        if (fallback) fallback.classList.remove("d-none");
      };

      logoImage.src = dataUrl;
      logoImage.classList.remove("d-none");
    }, function() {
      if (shell) shell.classList.remove("is-loading");
      if (logoImage) {
        logoImage.onload = null;
        logoImage.onerror = null;
        logoImage.removeAttribute("src");
        logoImage.classList.add("d-none");
      }
      if (loading) loading.classList.add("d-none");
      if (fallback) fallback.classList.remove("d-none");
    });
  },

      Model.userRole = role || "Viewer";
    });

  initEventListeners: function() {
    if (Model.listenersBound) return;
    Model.listenersBound = true;

    this.searchDebounced = this.debounce(function(value) { TypingController.doSearch(value); }, 250);

    var searchInput = document.getElementById("searchInput");
    if (searchInput) {
      searchInput.addEventListener("input", function(e){
        TypingController.searchDebounced(e.target.value);
      });
    }

    ["temp_date_received", "temp_student_name", "temp_hei", "temp_date_graduation", "temp_program"].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) {
        el.addEventListener("change", function() {
          var fieldKey = TypingController.formFieldMap[id];
          TypingController.syncCurrentFormToModel(fieldKey);
        });
      }
    });

    // Auto-caps student name
    var studentNameInput = document.getElementById("temp_student_name");
    if (studentNameInput) {
      studentNameInput.addEventListener("input", function() {
        var pos = this.selectionStart;
        this.value = this.value.toUpperCase();
        this.setSelectionRange(pos, pos);
      });
    }

    // HEI auto-fill address + default transaction type
    var heiInput = document.getElementById("temp_hei");
    if (heiInput) {
      heiInput.addEventListener("change", function() {
        var hei = heiInput.value.trim();
        var address = (Model.refData.heiMap || {})[hei] || "";
        View.setValue("temp_hei_address", address);

        // Default transaction type to Walk-in if not already set
        var txType = document.getElementById("temp_transaction_type");
        if (txType && !txType.value) txType.value = "Walk-in";
      });
      heiInput.addEventListener("input", function() {
        var hei = heiInput.value.trim();
        var address = (Model.refData.heiMap || {})[hei] || "";
        if (address) View.setValue("temp_hei_address", address);

        if (!document.getElementById("temp_transaction_type").value) {
          document.getElementById("temp_transaction_type").value = "Walk-in";
        }
      });
    }

    // Program auto-fill ES II In-charge
    var programInput = document.getElementById("temp_program");
    if (programInput) {
      programInput.addEventListener("change", function() {
        var program = programInput.value.trim();
        var es2 = (Model.refData.programMap || {})[program] || "";
        View.setValue("temp_es2_incharge", es2);
      });
      programInput.addEventListener("input", function() {
        var program = programInput.value.trim();
        var es2 = (Model.refData.programMap || {})[program] || "";
        if (es2) View.setValue("temp_es2_incharge", es2);
      });
    }

    // Date received auto-computes target release
    var dateReceivedInput = document.getElementById("temp_date_received");
    if (dateReceivedInput) {
      dateReceivedInput.addEventListener("change", function() {
        var val = dateReceivedInput.value;
        if (val) {
          var target = document.getElementById("temp_target_release_date");
          if (target) target.value = TypingController.addDaysToIso(val, 7);
        }
      });
    }

    // Filter builder events
    var addFilterBtnMain = document.getElementById("addFilterBtnMain");
    var filterPopoverMain = document.getElementById("filterPopoverMain");
    var filterDoneMain = document.getElementById("filterDoneMain");
    var filterAllMain = document.getElementById("filterAllMain");
    var filterClearMain = document.getElementById("filterClearMain");
    var mainRadioOptions = document.querySelectorAll("input[name='filterMainOption']");

    if (addFilterBtnMain && filterPopoverMain) {
      addFilterBtnMain.addEventListener("click", function(e) {
        e.stopPropagation();
        filterPopoverMain.classList.toggle("show");
      });
    }

    if (filterDoneMain && filterPopoverMain) {
      filterDoneMain.addEventListener("click", function() { filterPopoverMain.classList.remove("show"); });
    }

    if (filterAllMain) {
      filterAllMain.addEventListener("click", function() {
        Controller.setVerificationFilter(["verified", "deficiency", "unverified"], "main");
      });
    }

    if (filterClearMain) {
      filterClearMain.addEventListener("click", function() { Controller.setVerificationFilter([], "main"); });
    }

    mainRadioOptions.forEach(function(radio) {
      radio.addEventListener("change", function() {
        var selected = Array.from(mainRadioOptions).filter(function(el) { return el.checked; }).map(function(el) { return el.value; });
        Controller.setVerificationFilter(selected, "main");
      });
    });

    document.addEventListener("click", function(e) {
      if (filterPopoverMain && !e.target.closest("#filterBuilderMain")) filterPopoverMain.classList.remove("show");
    });

    this.refreshFilterUI();

    var resultsTable = document.getElementById("typingSearchResults");

    if (resultsTable) {
      resultsTable.addEventListener("click", function(e) {
        var tr = e.target.closest("tr[data-row]");
        if (!tr) return;
        var student = Model.fullData.find(function(s) {
          return String(s._row) === String(tr.dataset.row);
        });
        if (student) TypingController.openEditModal(student);
        // REMOVE everything after this line (the manual batch logic)
      });
    }
  },

  setVerificationFilter: function(mode, scope) {
    var allowed = ["verified", "deficiency", "unverified"];
    var selected = [];
    var modeWasArray = Array.isArray(mode);
    var target = (scope === "modal") ? "verificationFilterModal" : "verificationFilterMain";
    if (Array.isArray(mode)) {
      selected = mode.filter(function(v, i, arr) {
        return allowed.indexOf(v) !== -1 && arr.indexOf(v) === i;
      });
    } else {
      var value = String(mode || "all");
      if (value === "all") {
        selected = allowed.slice();
      } else if (allowed.indexOf(value) !== -1) {
        selected = [value];
      }
    }
    if (!selected.length && !modeWasArray) selected = allowed.slice();
    Model[target] = selected;
    this.refreshFilterUI();
    this.doSearch(Model.lastMainSearchTerm || "");
  },

  refreshFilterUI: function() {
    var labelMap = {
      verified: "Verified",
      deficiency: "Deficiency",
      unverified: "Unverified"
    };

    var renderTags = function(containerId, mode, scope) {
      var container = document.getElementById(containerId);
      if (!container) return;
      if (!mode.length) {
        container.innerHTML = "";
        return;
      }
      container.innerHTML = mode.map(function(item) {
        var chipScopeClass = (scope === "main") ? "filter-chip-main" : "filter-chip-modal";
        return "<span class='filter-chip " + chipScopeClass + " active' data-filter='" + item + "'>" + (labelMap[item] || item) + " <button type='button' title='Remove filter'>&times;</button></span>";
      }).join(" ");
      container.querySelectorAll(".filter-chip button").forEach(function(btn) {
        btn.onclick = function(e) {
          e.stopPropagation();
          var chip = btn.closest(".filter-chip");
          var key = chip ? chip.getAttribute("data-filter") : "";
          var next = mode.filter(function(m) { return m !== key; });
          Controller.setVerificationFilter(next, scope);
        };
      });
    };

    var mainMode = Array.isArray(Model.verificationFilterMain) ? Model.verificationFilterMain.slice() : ["verified", "deficiency", "unverified"];
    renderTags("filterTagsMain", mainMode, "main");

    var mainOptions = document.querySelectorAll("input[name='filterMainOption']");
    mainOptions.forEach(function(r) { r.checked = mainMode.indexOf(r.value) !== -1; });

    // Initialize year tabs
    this.initYearTabs();
  },

  // Year Tabs Functions
  initYearTabs: function() {
    var yearTabsContainer = document.getElementById("yearTabsContainer");
    if (!yearTabsContainer) return;

    yearTabsContainer.addEventListener("click", function(e) {
      var btn = e.target.closest("button[data-year]");
      if (!btn) return;

      var year = btn.getAttribute("data-year");
      var loadState = Model.yearLoadState[year];

      if (loadState === 'unloaded') {
        TypingController.loadYearData(year, function() {
          TypingController.switchToYear(year);
        });
        return;
      }

      TypingController.switchToYear(year);
    });
  },

  switchToYear: function(year) {
    // Clear search input when switching years
    var searchInput = document.getElementById("searchInput");
    if (searchInput) searchInput.value = "";
    Model.lastMainSearchTerm = "";
    Model.searchMode = false;

    var yearTabsContainer = document.getElementById("yearTabsContainer");
    if (yearTabsContainer) {
      yearTabsContainer.querySelectorAll(".nav-link").forEach(function(link) {
        link.classList.remove("active");
        if (link.getAttribute("data-year") === year) {
          link.classList.add("active");
        }
      });
    }

    Model.currentYear = year;

    if (Model.yearLoadState[year] === 'loaded' && Model.yearDataMap[year]) {
      Model.filteredData = Model.applyMainViewFilters(Model.yearDataMap[year]);
      TypingController.renderPage(1);
    }
  },

  renderYearTabs: function() {
    var container = document.getElementById("yearTabsContainer");
    if (!container) return;

    var availableYears = Model.availableYears || [];
    var currentYear = Model.currentYear || (availableYears.length > 0 ? availableYears[0] : null);

    if (availableYears.length === 0) {
      container.innerHTML = '';
      return;
    }

    var html = '';
    availableYears.forEach(function(year) {
      var isActive = (year === currentYear);
      var isLoading = Model.loadingYears.indexOf(year) !== -1;
      var isLoaded = Model.yearLoadState[year] === 'loaded';
      var loadState = isLoading ? 'loading' : (isLoaded ? 'loaded' : 'unloaded');

      var count = '';
      if (isLoaded && Model.yearDataMap[year]) {
        count = '<span class="badge-year-count">' + Model.yearDataMap[year].length + '</span>';
      } else if (isLoading) {
        count = '<span class="spinner-border spinner-border-sm ms-2" role="status"></span>';
      }

      html += '<li><button class="nav-link ' + (isActive ? 'active' : '') + ' ' + loadState + '" data-year="' + year + '" data-load-state="' + loadState + '">' + year + count + '</button></li>';
    });

    container.innerHTML = html;
  },

  applyYearFilter: function(rows) {
    var yearFilter = Model.yearFilter || "all";
    if (yearFilter === "all") return rows;

    var currentYear = new Date().getFullYear();
    var years = this.extractYearsFromData(Model.fullData);

    return rows.filter(function(row) {
      var dateReceived = row["Date Received"] || "";
      if (!dateReceived) return false;

      var rowYear = new Date(dateReceived).getFullYear();
      if (isNaN(rowYear)) return false;

      if (yearFilter === "archive") {
        return years.archive.indexOf(rowYear) !== -1;
      }

      return String(rowYear) === yearFilter;
    });
  }
};

var Controller = TypingController;
document.addEventListener("DOMContentLoaded", function() {
  TypingController.init();
});
</script>
