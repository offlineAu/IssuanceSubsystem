      '<div style="display:flex;flex-direction:row;gap:0;border-radius:20px;overflow:hidden;min-height:320px;">' +

        // Hero panel
        '<div class="top-programs-hero">' +
          '<div style="background:#fff;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#0056D2;margin-bottom:14px;box-shadow:0 6px 16px rgba(0,0,0,0.12);">' +
            '<i data-lucide="' + getProgramIcon(top.label || top.program) + '" style="width:28px;height:28px;" stroke-width="2"></i>' +
          '</div>' +
          '<div style="font-weight:700;font-size:clamp(0.65rem,1.8vw,0.95rem);line-height:1.3;margin-bottom:10px;word-break:break-word;">' +
            self.escapeHtml(top.label || top.program || "—") +
          '</div>' +
          '<div style="background:rgba(255,255,255,0.15);padding:4px 12px;border-radius:16px;font-size:0.65rem;font-weight:600;letter-spacing:1px;margin-bottom:auto;">' +
            '● Top Rank' +
          '</div>' +
          '<div style="margin-top:16px;">' +
            '<div style="font-size:2.2rem;font-weight:800;letter-spacing:-1px;line-height:1;">' +
              self.formatNumber(top.value || top.total || 0) +
            '</div>' +
            '<div style="font-size:0.65rem;opacity:0.8;text-transform:uppercase;letter-spacing:1.2px;margin-top:4px;">Total Applicants</div>' +
          '</div>' +
        '</div>' +

        // List panel
        '<div class="top-programs-list-panel">' + // Replaced huge style string with class
          '<div style="font-weight:700;font-size:1rem;color:#1E293B;margin-bottom:4px;">Programs</div>' +
          '<div style="color:#64748B;font-size:0.72rem;margin-bottom:14px;">Ranked by application volume</div>' +
          '<div style="display:flex;flex-direction:column;gap:0;max-height:240px;overflow-y:auto;padding-right:6px;">' +
            rest.map(function(row, idx) {
              var rank = idx + 2;
              var name = row.label || row.program || "—";
              var val = row.value || row.total || 0;
              return '<div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f1f5f9;">' +
                '<div style="position:relative;width:36px;height:36px;background:#F1F5F9;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#94A3B8;margin-right:12px;flex-shrink:0;">' +
                  '<i data-lucide="' + getProgramIcon(name) + '" style="width:16px;height:16px;" stroke-width="2"></i>' +
                  '<span style="position:absolute;top:-4px;right:-4px;background:#CBD5E1;color:#fff;width:15px;height:15px;border-radius:50%;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700;">' + rank + '</span>' +
                '</div>' +
                '<div style="flex:1;min-width:0;">' +
                  '<div style="font-weight:600;color:#1E293B;font-size:0.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + self.escapeHtml(name) + '</div>' +
                '</div>' +
                '<div style="font-weight:700;font-size:0.9rem;color:#1E293B;margin-left:10px;flex-shrink:0;">' + self.formatNumber(val) + '</div>' +
              '</div>';
            }).join('') +
          '</div>' +
        '</div>' +
        '</div>';

    setTimeout(function() {
      if (window.lucide && typeof lucide.createIcons === 'function') {
        try { lucide.createIcons({ attrs: { 'stroke-width': 2 }, nameAttr: 'data-lucide' }); } catch(e) {}
      }
    }, 50);
  },

  // ── Modal: Overall Status (Donut matching main dashboard) ─────────────────
  renderModalOverallStatus: function(container, rows) {
    var self = this;
    if (!container) return;
    this.destroyChart("detailOverallStatusChart");

    var colors = ["#6c5dd3", "#ff75a0", "#4ce1e5", "#5d5fef", "#ff9500", "#34c759", "#007aff", "#ff2d55", "#9ca3af"];
    var total  = rows.reduce(function(s, r) { return s + (r.value || 0); }, 0);

    var cutout = total.toLocaleString().length <= 3 ? "65%" : total.toLocaleString().length <= 5 ? "70%" : "75%";

    container.innerHTML =
      '<div class="status-chart-layout">' +
        '<div class="status-chart-col">' +
          '<div class="chart-wrapper">' +
            '<canvas id="modalOverallStatusCanvas"></canvas>' +
            '<div class="chart-overlay-text">' +
              '<div class="chart-overlay-number" id="modalOverallStatusTotal">' + self.formatNumber(total) + '</div>' +
              '<div class="chart-overlay-label">' + (total === 1 ? "Student" : "Students") + '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="status-legend-col">' +
          '<ul class="legend-list" id="modalOverallStatusLegend">' +
            rows.map(function(row, i) {
              return "<li class='legend-item'>" +
                "<div><span class='legend-dot' style='background:" + colors[i % colors.length] + "'></span>" +
                self.escapeHtml(row.label || "—") + "</div>" +
                "<span class='fw-bold'>" + self.formatNumber(row.value || 0) + "</span>" +
              "</li>";
            }).join('') +
          '</ul>' +
        '</div>' +
      '</div>';

    var canvas = document.getElementById("modalOverallStatusCanvas");
    if (!canvas) return;

    this.renderChart("detailOverallStatusChart", canvas, {
      type: "doughnut",
      data: {
        labels: rows.map(function(r) { return r.label || "—"; }),
        datasets: [{
          data: rows.map(function(r) { return r.value || 0; }),
          backgroundColor: colors,
          borderWidth: 0,
          cutout: cutout,
          hoverOffset: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: 8 },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) {
                var pct = total > 0 ? Math.round((ctx.parsed / total) * 100) : 0;
                return " " + ctx.label + ": " + self.formatNumber(ctx.parsed) + " (" + pct + "%)";
              }
            }
          }
        },
        elements: { arc: { borderRadius: 6 } }
      }
    });
  },

  // ── Modal: Status Progression (Pipeline bars matching main dashboard) ──────
  renderModalStatusProgression: function(container, rows, total) {
    var self = this;
    if (!container) return;

    var colors = ["#6c5dd3", "#ff75a0", "#4ce1e5", "#5d5fef", "#ff9500", "#34c759", "#007aff", "#ff2d55", "#9ca3af"];
    var grandTotal = Number(total || 0) || rows.reduce(function(s, r) { return s + (r.value || 0); }, 0);

    if (!rows.length) {
      container.innerHTML = '<div class="text-muted text-center py-4" style="font-size:0.9rem;">No data available.</div>';
      return;
    }

    container.innerHTML = rows.map(function(row, index) {
      var val  = row.value || 0;
      var pct  = grandTotal > 0 ? Math.round((val / grandTotal) * 100) : 0;
      var color = colors[index % colors.length];
      return "<div class='pipeline-row'>" +
        "<div class='pipeline-info'>" +
          "<span class='pipeline-label'>" + self.escapeHtml(row.label || "—") + "</span>" +
          "<span class='pipeline-count'>" + pct + "%</span>" +
        "</div>" +
        "<div class='progress-bar-thick'>" +
          "<div class='progress-fill' style='width:" + pct + "%;background:" + color + ";'></div>" +
        "</div>" +
      "</div>";
    }).join("");
  },

  // ── Modal: Locations (Location Load design matching main dashboard) ────────
  renderModalLocations: function(container, rows) {
    var self = this;
    if (!container) return;

    if (!rows || !rows.length) {
      container.innerHTML = '<div class="text-muted text-center py-4" style="font-size:0.9rem;">No location data available.</div>';
      return;
    }

    var maxVal = Math.max.apply(Math, rows.map(function(r) { return r.value || 0; }));
    var topRow = rows[0];

    container.innerHTML =
      '<div style="display:flex;flex-direction:row;gap:0;align-items:stretch;">' +

        // Summary side
        '<div style="' +
          'padding:16px 20px;border-right:1px solid #e2e8f0;min-width:140px;flex-shrink:0;' +
        '">' +
          '<div style="font-size:0.65rem;font-weight:800;color:#718096;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;">Document Location</div>' +
          '<div style="font-size:2rem;font-weight:800;letter-spacing:-1px;color:#0f172a;line-height:1;">' + self.formatNumber(maxVal) + '</div>' +
          '<div style="font-weight:700;font-size:0.85rem;color:#1e293b;margin-top:10px;">' + self.escapeHtml(topRow.label || "—") + '</div>' +
          '<div style="display:inline-block;padding:3px 8px;background:#1f429b;color:#fff;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;border-radius:4px;margin-top:6px;">Primary</div>' +
        '</div>' +

        // Bars side
        '<div style="flex:1;padding:16px 20px;overflow-y:auto;max-height:260px;">' +
          rows.map(function(row, index) {
            var value   = row.value || 0;
            var percent = maxVal > 0 ? Math.max(2, (value / maxVal) * 100) : 0;
            var isTop   = index === 0;
            return '<div style="display:flex;align-items:center;gap:14px;padding:8px 0;">' +
              '<div style="width:130px;font-size:0.8rem;font-weight:600;color:#1e293b;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' +
                self.escapeHtml(row.label || "—") +
              '</div>' +
              '<div style="flex:1;height:10px;background:#eee;border-radius:5px;overflow:hidden;">' +
                '<div style="height:100%;border-radius:5px;width:' + percent.toFixed(1) + '%;background:' +
                  (isTop ? '#d4a843' : '#1f429b') +
                ';transition:width 0.5s ease;"></div>' +
              '</div>' +
              '<div style="width:48px;font-weight:700;color:' + (isTop ? '#d4a843' : '#1f429b') + ';font-size:0.85rem;flex-shrink:0;">' +
                self.formatNumber(value) +
              '</div>' +
            '</div>';
          }).join('') +
        '</div>' +

      '</div>';
  }
};
</script>
