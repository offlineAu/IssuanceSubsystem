<script>
var TypingController = {
  formFieldMap: {
    temp_date_received: "dateReceived",
    temp_student_name: "studentName",
    temp_hei: "hei",
    temp_date_graduation: "dateGraduation",
    temp_program: "program"
  },

  validationFieldMap: {
    dateReceived: { id: "temp_date_received", label: "Date Received" },
    studentName: { id: "temp_student_name", label: "Name of the Student" },
    hei: { id: "temp_hei", label: "HEI" },
    dateGraduation: { id: "temp_date_graduation", label: "Date of Graduation" },
    program: { id: "temp_program", label: "Program" }
  },

  searchDebounced: null,
  pendingSaveTargets: null,

  setActiveMainView: function(viewName) {
    var nextView = viewName === "history" ? "history" : "home";
    Model.activeMainView = nextView;
    View.setActiveMainView(nextView);
    if (nextView === "history") {
      this.setActiveHistorySection(Model.activeHistorySection || "success");
    }
  },

  init: function() {
    this.initEventListeners();
    this.loadNavbarLogo();
    this.loadAccountName();
    this.loadUserRole();
    this.setActiveMainView("home");
    this.initData();
    this.startDatabaseRowPolling();
  },

  initData: function(options) {
    var settings = options || {};
    if (!settings.silent) View.showOverlay(true);
    
    // Step 1: Get available years from server
    Service.getYearsSummary(function(yearSummary) {
      if (!yearSummary || !yearSummary.summaries || yearSummary.summaries.length === 0) {
        // No data available
        Model.availableYears = [];
        Model.yearDataMap = {};
        Model.filteredData = [];
        Controller.renderYearTabs();
        if (!settings.silent) View.showOverlay(false);
        return;
      }
      
      // Store available years
      Model.availableYears = yearSummary.summaries.map(function(s) { return String(s.year); });
      Model.yearLoadState = {};
      yearSummary.summaries.forEach(function(s) {
        Model.yearLoadState[s.year] = 'unloaded';
        Model.yearDataMap[s.year] = [];
      });
      
      // Render year tabs immediately (no "All Years", just specific years)
      Controller.renderYearTabs();
      
      // Step 2: Load the 2 latest years fully
      var latestYears = yearSummary.summaries.slice(0, 2); // Take first 2 (sorted desc)
      
      if (latestYears.length > 0) {
        var firstYear = latestYears[0].year;
        Model.currentYear = String(firstYear);
        
        // Load first latest year
        Controller.loadYearData(String(firstYear), function() {
          // After first year loaded, load second year if exists
          if (latestYears.length > 1) {
            var secondYear = latestYears[1].year;
            Controller.loadYearData(String(secondYear), function() {
              if (!settings.silent) View.showOverlay(false);
            });
          } else {
            if (!settings.silent) View.showOverlay(false);
          }
        });
      } else {
        if (!settings.silent) View.showOverlay(false);
      }
    });
  },

  loadYearData: function(year, onComplete) {
    if (Model.yearLoadState[year] === 'loading' || Model.yearLoadState[year] === 'loaded') {
      if (onComplete) onComplete();
      return;
    }
    
    Model.yearLoadState[year] = 'loading';
    Model.loadingYears.push(year);
    Controller.renderYearTabs(); // Show loading state
    
    var batchSize = Model.initialBatchSize || 1000;
    Service.getDataByYear(year, batchSize, function(res) {
      if (res && res.success) {
        Model.yearDataMap[year] = res.data || [];
        Model.yearLoadState[year] = 'loaded';
        Model.loadedYears.push(year);
        
        // Update batch progress for this year
        Model.yearBatchProgress[year] = {
          nextStartRow: res.nextStartRow || 2,
          hasMore: res.hasMore || false,
          total: res.total || 0
        };
        
        // If this is the current year, render it
        if (Model.currentYear === year) {
          Model.filteredData = Model.applyMainViewFilters(Model.yearDataMap[year]);
          Controller.renderPage(1);
        }
      }
      
      // Remove from loading list
      Model.loadingYears = Model.loadingYears.filter(function(y) { return y !== year; });
      Controller.renderYearTabs(); // Update to show loaded state
      
      if (onComplete) onComplete();
    });
  },

  loadNextBatchForYear: function(year, onComplete) {
    var progress = Model.yearBatchProgress[year];
    if (!progress || !progress.hasMore || Model.yearLoadState[year] !== 'loaded') {
      if (onComplete) onComplete();
      return;
    }
    
    Service.loadRemainingDataByYear(year, progress.nextStartRow, Model.nextBatchSize, function(res) {
      if (res && res.success && res.data) {
        // Append new data to existing year data
        Model.yearDataMap[year] = Model.yearDataMap[year].concat(res.data);
        Model.yearBatchProgress[year] = {
          nextStartRow: res.nextStartRow,
          hasMore: res.hasMore,
          total: res.total
        };
        
        // Refresh if this is current year
        if (Model.currentYear === year) {
          Model.filteredData = Model.applyMainViewFilters(Model.yearDataMap[year]);
          Controller.renderPage(Model.currentPage);
        }
      }
      if (onComplete) onComplete();
    });
  },

  renderPage: function(page) {
    var totalPages = Math.max(1, Math.ceil(Model.filteredData.length / Model.rowsPerPage));
    var safePage = Number(page) || 1;
    if (safePage < 1) safePage = 1;
    if (safePage > totalPages) safePage = totalPages;
    Model.currentPage = safePage;
    View.renderPage(safePage);
  },

  debounce: function(fn, wait) {
    var timer = null;
    return function() {
      var ctx = this;
      var args = arguments;
      clearTimeout(timer);
      timer = setTimeout(function() { fn.apply(ctx, args); }, wait);
    };
  },

  doSearch: function(term) {
    var token = ++Model.activeSearchToken;
    term = (term || "").trim().toLowerCase();
    Model.lastMainSearchTerm = term;
    Model.isSearchingMain = false;

    if (!term) {
      Model.searchMode = false;
      var yearFiltered = Controller.applyYearFilter(Model.fullData);
      Model.filteredData = Model.applyMainViewFilters(yearFiltered);
      this.renderPage(1);
      return;
    }

    Model.searchMode = true;
    var searchFields = ["Name of the Student", "ID", "HEI", "Program"];
    var yearFiltered = Controller.applyYearFilter(Model.fullData);
    var localMatch = yearFiltered.filter(function(r){
      return searchFields.some(function(field) {
        var value = r[field] || "";
        return value.toString().toLowerCase().includes(term);
      });
    });
    var filteredLocal = Model.applyMainViewFilters(localMatch);

    if (filteredLocal.length) {
      Model.filteredData = Model.removeDuplicates(filteredLocal);
      this.renderPage(1);
    } else {
      Model.isSearchingMain = true;
      View.showMainSearchLoading();
      Service.searchExactName(term, function(res){
        if (token !== Model.activeSearchToken) return;
        Model.isSearchingMain = false;
        if (res && res.length) {
          var filteredRemote = Model.applyMainViewFilters(res);
          if (!filteredRemote.length) {
            View.renderEmpty("No records found");
            return;
          }
          Model.filteredData = Model.removeDuplicates(filteredRemote);
          TypingController.renderPage(1);
        } else {
          View.renderEmpty("No records found");
        }
      });
    }
  },

  getFormPatch: function() {
    return {
      dateReceived: this.normalizeIsoDateInput((document.getElementById("temp_date_received") || {}).value || ""),
      studentName: (document.getElementById("temp_student_name") || {}).value || "",
      hei: (document.getElementById("temp_hei") || {}).value || "",
      dateGraduation: this.normalizeIsoDateInput((document.getElementById("temp_date_graduation") || {}).value || ""),
      program: (document.getElementById("temp_program") || {}).value || ""
    };
  },

  normalizeNameInput: function(value) {
    return String(value || "").toUpperCase();
  },

  pad2: function(value) {
    var text = String(value == null ? "" : value);
    return text.length < 2 ? "0" + text : text;
  },

  mergeObjects: function() {
    var result = {};
    for (var i = 0; i < arguments.length; i++) {
      var source = arguments[i] || {};
      var keys = Object.keys(source);
      for (var k = 0; k < keys.length; k++) {
        var key = keys[k];
        result[key] = source[key];
      }
    }
    return result;
  },

  normalizeIsoDateInput: function(value) {
    var raw = String(value || "").trim();
    if (!raw) return "";
    var match = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (match) {
      return match[1] + "-" + this.pad2(Number(match[2])) + "-" + this.pad2(Number(match[3]));
    }
    match = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (match) {
      return match[3] + "-" + this.pad2(Number(match[1])) + "-" + this.pad2(Number(match[2]));
    }
    var parsed = new Date(raw);
    if (!isNaN(parsed.getTime())) {
      return parsed.getFullYear() + "-" +
        this.pad2(parsed.getMonth() + 1) + "-" +
        this.pad2(parsed.getDate());
    }
    return raw;
  },

  addDaysToIso: function(value, days) {
    if (!value) return "";
    var parts = String(value).split("-");
    if (parts.length !== 3) return "";
    var date = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    if (isNaN(date.getTime())) return "";
    date.setDate(date.getDate() + Number(days || 0));
    return date.getFullYear() + "-" +
      this.pad2(date.getMonth() + 1) + "-" +
      this.pad2(date.getDate());
  },

  refreshDerivedFields: function(entry) {
    if (!entry) return;
    var staticOptions = Model.staticOptions || {};
    var heiKey = String(entry.fields.hei || "").trim().toLowerCase();
    var heiLookup = (staticOptions.heiLookup || {})[heiKey] || {};
    entry.fields.targetReleaseDate = entry.fields.dateReceived
      ? this.addDaysToIso(entry.fields.dateReceived, staticOptions.releaseOffsetDays || 7)
      : "";
    entry.fields.transactionType = heiLookup.transactionType || staticOptions.defaultTransactionType || "Airl";
    entry.fields.heiAddress = heiLookup.heiAddress || "";
    entry.fields.ess2InCharge = heiLookup.ess2InCharge || staticOptions.defaultEss2InCharge || "";
    entry.fields.statusOfApplication = heiLookup.statusOfApplication || staticOptions.defaultStatusOfApplication || "";
  },

  loadTempPrefillForEntry: function(entry, updateForm) {
    if (!entry) return;
    if (!/^\d+$/.test(String(entry._row || ""))) {
      this.refreshDerivedFields(entry);
      if (updateForm && String(Model.editingRowID) === String(entry._row)) {
        View.populateEditForm(entry);
      }
      View.renderSelectedBatchList();
      return;
    }
    Service.getTempRecordPrefill(entry._row, entry.fields.dateReceived || "", function(prefill) {
      if (!prefill) return;
      var liveEntry = Model.getBatchEntryByRow(entry._row);
      if (!liveEntry) return;
      liveEntry.fields = TypingController.mergeObjects(liveEntry.fields, {
        studentName: prefill.studentName || liveEntry.fields.studentName || "",
        hei: prefill.hei || liveEntry.fields.hei || "",
        dateGraduation: prefill.dateGraduation || "",
        program: prefill.program || "",
        targetReleaseDate: prefill.targetReleaseDate || "",
        transactionType: prefill.transactionType || "",
        heiAddress: prefill.heiAddress || "",
        ess2InCharge: prefill.ess2InCharge || "",
        statusOfApplication: prefill.statusOfApplication || ""
      });
      if (updateForm && String(Model.editingRowID) === String(liveEntry._row)) {
        View.populateEditForm(liveEntry);
      }
      View.renderSelectedBatchList();
    });
  },

  syncCurrentFormToModel: function(changedField) {
    var entry = Model.getCurrentBatchEntry();
    if (!entry) return;
    View.clearModalActionError("savebtn");
    View.clearModalActionError("updateStudentBtn");

    var patch = this.getFormPatch();
    Model.updateBatchEntryFields(entry._row, patch);
    this.refreshDerivedFields(entry);
    
    Model.recomputeBatchSoPreviews();
    Model.batchHasChanges = Model.isBatchDirty();
    View.renderSelectedBatchList();
    View.updateActionButtons();
    this.loadTempPrefillForEntry(entry, true);
  },

  openManualBatchModal: function() {
    Model.clearEditing();
    View.clearModalValidationErrors();
    View.setSaveButtonLoading(false);
    View.populateStaticSelectOptions();
    View.setValue("temp_date_received", "");
    View.setValue("temp_student_name", "");
    View.setValue("temp_hei", "");
    View.setValue("temp_date_graduation", "");
    View.setValue("temp_program", "");
    View.renderSelectedBatchList();
    View.updateActionButtons();
    var modal = document.getElementById("editModal");
    if (modal) modal.classList.add("show");
  },

  addManualBatchStudent: function() {
    View.clearModalValidationErrors();
    var patch = this.getFormPatch();

    if (!patch.dateReceived) {
      View.setModalFieldError("temp_date_received", "Date Received is required.");
      return;
    }
    if (!String(patch.studentName).trim()) {
      View.setModalFieldError("temp_student_name", "Name of the Student is required.");
      return;
    }
    if (!String(patch.hei).trim()) {
      View.setModalFieldError("temp_hei", "HEI is required.");
      return;
    }
    if (!String(patch.dateGraduation).trim()) {
      View.setModalFieldError("temp_date_graduation", "Date of Graduation is required.");
      return;
    }
    if (!String(patch.program).trim()) {
      View.setModalFieldError("temp_program", "Program is required.");
      return;
    }

    var entry = Model.createManualBatchEntry(patch);
    this.refreshDerivedFields(entry);
    Model.addBatchStudent(entry);
    View.renderSelectedBatchList();
    View.updateActionButtons();
    
    // Reset name only for next entry
    View.setValue("temp_student_name", "");
  },

  selectBatchStudent: function(rowID) {
    this.syncCurrentFormToModel();
    var entry = Model.getBatchEntryByRow(rowID);
    if (entry) {
      View.populateEditForm(entry);
      View.renderSelectedBatchList();
    }
  },

  removeBatchStudent: function(rowID) {
    this.syncCurrentFormToModel();
    Model.removeBatchStudent(rowID);
    if (!Model.batchStudents.length) {
      View.closeEditModal();
      return;
    }
    Model.recomputeBatchSoPreviews();
    Model.batchHasChanges = Model.isBatchDirty();
    View.populateEditForm(Model.batchStudents[0]);
    View.renderSelectedBatchList();
    View.updateActionButtons();
  },

  saveEdit: function() {
    View.clearModalValidationErrors();
    if (!Model.batchStudents.length) {
      View.showSaveIndicator("No changes to save", "error", 2000);
      return;
    }
    
    var targets = Model.batchStudents.slice();
    View.setSaveButtonLoading(true);
    
    var payloads = targets.map(function(entry) {
      return {
        row: entry._row,
        dateReceived: entry.fields.dateReceived || "",
        studentName: entry.fields.studentName || "",
        hei: entry.fields.hei || "",
        dateGraduation: entry.fields.dateGraduation || "",
        program: entry.fields.program || ""
      };
    });

    Service.updateTempRecordEntries(payloads, "batch-" + Date.now(), function(batchResult) {
      View.setSaveButtonLoading(false);
      var results = batchResult && Array.isArray(batchResult.results) ? batchResult.results : [];
      var successCount = results.filter(function(r) { return r.ok; }).length;
      
      if (successCount === targets.length) {
        View.showSaveIndicator("Batch saved successfully", "success", 3000);
        View.closeEditModal();
        TypingController.initData({ silent: true });
      } else {
        View.showSaveIndicator("Saved " + successCount + " of " + targets.length + " students.", "error", 5000);
      }
    }, function(err) {
      View.setSaveButtonLoading(false);
      View.showSaveIndicator("Batch save failed: " + (err.message || "Unknown error"), "error", 5000);
    });
  },

  loadAccountName: function() {
    Service.getAccountName(function(name) {
      var el = document.getElementById('accountName');
      if (el) el.textContent = name || "";
    });
  },

  loadNavbarLogo: function() {
    Service.getNavbarLogoData(function(result) {
      var dataUrl = result && result.dataUrl ? String(result.dataUrl).trim() : "";
      var logoImage = document.getElementById("navbarLogoImage");
      var fallback = document.getElementById("navbarLogoFallback");
      if (logoImage && dataUrl) {
        logoImage.src = dataUrl;
        logoImage.classList.remove("d-none");
        if (fallback) fallback.classList.add("d-none");
      }
    });
  },

  loadUserRole: function() {
    Service.getUserRole(function(role) {
      Model.userRole = role || "Viewer";
    });
  },

  startDatabaseRowPolling: function() {
    setInterval(function() {
      Service.getDatabaseRowUpdateInfo(function(info) {
        if (!info || !info.updatedAt) return;
        if (String(info.updatedAt) === String(Model.lastDatabaseUpdateAt)) return;
        Model.lastDatabaseUpdateAt = String(info.updatedAt);
        TypingController.initData({ silent: true });
      });
    }, 30000);
  },

  setActiveHistorySection: function(section) {
    var nextSection = section === "failure" ? "failure" : "success";
    Model.activeHistorySection = nextSection;
    View.setActiveHistorySection(nextSection);
    if (nextSection === "failure") {
      this.loadSaveFailureHistory();
      return;
    }
    this.loadHistoryData();
  },

  loadHistoryData: function(options) {
    var settings = options || {};
    Service.getIssuanceHistory(function(rows) {
      Model.historyRows = Array.isArray(rows) ? rows : [];
      View.renderHistoryRows(Model.historyRows);
    });
  },

  loadSaveFailureHistory: function(options) {
    Service.getSaveFailureHistory(function(rows) {
      Model.saveFailureRows = Array.isArray(rows) ? rows : [];
      View.renderSaveFailureRows(Model.saveFailureRows);
    });
  },

  retryFailedSave: function(logRow, localKey) {
    Service.retryFailedSave(logRow, function(result) {
      if (result && result.ok) {
        TypingController.initData({ silent: true });
        TypingController.loadHistoryData({ silent: true });
        TypingController.loadSaveFailureHistory({ silent: true });
      }
    });
  },

  initEventListeners: function() {
    if (Model.listenersBound) return;
    Model.listenersBound = true;

    this.searchDebounced = this.debounce(function(value) { TypingController.doSearch(value); }, 250);

    var searchInput = document.getElementById("searchInput");
    if (searchInput) {
      searchInput.addEventListener("input", function(e){
        TypingController.searchDebounced(e.target.value);
      });
    }

    ["temp_date_received", "temp_student_name", "temp_hei", "temp_date_graduation", "temp_program"].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) {
        el.addEventListener("change", function() {
          var fieldKey = TypingController.formFieldMap[id];
          TypingController.syncCurrentFormToModel(fieldKey);
        });
      }
    });

    // Filter builder events
    var addFilterBtnMain = document.getElementById("addFilterBtnMain");
    var filterPopoverMain = document.getElementById("filterPopoverMain");
    var filterDoneMain = document.getElementById("filterDoneMain");
    var filterAllMain = document.getElementById("filterAllMain");
    var filterClearMain = document.getElementById("filterClearMain");
    var mainRadioOptions = document.querySelectorAll("input[name='filterMainOption']");

    if (addFilterBtnMain && filterPopoverMain) {
      addFilterBtnMain.addEventListener("click", function(e) {
        e.stopPropagation();
        filterPopoverMain.classList.toggle("show");
      });
    }

    if (filterDoneMain && filterPopoverMain) {
      filterDoneMain.addEventListener("click", function() { filterPopoverMain.classList.remove("show"); });
    }

    if (filterAllMain) {
      filterAllMain.addEventListener("click", function() {
        Controller.setVerificationFilter(["verified", "deficiency", "unverified"], "main");
      });
    }

    if (filterClearMain) {
      filterClearMain.addEventListener("click", function() { Controller.setVerificationFilter([], "main"); });
    }

    mainRadioOptions.forEach(function(radio) {
      radio.addEventListener("change", function() {
        var selected = Array.from(mainRadioOptions).filter(function(el) { return el.checked; }).map(function(el) { return el.value; });
        Controller.setVerificationFilter(selected, "main");
      });
    });

    document.addEventListener("click", function(e) {
      if (filterPopoverMain && !e.target.closest("#filterBuilderMain")) filterPopoverMain.classList.remove("show");
    });

    this.refreshFilterUI();
  },

  setVerificationFilter: function(mode, scope) {
    var allowed = ["verified", "deficiency", "unverified"];
    var selected = [];
    var modeWasArray = Array.isArray(mode);
    var target = (scope === "modal") ? "verificationFilterModal" : "verificationFilterMain";
    if (Array.isArray(mode)) {
      selected = mode.filter(function(v, i, arr) {
        return allowed.indexOf(v) !== -1 && arr.indexOf(v) === i;
      });
    } else {
      var value = String(mode || "all");
      if (value === "all") {
        selected = allowed.slice();
      } else if (allowed.indexOf(value) !== -1) {
        selected = [value];
      }
    }
    if (!selected.length && !modeWasArray) selected = allowed.slice();
    Model[target] = selected;
    this.refreshFilterUI();
    this.doSearch(Model.lastMainSearchTerm || "");
  },

  refreshFilterUI: function() {
    var labelMap = {
      verified: "Verified",
      deficiency: "Deficiency",
      unverified: "Unverified"
    };

    var renderTags = function(containerId, mode, scope) {
      var container = document.getElementById(containerId);
      if (!container) return;
      if (!mode.length) {
        container.innerHTML = "";
        return;
      }
      container.innerHTML = mode.map(function(item) {
        var chipScopeClass = (scope === "main") ? "filter-chip-main" : "filter-chip-modal";
        return "<span class='filter-chip " + chipScopeClass + " active' data-filter='" + item + "'>" + (labelMap[item] || item) + " <button type='button' title='Remove filter'>&times;</button></span>";
      }).join(" ");
      container.querySelectorAll(".filter-chip button").forEach(function(btn) {
        btn.onclick = function(e) {
          e.stopPropagation();
          var chip = btn.closest(".filter-chip");
          var key = chip ? chip.getAttribute("data-filter") : "";
          var next = mode.filter(function(m) { return m !== key; });
          Controller.setVerificationFilter(next, scope);
        };
      });
    };

    var mainMode = Array.isArray(Model.verificationFilterMain) ? Model.verificationFilterMain.slice() : ["verified", "deficiency", "unverified"];
    renderTags("filterTagsMain", mainMode, "main");

    var mainOptions = document.querySelectorAll("input[name='filterMainOption']");
    mainOptions.forEach(function(r) { r.checked = mainMode.indexOf(r.value) !== -1; });

    // Initialize year tabs
    this.initYearTabs();
  },

  // Year Tabs Functions
  initYearTabs: function() {
    var yearTabsContainer = document.getElementById("yearTabsContainer");
    if (!yearTabsContainer) return;

    yearTabsContainer.addEventListener("click", function(e) {
      var btn = e.target.closest("button[data-year]");
      if (!btn) return;

      // Update active state
      yearTabsContainer.querySelectorAll(".nav-link").forEach(function(link) {
        link.classList.remove("active");
      });
      btn.classList.add("active");

      // Apply year filter
      var year = btn.getAttribute("data-year");
      Controller.setYearFilter(year);
    });
  },

  setYearFilter: function(year) {
    Model.yearFilter = year || "all";
    this.doSearch(Model.lastMainSearchTerm || "");
  },

  extractYearsFromData: function(data) {
    var years = new Set();
    var currentYear = new Date().getFullYear();

    (data || []).forEach(function(row) {
      var dateReceived = row["Date Received"] || "";
      if (dateReceived) {
        var year = new Date(dateReceived).getFullYear();
        if (!isNaN(year)) {
          years.add(year);
        }
      }
    });

    // Convert to array and sort descending
    var sortedYears = Array.from(years).sort(function(a, b) { return b - a; });

    // Filter: show current year + 3 previous, rest go to archive
    var displayYears = [];
    var archiveYears = [];

    sortedYears.forEach(function(year) {
      if (year >= currentYear - 2) {
        displayYears.push(year);
      } else {
        archiveYears.push(year);
      }
    });

    return {
      display: displayYears,
      archive: archiveYears
    };
  },

  renderYearTabs: function() {
    var container = document.getElementById("yearTabsContainer");
    if (!container) return;

    var years = this.extractYearsFromData(Model.fullData);
    var currentFilter = Model.yearFilter || "all";

    // Build HTML
    var html = '<li><button class="nav-link ' + (currentFilter === "all" ? "active" : "") + '" data-year="all">All Years</button></li>';

    // Add display years
    years.display.forEach(function(year) {
      html += '<li><button class="nav-link ' + (currentFilter === String(year) ? "active" : "") + '" data-year="' + year + '">' + year + '</button></li>';
    });

    // Add archive tab if there are archive years
    if (years.archive.length > 0) {
      html += '<li><button class="nav-link ' + (currentFilter === "archive" ? "active" : "") + '" data-year="archive">Archive</button></li>';
    }

    container.innerHTML = html;
  },

  applyYearFilter: function(rows) {
    var yearFilter = Model.yearFilter || "all";
    if (yearFilter === "all") return rows;

    var currentYear = new Date().getFullYear();
    var years = this.extractYearsFromData(Model.fullData);

    return rows.filter(function(row) {
      var dateReceived = row["Date Received"] || "";
      if (!dateReceived) return false;

      var rowYear = new Date(dateReceived).getFullYear();
      if (isNaN(rowYear)) return false;

      if (yearFilter === "archive") {
        return years.archive.indexOf(rowYear) !== -1;
      }

      return String(rowYear) === yearFilter;
    });
  }
};

var Controller = TypingController;
document.addEventListener("DOMContentLoaded", function() {
  TypingController.init();
});
</script>
