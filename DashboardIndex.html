    <!-- ADD THIS RIGHT HERE -->
    <script>
      (function() {
        var trigger = document.getElementById('filterTrigger');
        var flyout = document.getElementById('filterFlyout');

        if (trigger && flyout) {
          trigger.onclick = null;
          trigger.addEventListener('click', function(e) {
            e.stopPropagation();
            var isOpen = flyout.style.left === '0px';
            flyout.style.left = isOpen ? '-360px' : '0px';
            document.body.classList.toggle('filter-open', !isOpen);
          });
        }

        // ADD THIS: force enable apply button whenever any filter changes
        var filterIds = ['filterEs2', 'filterProgram', 'filterStatus', 'filterHei', 'filterDatePreset', 'filterDateFrom', 'filterDateTo'];
        filterIds.forEach(function(id) {
          var el = document.getElementById(id);
          if (el) {
            el.addEventListener('change', function() {
              var btn = document.getElementById('applyFiltersButton');
              if (btn) {
                btn.disabled = false;
                // Also set the flag in Model if it exists
                if (typeof Model !== 'undefined') {
                  Model.hasPendingFilterChanges = true;
                }
              }
            });
          }
        });

      })();
    </script>
