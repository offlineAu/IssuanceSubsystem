<script>
var View = {
  soIndicatorHtml: function() {
    return "<i class='bi bi-file-earmark-check-fill text-primary ms-1' title='Student already has SO number'></i>";
  },

  firstAnchorIndicatorHtml: function() {
    return "<i class='bi bi-pin-angle-fill text-primary ms-1 opacity-75' title='Batch anchor student'></i>";
  },

  statusBadgeHtml: function(statusValue) {
    var category = Model.getVerificationCategory(statusValue);
    if (category === "verified") {
      return "<span class='status-chip verified' title='Verified'><i class='bi bi-check-circle-fill'></i>Verified</span>";
    }
    if (category === "deficiency") {
      return "<span class='status-chip deficiency' title='Deficiency'><i class='bi bi-exclamation-triangle-fill'></i>Deficiency</span>";
    }
    return "<span class='status-chip unverified' title='Unverified'><i class='bi bi-dash-circle-fill'></i>Unverified</span>";
  },

  getEl: function(id) {
    return document.getElementById(id);
  },

  cleanupInactiveModules: function(activeModule) {
    // Standalone module architecture - each module handles its own state.
    console.log("[MODULE CLEANUP] Standalone mode");
  },

  renderModuleState: function() {
    var titleEl = this.getEl("appNavbarTitle");
    if (titleEl) {
      titleEl.textContent = "Issuance Tracking System";
    }
  },

  getTableRenderContext: function() {
    return {
      headerRowId: "searchTableHeaderRow",
      resultsId: "searchResults",
      mobileId: "searchResultsMobile",
      statusId: "statusText",
      paginationId: "pagination",
      pageInputId: "pageJumpInput",
      pageMetaId: "pageMeta",
      overlayId: "loadingOverlay"
    };
  },

  setActiveMainView: function(viewName) {
    var home = this.getEl("homeView");
    var report = this.getEl("reportView");
    var history = this.getEl("historyView");
    var homeBtn = this.getEl("navHomeBtn");
    var reportBtn = this.getEl("navReportBtn");
    var historyBtn = this.getEl("navHistoryBtn");
    var isReport = viewName === "report";
    var isHistory = viewName === "history";

    if (home) home.classList.toggle("d-none", isReport || isHistory);
    if (report) report.classList.toggle("d-none", !isReport);
    if (history) history.classList.toggle("d-none", !isHistory);
    
    if (homeBtn) {
      homeBtn.classList.toggle("is-active", !isReport && !isHistory);
      homeBtn.setAttribute("aria-pressed", String(!isReport && !isHistory));
    }
    if (reportBtn) {
      reportBtn.classList.toggle("is-active", isReport);
      reportBtn.setAttribute("aria-pressed", String(isReport));
    }
    if (historyBtn) {
      historyBtn.classList.toggle("is-active", isHistory);
      historyBtn.setAttribute("aria-pressed", String(isHistory));
    }
  },

  setActiveHistorySection: function(section) {
    var success = this.getEl("historySuccessSection");
    var failure = this.getEl("historyFailureSection");
    var successBtn = this.getEl("historySuccessTab");
    var failureBtn = this.getEl("historyFailureTab");
    var isFailure = section === "failure";

    if (success) success.classList.toggle("d-none", isFailure);
    if (failure) failure.classList.toggle("d-none", !isFailure);
    if (successBtn) {
      successBtn.classList.toggle("is-active", !isFailure);
      successBtn.setAttribute("aria-pressed", String(!isFailure));
    }
    if (failureBtn) {
      failureBtn.classList.toggle("is-active", isFailure);
      failureBtn.setAttribute("aria-pressed", String(isFailure));
    }
  },

  formatReportCount: function(value) {
    return Number(value || 0).toLocaleString();
  },

  buildReportBarRows: function(items, options) {
    options = options || {};
    var emptyMessage = options.emptyMessage || "No data available";
    var accentClass = options.accentClass || "";
    if (!items || !items.length) {
      return "<div class='report-empty-state'>" + emptyMessage + "</div>";
    }
    var max = items.reduce(function(best, item) {
      return Math.max(best, Number(item.value || 0));
    }, 0) || 1;
    return items.map(function(item) {
      var width = Math.max(8, Math.round((Number(item.value || 0) / max) * 100));
      return "<div class='report-bar-row'>" +
        "<div class='report-bar-text'>" +
          "<span class='report-bar-label'>" + (item.label || "-") + "</span>" +
          "<strong class='report-bar-value'>" + View.formatReportCount(item.value) + "</strong>" +
        "</div>" +
        "<div class='report-bar-track'>" +
          "<span class='report-bar-fill " + accentClass + "' style='width:" + width + "%'></span>" +
        "</div>" +
      "</div>";
    }).join("");
  },

  renderReportAnalytics: function() {
    if (!this.getRecordViewConfig().showVerificationFilters) {
      return;
    }
    var loadedRows = Array.isArray(Model.fullData) ? Model.fullData : [];
    var activeRows = Array.isArray(Model.filteredData) ? Model.filteredData : [];
    var totalLoaded = loadedRows.length;
    var statusCounts = { verified: 0, deficiency: 0, unverified: 0 };
    var heiCounts = {};
    var assignedCounts = {};
    var progressCounts = { withSO: 0, withDateReceived: 0, withDateForwarded: 0 };

    activeRows.forEach(function(row) {
      var category = Model.getVerificationCategory(row["Verification Status"]);
      statusCounts[category] = (statusCounts[category] || 0) + 1;

      var hei = String(row.HEI || "").trim() || "Unspecified HEI";
      heiCounts[hei] = (heiCounts[hei] || 0) + 1;

      var assigned = String(row["Issuance and Encoding of No.: Assigned Person"] || "").trim() || "Unassigned";
      assignedCounts[assigned] = (assignedCounts[assigned] || 0) + 1;

      if (String(row["SO No."] || "").trim()) progressCounts.withSO += 1;
      if (String(row["Issuance and Encoding of No.: Date Received"] || "").trim()) progressCounts.withDateReceived += 1;
      if (String(row["Issuance and Encoding of No.: Date Forwarded"] || "").trim()) progressCounts.withDateForwarded += 1;
    });

    var topEntries = function(map, limit) {
      return Object.keys(map).map(function(key) {
        return { label: key, value: map[key] };
      }).sort(function(a, b) {
        return b.value - a.value;
      }).slice(0, limit || 5);
    };

    var datasetHint = this.getEl("reportDatasetHint");
    if (datasetHint) {
      datasetHint.textContent = "Showing " + this.formatReportCount(activeRows.length) + " of " + this.formatReportCount(totalLoaded) + " loaded students";
    }

    var setText = function(id, value) {
      var el = View.getEl(id);
      if (el) el.textContent = View.formatReportCount(value);
    };
    setText("reportTotalCount", totalLoaded);
    setText("reportVerifiedCount", statusCounts.verified);
    setText("reportDeficiencyCount", statusCounts.deficiency);
    setText("reportUnverifiedCount", statusCounts.unverified);

    var matchCount = this.getEl("reportMatchCount");
    if (matchCount) {
      matchCount.textContent = activeRows.length === totalLoaded
        ? "All loaded rows"
        : "Filtered result set";
    }

    var statusBars = this.getEl("reportStatusBars");
    if (statusBars) {
      statusBars.innerHTML = this.buildReportBarRows([
        { label: "Verified", value: statusCounts.verified },
        { label: "Deficiency", value: statusCounts.deficiency },
        { label: "Unverified", value: statusCounts.unverified }
      ], { accentClass: "report-bar-fill-status", emptyMessage: "No verification data yet" });
    }

    var heiBars = this.getEl("reportHeiBars");
    if (heiBars) {
      heiBars.innerHTML = this.buildReportBarRows(topEntries(heiCounts, 5), {
        accentClass: "report-bar-fill-hei",
        emptyMessage: "No HEI data available"
      });
    }

    var assignedBars = this.getEl("reportAssignedBars");
    if (assignedBars) {
      assignedBars.innerHTML = this.buildReportBarRows(topEntries(assignedCounts, 5), {
        accentClass: "report-bar-fill-assigned",
        emptyMessage: "No assigned person data available"
      });
    }

    var progressBars = this.getEl("reportProgressBars");
    if (progressBars) {
      progressBars.innerHTML = this.buildReportBarRows([
        { label: "With SO Number", value: progressCounts.withSO },
        { label: "With Date Received", value: progressCounts.withDateReceived },
        { label: "With Date Forwarded", value: progressCounts.withDateForwarded }
      ], { accentClass: "report-bar-fill-progress", emptyMessage: "No issuance progress data available" });
    }
  },

  setValue: function(id, value) {
    var el = this.getEl(id);
    if (!el) return;
    el.value = value || "";
  },

  getRecordViewConfig: function() {
    return Model.recordViewConfig || {};
  },

  isDeveloperView: function() {
    return this.getRecordViewConfig().mode === "developer";
  },

  applyRecordViewConfig: function() {
    var config = this.getRecordViewConfig();
    var context = this.getTableRenderContext();
    var headerRow = this.getEl(context.headerRowId);
    var filterBuilderMain = this.getEl("filterBuilderMain");
    var navReportBtn = this.getEl("navReportBtn");
    var navHistoryBtn = this.getEl("navHistoryBtn");
    var reportView = this.getEl("reportView");
    var historyView = this.getEl("historyView");
    var homeView = this.getEl("homeView");

    if (headerRow) {
      var tableColumns = Array.isArray(config.tableColumns) ? config.tableColumns : [];
      headerRow.innerHTML = tableColumns.map(function(column) {
        return "<th>" + View.escapeHtml(column.label || column.name || "") + "</th>";
      }).join("");
    }

    if (filterBuilderMain) {
      filterBuilderMain.classList.toggle("d-none", !config.showVerificationFilters);
    }
    if (navReportBtn) navReportBtn.classList.toggle("d-none", !config.showVerificationFilters);
    if (navHistoryBtn) navHistoryBtn.classList.toggle("d-none", !config.showVerificationFilters);
    if (!config.showVerificationFilters) {
      if (reportView) reportView.classList.add("d-none");
      if (historyView) historyView.classList.add("d-none");
      if (homeView) homeView.classList.remove("d-none");
    }
  },

  escapeHtml: function(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  },

  getFieldOperationBadgesHtml: function(field) {
    var ops = (field && field.operations) || {};
    var items = [
      { key: "create", label: "C" },
      { key: "read", label: "R" },
      { key: "update", label: "U" },
      { key: "delete", label: "D" }
    ];
    return items.map(function(item) {
      var active = !!ops[item.key];
      return "<span class='position-op-badge" + (active ? " is-active" : "") + "'>" + item.label + "</span>";
    }).join("");
  },

  buildPlaceholderControlHtml: function(field) {
    var type = String((field && field.type) || "").trim().toLowerCase();
    var disabledAttr = " disabled";
    var placeholder = " placeholder='No live data yet'";
    if (type === "textarea") {
      return "<textarea class='form-control' rows='2'" + disabledAttr + placeholder + "></textarea>";
    }
    if (type === "select" || type === "auto-populate-select" || type === "program-populate-select") {
      var options = Array.isArray(field.selectOptions) ? field.selectOptions : [];
      var optionHtml = "<option value=''>No live data yet</option>" + options.slice(0, 25).map(function(option) {
        return "<option value='" + View.escapeHtml(option) + "'>" + View.escapeHtml(option) + "</option>";
      }).join("");
      return "<select class='form-control'" + disabledAttr + ">" + optionHtml + "</select>";
    }
    var inputType = "text";
    if (type === "date" || type === "grad-date" || type === "from-date") inputType = "date";
    if (type === "datetime") inputType = "datetime-local";
    return "<input type='" + inputType + "' class='form-control'" + disabledAttr + placeholder + ">";
  },

  renderPositionFieldSchema: function() {
    var container = this.getEl("positionFieldPlaceholderList");
    var meta = this.getEl("positionFieldMeta");
    if (!container) return;
    var schema = Model.userPositionFieldSchema || {};
    var fields = Array.isArray(schema.placeholderFields) ? schema.placeholderFields : [];

    if (meta) {
      if (schema.position || schema.profileId) {
        meta.textContent = [schema.position || "No position", schema.profileId || "No profile"].join(" | ");
      } else {
        meta.textContent = "";
      }
    }

    if (!schema.knownUser) {
      container.innerHTML = "<div class='position-field-empty'>No matched user session yet. Check the browser console for account debug details.</div>";
      return;
    }
    if (schema.denyReason && !fields.length) {
      container.innerHTML = "<div class='position-field-empty'>" + this.escapeHtml(schema.denyReason) + "</div>";
      return;
    }
    if (!fields.length) {
      container.innerHTML = "<div class='position-field-empty'>No additional Data Types fields are mapped to your position yet.</div>";
      return;
    }

    container.innerHTML = fields.map(function(field) {
      var className = field.className ? "<div class='position-field-subline'>Class: " + View.escapeHtml(field.className) + "</div>" : "";
      var stageLabel = field.stageLabel ? "<div class='position-field-subline'>Stage: " + View.escapeHtml(field.stageLabel) + "</div>" : "";
      return "<div class='position-field-card'>" +
        "<div class='position-field-header'>" +
          "<div>" +
            "<div class='position-field-title'>" + View.escapeHtml(field.name || "") + "</div>" +
            "<div class='position-field-subtitle'>" + View.escapeHtml(field.type || "text") + "</div>" +
          "</div>" +
          "<div class='position-field-ops'>" + View.getFieldOperationBadgesHtml(field) + "</div>" +
        "</div>" +
        className +
        stageLabel +
        "<div class='position-field-control'>" + View.buildPlaceholderControlHtml(field) + "</div>" +
      "</div>";
    }).join("");
  },

  buildFieldValueControlHtml: function(field, value) {
    var type = String((field && field.type) || "").trim().toLowerCase();
    var safeValue = value == null ? "" : String(value);
    if (type === "textarea") {
      return "<textarea class='form-control' rows='2' disabled>" + View.escapeHtml(safeValue) + "</textarea>";
    }
    if (type === "select" || type === "auto-populate-select" || type === "program-populate-select") {
      var options = Array.isArray(field.selectOptions) ? field.selectOptions : [];
      var currentValue = safeValue;
      var hasCurrent = options.some(function(option) { return String(option) === currentValue; });
      var allOptions = hasCurrent || !currentValue ? options : [currentValue].concat(options);
      return "<select class='form-control' disabled>" +
        "<option value=''>" + View.escapeHtml(currentValue || "No value") + "</option>" +
        allOptions.slice(0, 30).map(function(option) {
          var selected = String(option) === currentValue ? " selected" : "";
          return "<option value='" + View.escapeHtml(option) + "'" + selected + ">" + View.escapeHtml(option) + "</option>";
        }).join("") +
      "</select>";
    }
    var inputType = "text";
    if (type === "date" || type === "grad-date" || type === "from-date") inputType = "date";
    if (type === "datetime") inputType = "datetime-local";
    return "<input type='" + inputType + "' class='form-control' value='" + View.escapeHtml(safeValue) + "' disabled>";
  },

  renderPositionRecordValues: function(student) {
    var container = this.getEl("positionFieldPlaceholderList");
    var meta = this.getEl("positionFieldMeta");
    var description = this.getEl("positionFieldDescription");
    if (!container) return;
    var config = this.getRecordViewConfig();
    var fields = Array.isArray(config.modalFields) ? config.modalFields : [];

    if (meta) {
      meta.textContent = [config.position || Model.accessContext.position || "No position", config.profileId || Model.accessContext.profileId || "No profile"].join(" | ");
    }
    if (description) {
      description.textContent = "These fields are visible for your matched position and show the current database values.";
    }
    if (!fields.length) {
      container.innerHTML = "<div class='position-field-empty'>No Data Types fields are visible for this position yet.</div>";
      return;
    }

    container.innerHTML = fields.map(function(field) {
      var value = student ? student[field.name] : "";
      var className = field.className ? "<div class='position-field-subline'>Class: " + View.escapeHtml(field.className) + "</div>" : "";
      return "<div class='position-field-card'>" +
        "<div class='position-field-header'>" +
          "<div>" +
            "<div class='position-field-title'>" + View.escapeHtml(field.label || field.name || "") + "</div>" +
            "<div class='position-field-subtitle'>" + View.escapeHtml(field.type || "text") + "</div>" +
          "</div>" +
          "<div class='position-field-ops'>" + View.getFieldOperationBadgesHtml(field) + "</div>" +
        "</div>" +
        className +
        "<div class='position-field-control'>" + View.buildFieldValueControlHtml(field, value) + "</div>" +
      "</div>";
    }).join("");
  },

  renderTypingModule: function() {
    if (typeof TypingView !== "undefined" && TypingView && typeof TypingView.render === "function") {
      return TypingView.render.apply(TypingView, arguments);
    }
  },

  // DASHBOARD LEGACY (PENDING DELETE): superseded by DashboardView.html module implementation.
  dashboard: {
    render: function(data) {
      if (Model.activeModule !== "dashboard") return;
      var dom = Model.dashboard.dom || {};
      var root = dom.root || document.getElementById("dashboardHomeContent");
      if (!root) return;

      if (!data && Model.dashboard.isLoading) {
        this.renderEmpty("Loading dashboard data...");
        if (dom.meta) dom.meta.textContent = "Loading analytics...";
        console.log("[MODULE DASHBOARD] render complete");
        return;
      }

      if (!data || data.error) {
        this.renderError((data && data.error) || Model.dashboard.error || "No dashboard data available.");
        console.log("[MODULE DASHBOARD] render complete");
        return;
      }

      this.renderKpis(data.summary || {});
      this.renderSections(data.sections || {});
      if (dom.meta) {
        var meta = data.meta || {};
        dom.meta.textContent = "Source: " + View.escapeHtml(meta.source || "BigQuery") +
          (meta.loadedAt ? " | Loaded: " + View.escapeHtml(meta.loadedAt) : "");
      }
      console.log("[MODULE DASHBOARD] render complete");
    },

    renderKpis: function(summary) {
      var dom = Model.dashboard.dom || {};
      if (!dom.kpiGrid) return;
      var cards = [
        ["Total", summary.total],
        ["For Evaluation", summary.forEvaluation],
        ["Evaluated", summary.evaluated],
        ["Deficiency", summary.deficiency],
        ["Approved", summary.approved],
        ["Verified", summary.verified],
        ["For Signature", summary.forSignature],
        ["For Release", summary.forRelease],
        ["Released", summary.released],
        ["Cancelled", summary.cancelled]
      ];
      var visibleCards = [];
      var zeroCards = [];
      cards.forEach(function(card) {
        var value = Number(card[1] || 0);
        if (card[0] === "Total" || value > 0) visibleCards.push(card);
        else zeroCards.push(card[0]);
      });
      if (zeroCards.length) visibleCards.push(["Inactive Stages", 0, zeroCards.join(" / ")]);
      if (!visibleCards.length) visibleCards = [["Total", 0]];
      dom.kpiGrid.innerHTML = visibleCards.map(function(card) {
        var isGroupedZeroCard = card[0] === "Inactive Stages";
        return '<div class="report-stat-card' + (isGroupedZeroCard ? ' report-stat-card-muted report-stat-card-grouped' : '') + '"><span class="report-stat-label">' + View.escapeHtml(card[0]) + '</span>' +
          (isGroupedZeroCard
            ? '<div class="report-stat-muted-copy">No current records: ' + View.escapeHtml(card[2] || "") + '</div>'
            : '<strong class="report-stat-value">' + View.escapeHtml(View.formatReportCount(card[1] || 0)) + "</strong>") +
          "</div>";
      }).join("");
    },

    renderSections: function(sections) {
      var dom = Model.dashboard.dom || {};
      var workloadRows = Array.isArray(sections.es2Ownership && sections.es2Ownership.rows) ? sections.es2Ownership.rows : [];
      var statusRows = Array.isArray(sections.overallApplicationStatus && sections.overallApplicationStatus.rows) ? sections.overallApplicationStatus.rows : [];
      var topProgramsRows = Array.isArray(sections.topPrograms && sections.topPrograms.rows) ? sections.topPrograms.rows : [];
      var locationRows = Array.isArray(sections.locationLoad && sections.locationLoad.rows) ? sections.locationLoad.rows : [];
      var monthlyRows = Array.isArray(sections.monthlyVolume && sections.monthlyVolume.rows) ? sections.monthlyVolume.rows : [];
      var slaRows = Array.isArray(sections.slaExposure && sections.slaExposure.rows) ? sections.slaExposure.rows : [];
      var backlogRows = Array.isArray(sections.stageBacklog && sections.stageBacklog.rows) ? sections.stageBacklog.rows : [];
      var productivityRows = Array.isArray(sections.productivity && sections.productivity.rows) ? sections.productivity.rows : [];
      var turnaround = (sections.turnaroundTime && typeof sections.turnaroundTime === "object") ? sections.turnaroundTime : {};
      var turnaroundRows = Array.isArray(turnaround.rows) ? turnaround.rows : [];
      var turnaroundSummary = (turnaround.summary && typeof turnaround.summary === "object") ? turnaround.summary : {};
      var summaryFallback = Number((((Model.dashboard || {}).data || {}).summary || {}).total || 0);

      if (dom.workloadList) {
        dom.workloadList.innerHTML = workloadRows.length
          ? "<div class='table-responsive'><table class='table table-hover align-middle mb-0 analytics-table'><thead><tr><th>ES II Owner</th><th>Approved</th><th>Deficiency</th><th>Processing / Pending</th><th>Total</th></tr></thead><tbody>" +
            workloadRows.map(function(item) {
              return "<tr><td><button type='button' class='analytics-link-button'>" + View.escapeHtml(item.es2 || "-") + "</button></td><td>" + View.escapeHtml(View.formatReportCount(item.approvedCount || 0)) + "</td><td>" + View.escapeHtml(View.formatReportCount(item.deficiencyCount || 0)) + "</td><td>" + View.escapeHtml(View.formatReportCount(item.processingPendingCount || 0)) + "</td><td>" + View.escapeHtml(View.formatReportCount(item.totalApplications || 0)) + "</td></tr>";
            }).join("") +
            "</tbody></table></div>"
          : "<div class='report-empty-state'>No data available.</div>";
      }

      if (dom.programsList) {
        dom.programsList.innerHTML = topProgramsRows.length
          ? "<div class='report-ranked-list report-scroll-body'>" +
            topProgramsRows.map(function(item, index) {
              return "<div class='ranked-list-item'><span class='ranked-list-rank'>#" + View.escapeHtml(item.rank || (index + 1)) + "</span><div class='ranked-list-body'><span class='ranked-list-name'>" + View.escapeHtml(item.program || "-") + "</span><strong class='ranked-list-value'>" + View.escapeHtml(View.formatReportCount(item.total || 0)) + "</strong></div></div>";
            }).join("") +
            "</div>"
          : "<div class='report-empty-state'>No program analytics available.</div>";
      }

      if (dom.statusList) {
        dom.statusList.innerHTML = statusRows.length
          ? statusRows.map(function(item) {
              return "<div class='dashboard-list-row'><span class='dashboard-list-label'>" + View.escapeHtml(item.label || item.status || "-") + "</span><strong class='dashboard-list-value'>" + View.escapeHtml(View.formatReportCount(item.value || item.count || 0)) + "</strong></div>";
            }).join("")
          : "<div class='report-empty-state'>No status distribution available.</div>";
      }

      if (dom.progressionList) {
        dom.progressionList.innerHTML = statusRows.length
          ? statusRows.map(function(item) {
              var value = Number(item.value || item.count || 0);
              var width = Math.max(8, Math.min(100, value > 0 && summaryFallback ? Math.round((value / Math.max(summaryFallback, value)) * 100) : 8));
              return "<div class='report-bar-row'><div class='report-bar-text'><span class='report-bar-label'>" + View.escapeHtml(item.label || item.status || "-") + "</span><strong class='report-bar-value'>" + View.escapeHtml(View.formatReportCount(value)) + "</strong></div><div class='report-bar-track'><span class='report-bar-fill report-bar-fill-status' style='width:" + width + "%'></span></div></div>";
            }).join("")
          : "<div class='report-empty-state'>No status progression available.</div>";
      }

      if (dom.turnaroundSummary) {
        dom.turnaroundSummary.innerHTML = [
          { label: "Eligible Records", value: turnaroundSummary.eligibleRecords || turnaroundSummary.totalEligible || turnaroundRows.reduce(function(sum, row) { return sum + Number(row.count || row.sampleCount || 0); }, 0) },
          { label: "Average Total Days", value: turnaroundSummary.averageDays || turnaroundSummary.avgDays || 0 },
          { label: "Median Total Days", value: turnaroundSummary.medianDays || turnaroundSummary.minDays || 0 }
        ].map(function(item) {
          return "<div class='report-stat-card turnaround-stat-card h-100'><span class='report-stat-label'>" + View.escapeHtml(item.label) + "</span><strong class='report-stat-value'>" + View.escapeHtml(View.formatReportCount(item.value || 0)) + "</strong></div>";
        }).join("");
      }

  populateSeriesDropdown: function(selectedValue) {
    var select = this.getEl("edit_series");
    if (!select) return;

    var startYear = 1940;
    var currentYear = new Date().getFullYear();
    var target = selectedValue ? String(selectedValue) : String(currentYear);
    var html = "";
    var hasTarget = false;

    for (var year = currentYear; year >= startYear; year--) {
      var y = String(year);
      if (y === target) hasTarget = true;
      html += "<option value='" + y + "'>" + y + "</option>";
    }

    if (target && !hasTarget) {
      html = "<option value='" + target + "'>" + target + "</option>" + html;
    }

    select.innerHTML = html;
    select.value = target;
  },

  renderPage: function(page) {

    var tbody = this.getEl(tableContext.resultsId);
    var mobileContainer = this.getEl(tableContext.mobileId);
    if (!tbody) return;
    tbody.innerHTML = "";
    if (mobileContainer) mobileContainer.innerHTML = "";

      this.renderEmpty("No records found");
      return;
    }

    var cell = function(value) {
      return "<div class='cell-wrap'>" + (value || "") + "</div>";
    };

    var config = this.getRecordViewConfig();
    var tableColumns = Array.isArray(config.tableColumns) ? config.tableColumns : [];

    if (!this.isDeveloperView()) {
      rows.forEach(function(r) {
        var tr = document.createElement("tr");
        tr.dataset.row = r._row;
        tr.innerHTML = tableColumns.map(function(column) {
          return "<td>" + cell(View.escapeHtml(r[column.name] || "")) + "</td>";
        }).join("");
        tr.classList.add("show");

            "</div>" +
            "<div class='search-result-hey'>" + View.escapeHtml(r.HEI || "-") + "</div>" +
            "<div class='search-result-meta-grid'>" +
              extraColumns.map(function(column) {
                return "<div><span>" + View.escapeHtml(column.label || column.name || "") + "</span><strong>" + View.escapeHtml(r[column.name] || "-") + "</strong></div>";
              }).join("") +
            "</div>";
          mobileContainer.appendChild(card);
        }
      });

      this.renderPagination();
      this.updateStatusText();

      tbody.appendChild(tr);

      if (mobileContainer) {
        var card = document.createElement("button");
        card.type = "button";
        card.className = "search-result-card";
        card.dataset.row = r._row;
        card.innerHTML =
          "<div class='search-result-card-top'>" +
            "<div class='search-result-name'>" + (r["Name of the Student"] || "") + (hasSO ? View.soIndicatorHtml() : "") + "</div>" +
            "<div class='search-result-id'>ID " + (r.ID || "-") + "</div>" +

    tbody.innerHTML = "<tr><td colspan='" + colspan + "' class='text-center py-4'>" + message + "</td></tr>";

  renderPagination: function() {
    var tableContext = this.getTableRenderContext();
    var container = this.getEl(tableContext.paginationId);
    if (!container) return;
    container.innerHTML = "";

    var totalPages = Math.ceil(Model.filteredData.length / Model.rowsPerPage);
    var current = Model.currentPage;
    var safeTotal = Math.max(1, totalPages);
    if (current > safeTotal) current = safeTotal;
    if (current < 1) current = 1;

    var pageInput = this.getEl(tableContext.pageInputId);
    if (pageInput) {
      pageInput.max = String(safeTotal);
      pageInput.value = String(current);
    }
    var pageMeta = this.getEl(tableContext.pageMetaId);
    if (pageMeta) {
      pageMeta.textContent = "Page " + current + " of " + safeTotal;
    }

    if (totalPages <= 1) return;

    var maxVisible = 5;
    var start = Math.max(1, current - Math.floor(maxVisible / 2));
    var end = Math.min(totalPages, start + maxVisible - 1);
    if (end - start < maxVisible - 1) start = Math.max(1, end - maxVisible + 1);

    if (current > 1) container.innerHTML += "<button onclick='Controller.renderPage(" + (current - 1) + ")'>&laquo; Prev</button>";
    if (start > 1) container.innerHTML += "<button onclick='Controller.renderPage(1)'>1</button>" + (start > 2 ? "<span>...</span>" : "");

    for (var i = start; i <= end; i++) {
      container.innerHTML += "<button onclick='Controller.renderPage(" + i + ")' class='" + (i === current ? "active-page" : "") + "'>" + i + "</button>";
    }

    if (end < totalPages) container.innerHTML += (end < totalPages - 1 ? "<span>...</span>" : "") + "<button onclick='Controller.renderPage(" + totalPages + ")'>" + totalPages + "</button>";
    if (current < totalPages) container.innerHTML += "<button onclick='Controller.renderPage(" + (current + 1) + ")'>Next &raquo;</button>";

  },

  updateStatusText: function() {
    var tableContext = this.getTableRenderContext();
    var status = this.getEl(tableContext.statusId);
    if (!status) return;
    var visibleCount = Model.filteredData.length;
    if (!visibleCount) {
      status.innerText = Model.searchMode
        ? "Showing 0 of 0 matching rows"
        : "Showing 0 of 0 loaded rows";
      return;
    }
    var start = (Model.currentPage - 1) * Model.rowsPerPage + 1;
    var end = Math.min(start + Model.rowsPerPage - 1, visibleCount);
    status.innerText = Model.searchMode
      ? "Showing " + start + "-" + end + " of " + visibleCount + " matching rows"
      : "Showing " + start + "-" + end + " of " + Model.fullData.length + " loaded rows";
  },

  renderBatchSearchResults: function(rows, showEmptyMessage) {
    var container = this.getEl("batchSearchResults");

      if (showEmptyMessage) container.innerHTML = "<tr><td colspan='2' class='text-center text-muted small'>No students found</td></tr>";
      return;
    }

    rows.forEach(function(student) {
      var restriction = Controller.getBatchAddRestrictionReason(student);
      var restricted = !!restriction;
      var row = document.createElement("tr");
      row.className = "batch-result show" + (restricted ? " locked" : "");
      if (restricted) row.title = restriction;

      var tdName = document.createElement("td");
      tdName.innerHTML = "<strong>" + (student["Name of the Student"] || "") + "</strong>" +
        "<div class='mt-1'>" + View.statusBadgeHtml(student["Verification Status"]) + "</div>";

      var tdAction = document.createElement("td");
      var addBtn = document.createElement("button");
      addBtn.type = "button";
      addBtn.className = "icon-action-btn" + (restricted ? " locked" : "");
      addBtn.title = restricted ? restriction : "Add to batch";
      addBtn.innerHTML = restricted ? "<i class='bi bi-lock'></i>" : "<i class='bi bi-plus-lg'></i>";
      addBtn.setAttribute("aria-disabled", restricted ? "true" : "false");
      if (restricted) addBtn.style.cursor = "not-allowed";
      addBtn.onclick = function(e) {
        e.stopPropagation();
        if (restricted) return;
        Controller.addBatchStudent(student._row);
      };
      tdAction.appendChild(addBtn);

      row.appendChild(tdName);
      row.appendChild(tdAction);
      row.onclick = function() {
        if (!restricted) Controller.addBatchStudent(student._row);
      };
      container.appendChild(row);
    });

  setRetryFailureButtonLoading: function(logRow, localKey, isLoading) {
    var tbody = this.getEl("historyFailureResults");
    if (!tbody) return;

    var selector = ".retry-failure-btn";
    if (logRow) {
      selector += "[data-log-row='" + String(logRow) + "']";
    } else if (localKey) {
      selector += "[data-local-key='" + String(localKey) + "']";
    } else {
      return;
    }

    var btn = tbody.querySelector(selector);
    if (!btn) return;

    if (isLoading) {
      btn.disabled = true;
      btn.dataset.originalHtml = btn.innerHTML;
      btn.innerHTML = "<span class='spinner-border spinner-border-sm me-1' role='status' aria-hidden='true'></span>Retrying...";
      btn.classList.add("is-loading");
      return;
    }

    btn.disabled = false;
    btn.innerHTML = btn.dataset.originalHtml || "Retry Save";
    btn.classList.remove("is-loading");
    delete btn.dataset.originalHtml;
  },

  renderSaveFailureRows: function(rows) {
    var tbody = this.getEl("historyFailureResults");
    if (!tbody) return;
    tbody.innerHTML = "";
    if (!rows || !rows.length) {
      tbody.innerHTML = "<tr><td colspan='9' class='text-center text-muted py-3'>No failed saves found</td></tr>";
      return;
    }

    rows.forEach(function(r) {
      var tr = document.createElement("tr");
      tr.innerHTML =
        "<td>" + (r.name || "-") + "<div class='small text-muted'>ID: " + (r.id || "-") + "</div></td>" +
        "<td>" + (r.row || "-") + "</td>" +
        "<td><div class='history-failure-message'>" + (r.message || "-") + "</div></td>" +
        "<td><code>" + (r.code || "-") + "</code></td>" +
        "<td><code>" + (r.debugId || "-") + "</code></td>" +
        "<td><span class='history-failure-status status-" + String(r.status || "failed").replace(/[^a-z-]/gi, "").toLowerCase() + "'>" + (r.status || "failed") + "</span></td>" +
        "<td>" + (r.retryResult || "-") + (r.retryDebugId ? "<div class='small text-muted'><code>" + r.retryDebugId + "</code></div>" : "") + "</td>" +
        "<td>" + (r.dateSaved || "-") + "</td>" +
        "<td>" + (
          r.status === "retried-success"
            ? "<span class='text-success small fw-semibold'>Resolved</span>"
            : "<button type='button' class='btn btn-sm btn-outline-primary retry-failure-btn' data-log-row='" + (r.logRow || "") + "' data-local-key='" + (r.localKey || "") + "'>Retry Save</button>"
        ) + "</td>";
      tbody.appendChild(tr);
    });
  },

  renderSelectedBatchList: function() {
    var container = this.getEl("selectedBatchList");
    if (!container) return;
    container.innerHTML = "";
    if (Model.batchStudents.length > 0) {
      container.style.maxHeight = "430px";
      container.style.overflowY = "auto";
    } else {
      container.style.maxHeight = "";
      container.style.overflowY = "";
    }

    if (!Model.batchStudents.length) {
      container.innerHTML = "<div class='text-muted small'>No selected students</div>";
      return;
    }

    Model.batchStudents.forEach(function(entry) {
      var active = String(entry._row) === String(Model.editingRowID) ? " active" : "";
      var isFirst = !!entry.isFirstWithoutSO;
      var soLabel = entry.hasExistingSO ? "Existing SO" : "Preview SO";
      var soValue = entry.previewSO || "-";
      var indicator = entry.hasExistingSO ? View.soIndicatorHtml() : "";
      var firstBadge = isFirst ? View.firstAnchorIndicatorHtml() : "";

      var item = document.createElement("div");
      item.className = "selected-student-item p-2 border rounded mb-2" + active;
      item.innerHTML = "<div class='d-flex justify-content-between align-items-start gap-2'>" +
                         "<div>" +
                           "<div><strong>" + (entry.name || "") + "</strong>" + firstBadge + indicator + "</div>" +
                           "<div class='small text-muted'>ID: " + (entry.ID || "") + "</div>" +
                           "<div>" + View.statusBadgeHtml(((Model.fullData.find(function(r){ return String(r._row) === String(entry._row); }) || {})["Verification Status"])) + "</div>" +
                           "<div class='small'><b>" + soLabel + ":</b> " + soValue + "</div>" +
                           "<div class='small text-muted'>Date Received: " + (entry.fields.dateReceived || "-") + "</div>" +
                           "<div class='small text-muted'>Date Accomplished: " + (entry.fields.dateAccomplished || "-") + "</div>" +
                           "<div class='small text-muted'>Status: " + (entry.fields.status || "-") + "</div>" +
                           "<div class='small text-muted'>Remarks: " + (entry.fields.remarks || "-") + "</div>" +
                           "<div class='small text-muted'>Date Forwarded: " + (entry.fields.dateForwarded || "-") + "</div>" +
                           "<div class='small text-muted'>Series: " + (entry.fields.series || "-") + "</div>" +
                           "<div class='small text-muted'>Date of SO Issuance: " + (entry.fields.dateSOIssuance || "-") + "</div>" +
                         "</div>" +
                         "<div>" +
                           "<button type='button' class='btn btn-sm btn-outline-danger' title='Remove from batch'><i class='bi bi-trash'></i></button>" +
                         "</div>" +
                       "</div>";

      var buttons = item.querySelectorAll("button");
      if (buttons[0]) {
        buttons[0].onclick = function(e) {
          e.stopPropagation();
          Controller.removeBatchStudent(entry._row);
        };
      }
      item.onclick = function() { Controller.selectBatchStudent(entry._row); };
      container.appendChild(item);
    });
  },

  updateActionButtons: function() {
    var saveBtn = this.getEl("savebtn");
    var updateBtn = this.getEl("updateStudentBtn");
    var canEditRecord = !!(Model.currentRecordPermissions && Model.currentRecordPermissions.canEditRecord);
    if (saveBtn) {
      saveBtn.disabled = Model.isSavingBatch || !canEditRecord || !(Model.batchHasChanges && Model.batchConfirmed);
    }
    if (updateBtn) {
      updateBtn.disabled = Model.isSavingBatch || !canEditRecord || !Model.batchStudents.length;
    }
  },

  populateEditForm: function(entry) {
    if (!entry) return;
    Model.setEditingRow(entry._row);
    this.clearModalValidationErrors();
    this.populateSeriesDropdown(entry.fields.series);

    var firstNoSO = Model.getFirstWithoutSOEntry();
    var isFirstNoSO = !!(firstNoSO && String(firstNoSO._row) === String(entry._row));
    var summary = this.getEl("studentSummary");
    if (summary) {
      var badge = isFirstNoSO ? this.firstAnchorIndicatorHtml() : "";
      summary.innerHTML = "<b>" + (entry.name || "") + "</b>" + badge + (entry.hasExistingSO ? this.soIndicatorHtml() : "") + "<br>" +
                          "ID: " + (entry.ID || "") + "<br>" +
                          "HEI: " + (entry.HEI || "");
    }

    this.setValue("issuance_date_received", entry.fields.dateReceived);
    this.setValue("issuance_date_accomplished", entry.fields.dateAccomplished);
    this.setValue("issuance_status", entry.fields.status);
    this.setValue("issuance_remarks", entry.fields.remarks);
    this.setValue("issuance_date_forwarded", entry.fields.dateForwarded);
    this.setValue("so_prefix", entry.fields.soPrefix);
    this.setValue("so_number", entry.fields.soNumber);
    this.setValue("edit_date_so_issuance", entry.fields.dateSOIssuance);
    this.setValue("edit_series", entry.fields.series);
  },

  openEditModal: function(student) {
    if (!student) return;
    Model.setLastFocusedStudent(student._row);
    if (!this.isDeveloperView()) {
      Model.clearEditing();
      Model.setEditingRow(student._row);
      Model.currentRecordPermissions = { canEditRecord: false, editableFieldKeys: [], readOnlyFieldKeys: [], denyReason: "" };
      this.clearModalValidationErrors();
      var summary = this.getEl("studentSummary");
      if (summary) {
        summary.innerHTML = "<b>" + (student["Name of the Student"] || "") + "</b><br>ID: " + (student.ID || "") + "<br>HEI: " + (student.HEI || "");
      }
      this.renderPositionRecordValues(student);
      this.applyRolePermissions();
      this.updateActionButtons();
      var readOnlyModal = this.getEl("editModal");
      if (readOnlyModal) readOnlyModal.classList.add("show");
      return;
    }
    var entry = Model.normalizeStudentToBatchEntry(student);
    if (!entry.hasExistingSO) {
      entry.previewSO = "";
      entry.fields.soNo = "";
      entry.fields.soPrefix = "";
      entry.fields.soNumber = "";
      entry.originalPreviewSO = "";
      entry.originalFields.soNo = "";
      entry.originalFields.soPrefix = "";
      entry.originalFields.soNumber = "";
    }
    Model.setBatchStudents([entry]);
    Model.currentRecordPermissions = Model.evaluateRecordPermissions(student);
    this.populateEditForm(entry);
    this.renderSelectedBatchList();
    this.renderBatchSearchResults([], false);
    this.renderPositionFieldSchema();
    this.applyRolePermissions();
    this.updateActionButtons();
    var modal = this.getEl("editModal");
    if (modal) modal.classList.add("show");
    var panel = this.getEl("batchPanel");
    if (panel) panel.classList.add("show-panel");
  },

  closeEditModal: function() {
    var modal = this.getEl("editModal");
    if (modal) modal.classList.remove("show");
    this.clearModalValidationErrors();
    Model.clearEditing();
    var batchSearchInput = this.getEl("batchSearchInput");
    if (batchSearchInput) batchSearchInput.value = "";
    var panel = this.getEl("batchPanel");
    if (panel) panel.classList.remove("show-panel");
    this.closeSoChangeConfirmModal();
    this.closeStatusEditConfirmModal();
    this.renderBatchSearchResults([], false);
    this.renderSelectedBatchList();
    this.renderPositionFieldSchema();
    this.applyRolePermissions();
    this.updateActionButtons();
  },

  applyRolePermissions: function() {
    var issuanceSection = this.getEl("developerIssuanceSection");
    var batchPanel = this.getEl("batchPanel");
    var saveBtn = this.getEl("savebtn");
    var updateBtn = this.getEl("updateStudentBtn");
    var description = this.getEl("positionFieldDescription");
    if (!this.isDeveloperView()) {
      if (issuanceSection) issuanceSection.classList.add("d-none");
      if (batchPanel) batchPanel.classList.add("d-none");
      if (saveBtn) saveBtn.classList.add("d-none");
      if (updateBtn) updateBtn.classList.add("d-none");
      if (description) {
        description.textContent = "These fields are visible for your matched position and show the current database values.";
      }
      this.clearModalActionError("updateStudentBtn");
      this.clearModalActionError("savebtn");
      return;
    }
    if (issuanceSection) issuanceSection.classList.remove("d-none");
    if (batchPanel) batchPanel.classList.remove("d-none");
    if (saveBtn) saveBtn.classList.remove("d-none");
    if (updateBtn) updateBtn.classList.remove("d-none");
    if (description) {
      description.textContent = "These fields come from Data Types for your matched position. Only the current Issuance fields above are bound to live record data for now.";
    }
    var access = Model.accessContext || {};
    var permissions = Model.currentRecordPermissions || {};
    var editable = Array.isArray(permissions.editableFieldKeys) ? permissions.editableFieldKeys : [];
    var canEditRecord = !!permissions.canEditRecord;
    var canUpdateAny = !!access.canUpdateAny;

    this.setFieldInteractivity("batchSearchInput", canUpdateAny, false);
    this.setFieldInteractivity("batchSearchClearBtn", canUpdateAny, false);

    this.setFieldInteractivity("issuance_date_received", canEditRecord && editable.indexOf("dateReceived") !== -1, false);
    this.setFieldInteractivity("issuance_date_accomplished", canEditRecord && editable.indexOf("dateAccomplished") !== -1, false);
    this.setFieldInteractivity("issuance_status", canEditRecord && editable.indexOf("status") !== -1, false);
    this.setFieldInteractivity("issuance_remarks", canEditRecord && editable.indexOf("remarks") !== -1, false);
    this.setFieldInteractivity("issuance_date_forwarded", canEditRecord && editable.indexOf("dateForwarded") !== -1, false);
    this.setFieldInteractivity("so_prefix", canEditRecord && editable.indexOf("soNo") !== -1, false);
    this.setFieldInteractivity("so_number", canEditRecord && editable.indexOf("soNo") !== -1, false);
    this.setFieldInteractivity("edit_series", canEditRecord && editable.indexOf("series") !== -1, false);
    this.setFieldInteractivity("edit_date_so_issuance", canEditRecord && editable.indexOf("dateSOIssuance") !== -1, false);

    if (!canEditRecord && permissions.denyReason) {
      this.setModalActionError("updateStudentBtn", permissions.denyReason);
      this.setModalActionError("savebtn", permissions.denyReason);
    } else {
      this.clearModalActionError("updateStudentBtn");
      this.clearModalActionError("savebtn");
    }
  }
};
</script>
